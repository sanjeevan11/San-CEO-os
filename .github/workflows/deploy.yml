name: Deploy single-file QuoteGate to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deployment proof
        run: |
          echo "QuoteGate single-file live deploy" > version.txt
          echo "Commit: $GITHUB_SHA" >> version.txt
          echo "Branch: $GITHUB_REF_NAME" >> version.txt
          echo "Deployed at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> version.txt
          touch .nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
