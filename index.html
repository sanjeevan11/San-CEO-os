<body>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo, createContext, useContext } = React;

    // ==================== UTILITY ====================
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    const todayStr = () => new Date().toISOString().split('T')[0];
    const daysAgo = (n) => { const d = new Date(); d.setDate(d.getDate() - n); return d.toISOString().split('T')[0]; };

    // ==================== STORAGE ====================
    const STORAGE_KEY = 'stability_os_v1';
    let memStore = null;

    function safeRead() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch(e) { console.warn('Storage read failed, using memory'); }
      return null;
    }

    function safeWrite(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        return true;
      } catch(e) {
        console.warn('Storage write failed, using memory mode');
        memStore = data;
        return false;
      }
    }

    function getStore() { return memStore || safeRead(); }
    function setStore(data) { if (memStore) { memStore = data; } else { safeWrite(data); } }

    // ==================== DEFAULT DATA ====================
    const DEFAULT_DO_RULES = [
      { id: 'do1', text: 'Wake by target time', points: 5 },
      { id: 'do2', text: 'Water after waking', points: 3 },
      { id: 'do3', text: 'Meditation completed', points: 5 },
      { id: 'do4', text: 'Visualisation completed', points: 4 },
      { id: 'do5', text: 'First focus block completed', points: 6 },
      { id: 'do6', text: 'Total learning target completed', points: 7 },
      { id: 'do7', text: 'Day-end review completed', points: 3 },
      { id: 'do8', text: 'Tomorrow plan completed', points: 2 }
    ];

    const DEFAULT_DONT_RULES = [
      { id: 'dn1', text: 'Social media / reels / shorts', penalty: 20 },
      { id: 'dn2', text: 'Sugar / biscuit / cake', penalty: 15 },
      { id: 'dn3', text: 'Random research drift', penalty: 10 },
      { id: 'dn4', text: 'AI drift', penalty: 10 },
      { id: 'dn5', text: 'Unplanned nap', penalty: 10 }
    ];

    function createDay(dateStr, overrides = {}) {
      return {
        date: dateStr,
        rawTodayDump: '',
        rawTomorrowDump: '',
        parsePreviewToday: null,
        parsePreviewTomorrow: null,
        doChecked: {},
        dontChecked: {},
        learningBlocks: [],
        todayTasks: [],
        tomorrowTasks: [],
        morningEntry: { wakeTime: '', intention: '', mainFocus: '', biggestRisk: '', mood: '', energy: '' },
        eveningEntry: { whatWentWell: '', whatSlipped: '', lesson: '', improveTomorrow: '' },
        nightEntry: { review: '' },
        summary: '',
        wins: [],
        weaknesses: [],
        score: { doEarned: 0, learningEarned: 0, taskEarned: 0, journalEarned: 0, penaltyLost: 0, final: 0 },
        status: { closed: false, closedAt: null },
        appliedFingerprints: { todayDump: [], tomorrowDump: [] },
        ...overrides
      };
    }

    function calculateDayScore(day, doRules, dontRules, builder) {
      const scoring = builder.scoring;
      let doEarned = 0;
      doRules.forEach(r => { if (day.doChecked[r.id]) doEarned += r.points; });
      doEarned = Math.min(doEarned, scoring.doMax);

      const completedBlocks = day.learningBlocks.filter(b => b.completed);
      const totalMinutes = completedBlocks.reduce((s, b) => s + (parseInt(b.minutes) || 0), 0);
      let learningEarned = Math.min(totalMinutes / 300 * scoring.learningMax, scoring.learningMax);

      let taskEarned = 0;
      day.todayTasks.forEach(t => {
        if (t.completed) taskEarned += (scoring.taskTypePoints[t.type] || 2);
      });
      taskEarned = Math.min(taskEarned, scoring.taskMax);

      let journalEarned = 0;
      if (day.eveningEntry && (day.eveningEntry.whatWentWell || day.eveningEntry.whatSlipped)) journalEarned += 6;
      if (day.nightEntry && day.nightEntry.review) journalEarned += 6;
      if (day.eveningEntry && day.eveningEntry.improveTomorrow) journalEarned += 4;
      journalEarned = Math.min(journalEarned, scoring.journalMax);

      let penaltyLost = 0;
      dontRules.forEach(r => { if (day.dontChecked[r.id]) penaltyLost += r.penalty; });
      penaltyLost = Math.min(penaltyLost, scoring.dontPenaltyCap);

      const final = clamp(doEarned + learningEarned + taskEarned + journalEarned - penaltyLost, 0, 100);

      return {
        doEarned: Math.round(doEarned * 10) / 10,
        learningEarned: Math.round(learningEarned * 10) / 10,
        taskEarned: Math.round(taskEarned * 10) / 10,
        journalEarned: Math.round(journalEarned * 10) / 10,
        penaltyLost,
        final: Math.round(final)
      };
    }

    function parseTodayDump(text, doRules, dontRules) {
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      const blocks = [];
      const detectedDo = {};
      const detectedDont = {};
      const completedTasks = [];
      let summary = '';
      const wins = [];
      const weaknesses = [];

      const timeRegex = /\b(\d{1,2})[.:](\d{2})\s*(am|pm)?\b/gi;
      const durationRegex = /(\d+)\s*(min|minutes?|hour|hrs?)\b/gi;

      lines.forEach(line => {
        const lower = line.toLowerCase();

        // Detect durations
        let match;
        const durMatches = [...line.matchAll(durationRegex)];
        durMatches.forEach(m => {
          const val = parseInt(m[1]);
          const unit = m[2].toLowerCase();
          if (val >= 5) {
            const mins = unit.startsWith('h') ? val * 60 : val;
            blocks.push({ id: uid(), category: 'learning', minutes: mins, time: '', completed: false, title: 'Detected block' });
          }
        });

        // Detect times (only when they look like real clock times)
        const timeMatches = [...line.matchAll(timeRegex)];
        timeMatches.forEach(m => {
          let h = parseInt(m[1]);
          const min = m[2];
          const ampm = m[3]?.toLowerCase();
          if (ampm === 'pm' && h < 12) h += 12;
          if (ampm === 'am' && h === 12) h = 0;
          const timeStr = `${String(h).padStart(2,'0')}:${min}`;

          // Check if there's a duration nearby (within 30 chars after the time)
          const afterTime = line.substring(line.indexOf(timeStr));
          const nearbyDuration = afterTime.match(/(\d+)\s*(min|hour|hrs?)/i);
          if (nearbyDuration) {
            const val = parseInt(nearbyDuration[1]);
            const unit = nearbyDuration[2].toLowerCase();
            const mins = unit.startsWith('h') ? val * 60 : val;
            // Update last block with this time
            if (blocks.length > 0 && !blocks[blocks.length - 1].time) {
              blocks[blocks.length - 1].time = timeStr;
            }
          }
        });

        // Detect do completions
        doRules.forEach(r => {
          const key = r.text.toLowerCase();
          const keywords = key.split(/\s+/).filter(k => k.length > 3);
          if (keywords.some(k => lower.includes(k)) && (lower.includes('done') || lower.includes('completed') || lower.includes('did'))) {
            detectedDo[r.id] = true;
          }
        });

        // Detect don't breaches
        if (lower.includes('social media') || lower.includes('scrolling')) detectedDont['dn1'] = true;
        if (lower.includes('sugar') || lower.includes('biscuit') || lower.includes('cake') || lower.includes('digestive')) detectedDont['dn2'] = true;
        if (lower.includes('distracted') || lower.includes('shallow') || lower.includes('multitask')) detectedDont['dn3'] = true;
        if (lower.includes('ai ') && (lower.includes('drift') || lower.includes('usage') || lower.includes('used'))) detectedDont['dn4'] = true;
        if (lower.includes('unplanned') && lower.includes('nap')) detectedDont['dn5'] = true;

        // Detect wins
        if (lower.includes('no social media')) wins.push('No social media');
        if (lower.includes('no phone')) wins.push('No phone first 60 min');
        if (lower.includes('focused') && !lower.includes('not focused')) wins.push('Focused learning block');
        if (lower.includes('meditation')) wins.push('Meditation completed');

        // Detect weaknesses
        if (lower.includes('distracted') || lower.includes('shallow')) weaknesses.push('Distracted/shallow learning');
        if (lower.includes('late') || lower.includes('snooze')) weaknesses.push('Late wake/snooze');
      });

      if (wins.length === 0 && lines.some(l => l.toLowerCase().includes('learning'))) {
        wins.push('Learning blocks completed');
      }

      const blockCount = blocks.length;
      if (blockCount >= 4) summary = `Strong learning day with ${blockCount} blocks`;
      else if (blockCount >= 2) summary = `Moderate day with ${blockCount} blocks`;
      else summary = `Light day with ${blockCount} blocks`;

      const confidence = lines.length > 5 ? 75 : lines.length > 2 ? 50 : 30;
      const warnings = [];
      if (detectedDont['dn1']) warnings.push('Social media detected');
      if (detectedDont['dn2']) warnings.push('Sugar/biscuit detected');
      if (detectedDont['dn3']) warnings.push('Distraction detected');

      return {
        blocks: blocks.slice(0, 8),
        detectedDo,
        detectedDont,
        completedTasks,
        summary,
        wins: [...new Set(wins)].slice(0, 5),
        weaknesses: [...new Set(weaknesses)].slice(0, 5),
        confidence,
        warnings,
        aiUsed: false
      };
    }

    function parseTomorrowDump(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      const tasks = [];
      const blocks = [];

      lines.forEach(line => {
        const lower = line.toLowerCase();
        const durMatch = line.match(/(\d+)\s*(min|hour|hrs?)/i);
        const mins = durMatch ? (durMatch[2].startsWith('h') ? parseInt(durMatch[1]) * 60 : parseInt(durMatch[1])) : 60;

        if (lower.includes('block') || lower.includes('learning') || lower.includes('quiz') || lower.includes('study')) {
          blocks.push({ id: uid(), category: 'learning', minutes: mins, time: '', completed: false, title: line.substring(0, 60) });
        } else if (lower.includes('task') || lower.includes('- ') || lower.includes('• ')) {
          tasks.push({ id: uid(), title: line.replace(/^[-•]\s*/, ''), type: 'secondary', priority: 'medium', note: '', completed: false });
        } else {
          tasks.push({ id: uid(), title: line.substring(0, 80), type: 'misc', priority: 'medium', note: '', completed: false });
        }
      });

      return { tasks, blocks };
    }

    // ==================== SEEDED HISTORY ====================

          { id: uid(), title: 'Power BI Learning', category: 'learning', minutes: 45, time: '16:45', completed: true },

          { id: uid(), title: 'T-SQL', category: 'learning', minutes: 30, time: '19:35', completed: true },
          { id: uid(), title: 'T-SQL', category: 'learning', minutes: 20, time: '20:45', completed: true },

          { id: uid(), title: 'SQL Learning', category: 'learning', minutes: 25, time: '23:00', completed: true }
        ],
        doChecked: { do3: true, do4: true, do5: true, do6: true },
        dontChecked: { dn2: true, dn3: true },
        summary: 'Late wake but pushed through. Shallow learning in some blocks. Good volume overall.',
        wins: ['Meditation completed', 'Visualization done', 'No social media', '8 learning blocks', 'Replaced dessert with yogurt'],
        weaknesses: ['Late sleep (3am)', 'Distracted/shallow learning', 'Ate ginger biscuits', 'New idea research drift'],
        score: { doEarned: 19, learningEarned: 25, taskEarned: 0, journalEarned: 8, penaltyLost: 25, final: 27 },

      // Day 7
      days[daysAgo(3)] = {

        learningBlocks: [
          { id: uid(), title: 'SQL Learning', category: 'learning', minutes: 30, time: '07:00', completed: true },
          { id: uid(), title: 'SQL Learning', category: 'learning', minutes: 35, time: '08:50', completed: true },
          { id: uid(), title: 'SQL Learning', category: 'learning', minutes: 10, time: '11:40', completed: true },
          { id: uid(), title: 'SQL Learning', category: 'learning', minutes: 60, time: '13:30', completed: true },
          { id: uid(), title: 'SQL Learning', category: 'learning', minutes: 23, time: '16:40', completed: true },
          { id: uid(), title: 'Power BI Learning', category: 'learning', minutes: 70, time: '18:45', completed: true },

        ],
        doChecked: { do1: true, do2: true, do3: true, do4: true, do5: true, do6: true, do7: true },

        wins: ['Earlier wake (5:45am)', 'No social media', '8 learning blocks', 'Better focus than Day 6', 'Meditation twice'],
        weaknesses: ['Snoozed', 'Coffee with biscuits', 'Some distraction', 'Late quiz'],
        score: { doEarned: 30, learningEarned: 25, taskEarned: 5, journalEarned: 10, penaltyLost: 15, final: 55 },

      };

      // Day 8
      days[daysAgo(2)] = {
        ...createDay(daysAgo(2)),
        rawTodayDump: `Wakes up at 8.30\nCompleted 50 Min power bi learning distracted one\nVery distracted day as gave up for opening social media for 1 message and end up scrolling long\nAnother shallow 20 min power bi learning from 12 pm\nAgain so much of ai usage\nAnd now 2.35 pm next 60 min power bi which is also shallow distracted due to multi tasking rebuilding personal tracker app\n6.25 pm 50 min of power bi learning\nAgain some little social media\nUnplanned other tasks\nSugars aten Buiscuits and yogurts\nAnd did 20 min book summary and planned tomorrow as it's easy all today's backlog it pushed to tomorrow\nAnd I'm calling it a day`,

          { id: uid(), title: 'Power BI Learning', category: 'learning', minutes: 50, time: '09:00', completed: true },

    // ==================== DASHBOARD ====================
    function DashboardTab() {
      const { state, updateState, currentDayData, dayDate, showToast, withProcessing, processing } = useApp();
      const settings = state.settings;
      const builder = state.builder;
      const progress = Math.min((settings.currentDay / settings.goalLengthDays) * 100, 100);

      const handleDumpChange = (field, value) => {
        updateState(s => {
          const days = { ...s.days };
          days[dayDate] = { ...days[dayDate], [field]: value };
          return { ...s, days };
        });
      };

      const handleParseToday = async () => {
        if (!currentDayData.rawTodayDump.trim()) { showToast('Enter today dump first', 'warning'); return; }
        await withProcessing('parseToday', async () => {
          const preview = parseTodayDump(currentDayData.rawTodayDump, builder.doRules, builder.dontRules);
          updateState(s => {
            const days = { ...s.days };
            days[dayDate] = { ...days[dayDate], parsePreviewToday: preview };
            return { ...s, days };
          });
          showToast('Parsed locally', 'success');
        });
      };

      const handleApplyToday = () => {
        if (!currentDayData.parsePreviewToday) { showToast('Parse first', 'warning'); return; }
        const preview = currentDayData.parsePreviewToday;
        updateState(s => {
          const days = { ...s.days };
          const day = { ...days[dayDate] };

          // Apply blocks (avoid duplicates)
          const existingBlockIds = day.learningBlocks.map(b => b.title + b.minutes);
          const newBlocks = preview.blocks.filter(b => !existingBlockIds.includes(b.title + b.minutes));
          day.learningBlocks = [...day.learningBlocks, ...newBlocks];

          // Apply do/dont
          day.doChecked = { ...day.doChecked, ...preview.detectedDo };
          day.dontChecked = { ...day.dontChecked, ...preview.detectedDont };

          if (preview.summary) day.summary = preview.summary;
          if (preview.wins.length) day.wins = [...new Set([...day.wins, ...preview.wins])];
          if (preview.weaknesses.length) day.weaknesses = [...new Set([...day.weaknesses, ...preview.weaknesses])];

          day.score = calculateDayScore(day, s.builder.doRules, s.builder.dontRules, s.builder);
          day.appliedFingerprints.todayDump = [...day.appliedFingerprints.todayDump, uid()];
          days[dayDate] = day;
          return { ...s, days };
        });
        showToast('Applied parsed updates', 'success');
      };

      const handleUndoApply = () => {
        updateState(s => {
          const days = { ...s.days };
          const day = days[dayDate];
          if (day.appliedFingerprints.todayDump.length === 0) { showToast('Nothing to undo', 'warning'); return s; }
          // Remove last applied blocks
          day.learningBlocks = day.learningBlocks.slice(0, -day.appliedFingerprints.todayDump.length);
          day.appliedFingerprints.todayDump.pop();
          day.score = calculateDayScore(day, s.builder.doRules, s.builder.dontRules, s.builder);
          days[dayDate] = day;
          return { ...s, days };
        });
        showToast('Undid last apply', 'info');
      };

      const handleParseTomorrow = () => {
        if (!currentDayData.rawTomorrowDump.trim()) { showToast('Enter tomorrow dump first', 'warning'); return; }
        const preview = parseTomorrowDump(currentDayData.rawTomorrowDump);
        updateState(s => {
          const days = { ...s.days };
          days[dayDate] = { ...days[dayDate], parsePreviewTomorrow: preview };
          return { ...s, days };
        });
        showToast('Tomorrow parsed', 'success');
      };

      const handleApplyTomorrow = () => {
        if (!currentDayData.parsePreviewTomorrow) { showToast('Parse tomorrow first', 'warning'); return; }
        const preview = currentDayData.parsePreviewTomorrow;
        updateState(s => {
          const days = { ...s.days };
          const day = { ...days[dayDate] };
          day.tomorrowTasks = preview.tasks;
          day.tomorrowBlocks = preview.blocks;
          day.appliedFingerprints.tomorrowDump = [...day.appliedFingerprints.tomorrowDump, uid()];
          days[dayDate] = day;
          return { ...s, days };
        });
        showToast('Tomorrow plan applied', 'success');
      };

      const handleToggleLearningBlock = (blockId) => {
        updateState(s => {
          const days = { ...s.days };
          const day = { ...days[dayDate] };
          day.learningBlocks = day.learningBlocks.map(b => b.id === blockId ? { ...b, completed: !b.completed } : b);
          day.score = calculateDayScore(day, s.builder.doRules, s.builder.dontRules, s.builder);
          days[dayDate] = day;
          return { ...s, days };
        });
      };

      const handleToggleTask = (taskId) => {
        updateState(s => {
          const days = { ...s.days };
          const day = { ...days[dayDate] };
          day.todayTasks = day.todayTasks.map(t => t.id === taskId ? { ...t, completed: !t.completed } : t);
          day.score = calculateDayScore(day, s.builder.doRules, s.builder.dontRules, s.builder);
          days[dayDate] = day;
          return { ...s, days };
        });
      };

      const handleCloseDay = () => {
        if (!currentDayData.summary.trim() && !currentDayData.eveningEntry?.improveTomorrow) {
          showToast('Add review and tomorrow plan first', 'warning'); return;
        }
        updateState(s => {
          const days = { ...s.days };
          days[dayDate] = { ...days[dayDate], status: { closed: true, closedAt: new Date().toISOString() } };
          return { ...s, days };
        });
        showToast('Day closed', 'success');
      };

      const score = currentDayData.score;
      const dosCompleted = builder.doRules.filter(r => currentDayData.doChecked[r.id]).length;
      const dontsTriggered = builder.dontRules.filter(r => currentDayData.dontChecked[r.id]).length;
      const blocksCompleted = currentDayData.learningBlocks.filter(b => b.completed).length;
      const tasksCompleted = currentDayData.todayTasks.filter(t => t.completed).length;

      return (
        <div className="pb-24 fade-in">
          {/* Goal Hero Card */}
          <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl p-5 mb-3 mx-4 mt-4 border border-slate-700/50">
            <div className="flex items-center justify-between mb-2">
              <div>
                <p className="text-xs text-slate-400 uppercase tracking-wider">{settings.activeGoalName}</p>
                <h1 className="text-2xl font-bold gradient-text mt-1">Day {settings.currentDay} <span className="text-slate-500 text-lg">/ {settings.goalLengthDays}</span></h1>
              </div>
              <ScoreBadge score={score.final} size="md" />
            </div>
            <div className="w-full bg-slate-700/50 rounded-full h-2.5 mt-3">
              <div className="progress-gradient h-2.5 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
            </div>
            <p className="text-xs text-slate-400 mt-2">{Math.round(progress)}% complete</p>
          </div>

          {/* Today Score Card */}
          <Card title="Today Score">
            <div className="grid grid-cols-2 gap-3">
              {[
                { label: 'Do Points', value: score.doEarned, max: builder.scoring.doMax, color: 'text-teal-350' },
                { label: 'Learning', value: score.learningEarned, max: builder.scoring.learningMax, color: 'text-cyan-350' },
                { label: 'Tasks', value: score.taskEarned, max: builder.scoring.taskMax, color: 'text-violet-450' },
                { label: 'Journal', value: score.journalEarned, max: builder.scoring.journalMax, color: 'text-amber-400' },
                { label: 'Penalties', value: `-${score.penaltyLost}`, max: '', color: 'text-coral-450' },
              ].map(item => (
                <div key={item.label} className="bg-slate-800/50 rounded-xl p-3">
                  <p className="text-[10px] text-slate-400 uppercase">{item.label}</p>
                  <p className={`text-xl font-bold ${item.color}`}>{item.value}{item.max ? <span className="text-xs text-slate-500">/{item.max}</span> : ''}</p>
                </div>
              ))}
            </div>
            <div className="mt-3 bg-slate-800/50 rounded-xl p-3 flex items-center justify-between">
              <span className="text-sm font-medium">Final Score</span>
              <span className="text-2xl font-bold gradient-text">{score.final}<span className="text-sm text-slate-500">/100</span></span>
            </div>
          </Card>

          {/* Daily Snapshot */}
          <Card title="Daily Snapshot">
            <div className="space-y-2">
              {[
                { label: 'Do Rules', done: dosCompleted, total: builder.doRules.length },
                { label: "Don't Rules Triggered", done: dontsTriggered, total: builder.dontRules.length },
                { label: 'Learning Blocks', done: blocksCompleted, total: currentDayData.learningBlocks.length },
                { label: 'Tasks', done: tasksCompleted, total: currentDayData.todayTasks.length }
              ].map(item => (
                <div key={item.label} className="flex items-center justify-between py-1">
                  <span className="text-sm text-slate-300">{item.label}</span>
                  <span className="text-sm font-medium">{item.done}/{item.total}</span>
                </div>
              ))}
            </div>
          </Card>

          {/* Do Rules Checkboxes */}
          <Card title="Do Rules" subtitle="Check completed rules">
            <div className="space-y-2">
              {builder.doRules.map(rule => (
                <label key={rule.id} className="flex items-center gap-3 p-2 rounded-lg bg-slate-800/30 hover:bg-slate-800/50 transition cursor-pointer">
                  <input type="checkbox" checked={!!currentDayData.doChecked[rule.id]}
                    onChange={() => {
                      updateState(s => {
                        const days = { ...s.days };
                        const day = { ...days[dayDate] };
                        day.doChecked = { ...day.doChecked, [rule.id]: !day.doChecked[rule.id] };
                        day.score = calculateDayScore(day, s.builder.doRules, s.builder.dontRules, s.builder);
                        days[dayDate] = day;
                        return { ...s, days };
                      });
                    }}
                    className="w-5 h-5 rounded border-slate-600 text-teal-450 focus:ring-teal-450 bg-slate-800" />
                  <span className="text-sm flex-1">{rule.text}</span>
                  <span className="text-xs text-teal-350 font-medium">+{rule.points}</span>
                </label>
              ))}
            </div>
          </Card>

          {/* Don't Rules */}
          <Card title="Don't Rules" subtitle="Check triggered rules">
            <div className="space-y-2">
              {builder.dontRules.map(rule => (
                <label key={rule.id} className="flex items-center gap-3 p-2 rounded-lg bg-slate-800/30 hover:bg-slate-800/50 transition cursor-pointer">
                  <input type="checkbox" checked={!!currentDayData.dontChecked[rule.id]}
                    onChange={() => {
                      updateState(s => {
                        const days = { ...s.days };
                        const day = { ...days[dayDate] };
                        day.dontChecked = { ...day.dontChecked, [rule.id]: !day.dontChecked[rule.id] };
                        day.score = calculateDayScore(day, s.builder.doRules, s.builder.dontRules, s.builder);
                        days[dayDate] = day;
                        return { ...s, days };
                      });

                    className="w-5 h-5 rounded border-slate-600 text-coral-450 focus:ring-coral-450 bg-slate-800" />

                  <span className="text-xs text-coral-450 font-medium">-{rule.penalty}</span>
                </label>
              ))}
            </div>
          </Card>

          {/* Today Dump */}
          <Card title="Today Dump" actions={
            <div className="flex gap-1 flex-wrap">
              <Button size="sm" variant="secondary" onClick={handleParseToday} loading={processing.parseToday}>Parse</Button>
              <Button size="sm" variant="secondary" onClick={handleApplyToday}>Apply</Button>
              <Button size="sm" variant="ghost" onClick={handleUndoApply}>Undo</Button>
              <Button size="sm" variant="ghost" onClick={() => handleDumpChange('rawTodayDump', '')}>Clear</Button>
            </div>
          }>
            <textarea value={currentDayData.rawTodayDump} onChange={e => handleDumpChange('rawTodayDump', e.target.value)}
              placeholder="Write your day dump here..."
              className="w-full rounded-xl px-3 py-3 text-sm bg-slate-800/50 border border-slate-700 focus:border-teal-450 min-h-[120px] resize-y" rows={6} />
          </Card>

          {/* Parse Preview */}
          {currentDayData.parsePreviewToday && (
            <Card title="Parse Preview" subtitle={`Confidence: ${currentDayData.parsePreviewToday.confidence}%`}>
              <div className="space-y-3">
                <div>
                  <p className="text-xs text-slate-400 mb-1">Detected Blocks ({currentDayData.parsePreviewToday.blocks.length})</p>
                  <div className="flex flex-wrap gap-1">
                    {currentDayData.parsePreviewToday.blocks.map((b, i) => (
                      <span key={i} className="text-xs bg-cyan-450/10 text-cyan-350 px-2 py-1 rounded-lg">{b.minutes}min</span>
                    ))}
                  </div>
                </div>
                {currentDayData.parsePreviewToday.warnings.length > 0 && (
                  <div>
                    <p className="text-xs text-coral-450 mb-1">Warnings</p>
                    {currentDayData.parsePreviewToday.warnings.map((w, i) => (
                      <p key={i} className="text-xs text-coral-400 bg-coral-450/10 px-2 py-1 rounded-lg mb-1">⚠ {w}</p>
                    ))}
                  </div>
                )}
                <p className="text-xs text-slate-400 italic">{currentDayData.parsePreviewToday.summary}</p>
              </div>
            </Card>
          )}

          {/* Tomorrow Dump */}
          <Card title="Tomorrow Dump" actions={
            <div className="flex gap-1 flex-wrap">
              <Button size="sm" variant="secondary" onClick={handleParseTomorrow}>Parse</Button>
              <Button size="sm" variant="secondary" onClick={handleApplyTomorrow}>Apply Plan</Button>
              <Button size="sm" variant="ghost" onClick={() => handleDumpChange('rawTomorrowDump', '')}>Clear</Button>
            </div>
          }>
            <textarea value={currentDayData.rawTomorrowDump} onChange={e => handleDumpChange('rawTomorrowDump', e.target.value)}
              placeholder="Plan your tomorrow..."
              className="w-full rounded-xl px-3 py-3 text-sm bg-slate-800/50 border border-slate-700 focus:border-teal-450 min-h-[100px] resize-y" rows={5} />
          </Card>

          {/* Quick Learning Blocks */}
          <Card title="Learning Blocks">
            {currentDayData.learningBlocks.length === 0 ? (
              <p className="text-sm text-slate-500 text-center py-4">No blocks yet. Parse your dump or add manually.</p>
            ) : (
              <div className="space-y-2">
                {currentDayData.learningBlocks.map(block => (
                  <div key={block.id} className={`flex items-center gap-3 p-2 rounded-lg ${block.completed ? 'bg-teal-450/10' : 'bg-slate-800/30'}`}>
                    <input type="checkbox" checked={block.completed} onChange={() => handleToggleLearningBlock(block.id)}
                      className="w-4 h-4 rounded border-slate-600 text-teal-450 bg-slate-800" />
                    <div className="flex-1 min-w-0">
                      <p className={`text-sm truncate ${block.completed ? 'line-through text-slate-500' : 'text-slate-200'}`}>{block.title}</p>
                      <p className="text-xs text-slate-500">{block.minutes} min {block.time ? `• ${block.time}` : ''}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Card>

          {/* Quick Tasks */}
          <Card title="Today Tasks">
            {currentDayData.todayTasks.length === 0 ? (
              <p className="text-sm text-slate-500 text-center py-4">No tasks today.</p>
            ) : (
              <div className="space-y-2">
                {currentDayData.todayTasks.map(task => (
                  <div key={task.id} className={`flex items-center gap-3 p-2 rounded-lg ${task.completed ? 'bg-teal-450/10' : 'bg-slate-800/30'}`}>
                    <input type="checkbox" checked={task.completed} onChange={() => handleToggleTask(task.id)}
                      className="w-4 h-4 rounded border-slate-600 text-teal-450 bg-slate-800" />
                    <div className="flex-1 min-w-0">
                      <p className={`text-sm truncate ${task.completed ? 'line-through text-slate-500' : 'text-slate-200'}`}>{task.title}</p>
                      <p className="text-xs text-slate-500">{task.type} • {task.priority}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Card>

          {/* Close Day */}
          <Card title={currentDayData.status.closed ? "Day Closed" : "Close Day"}>
            {currentDayData.status.closed ? (
              <div className="text-center py-4">
                <div className="text-teal-350 text-3xl mb-2">✓</div>
                <p className="text-sm text-slate-400">Day closed at {new Date(currentDayData.status.closedAt).toLocaleTimeString()}</p>
                <Button size="sm" variant="secondary" className="mt-3"
                  onClick={() => updateState(s => {
                    const days = { ...s.days };
                    days[dayDate] = { ...days[dayDate], status: { closed: false, closedAt: null } };
                    return { ...s, days };
                  })}>Reopen Day</Button>
              </div>
            ) : (
              <div className="space-y-3">
                <Input label="Day Review" value={currentDayData.summary} onChange={v => handleDumpChange('summary', v)} placeholder="How did the day go?" />
                <Input label="Tomorrow Summary" value={currentDayData.eveningEntry?.improveTomorrow || ''}
                  onChange={v => {
                    updateState(s => {
                      const days = { ...s.days };
                      days[dayDate] = { ...days[dayDate], eveningEntry: { ...days[dayDate].eveningEntry, improveTomorrow: v } };
                      return { ...s, days };
                    });
                  }} placeholder="What's the plan for tomorrow?" />
                <Button variant="primary" className="w-full" onClick={handleCloseDay}>Close Day</Button>
              </div>
            )}
          </Card>
        </div>
      );
    }

    // ==================== RULES TAB ====================
    function RulesTab() {
      const { state, updateState, showToast } = useApp();
      const builder = state.builder;
      const currentDayData = state.days[todayStr()] || { doChecked: {}, dontChecked: {} };

      const updateDoRules = (rules) => updateState(s => ({ ...s, builder: { ...s.builder, doRules: rules } }));
      const updateDontRules = (rules) => updateState(s => ({ ...s, builder: { ...s.builder, dontRules: rules } }));

      const addDoRule = () => updateDoRules([...builder.doRules, { id: uid(), text: 'New rule', points: 5 }]);
      const addDontRule = () => updateDontRules([...builder.dontRules, { id: uid(), text: 'New rule', penalty: 10 }]);

      const updateDoRule = (id, field, value) => updateDoRules(builder.doRules.map(r => r.id === id ? { ...r, [field]: value } : r));
      const deleteDoRule = (id) => updateDoRules(builder.doRules.filter(r => r.id !== id));
      const moveDoRule = (index, dir) => {
        const rules = [...builder.doRules];
        const newIndex = index + dir;
        if (newIndex < 0 || newIndex >= rules.length) return;
        [rules[index], rules[newIndex]] = [rules[newIndex], rules[index]];
        updateDoRules(rules);
      };

      const updateDontRule = (id, field, value) => updateDontRules(builder.dontRules.map(r => r.id === id ? { ...r, [field]: value } : r));
      const deleteDontRule = (id) => updateDontRules(builder.dontRules.filter(r => r.id !== id));
      const moveDontRule = (index, dir) => {
        const rules = [...builder.dontRules];
        const newIndex = index + dir;
        if (newIndex < 0 || newIndex >= rules.length) return;
        [rules[index], rules[newIndex]] = [rules[newIndex], rules[index]];
        updateDontRules(rules);
      };

      return (
        <div className="pb-24 fade-in px-4 mt-4">
          <Card title="Do Rules" actions={<Button size="sm" onClick={addDoRule}>{Icons.plus} Add</Button>}>
            <div className="space-y-2">
              {builder.doRules.map((rule, idx) => (
                <div key={rule.id} className="bg-slate-800/40 rounded-xl p-3 flex items-center gap-2">
                  <div className="flex flex-col gap-0.5">
                    <button onClick={() => moveDoRule(idx, -1)} className="text-slate-500 hover:text-white text-xs">▲</button>
                    <button onClick={() => moveDoRule(idx, 1)} className="text-slate-500 hover:text-white text-xs">▼</button>
                  </div>
                  <div className="flex-1">
                    <input value={rule.text} onChange={e => updateDoRule(rule.id, 'text', e.target.value)}
                      className="w-full bg-transparent text-sm border-none p-0 focus:ring-0" />
                  </div>
                  <input type="number" value={rule.points} onChange={e => updateDoRule(rule.id, 'points', parseInt(e.target.value) || 0)}
                    className="w-12 bg-slate-700 text-center text-sm rounded-lg px-1 py-1" />
                  <button onClick={() => deleteDoRule(rule.id)} className="text-slate-500 hover:text-coral-450 p-1">{Icons.trash}</button>
                </div>
              ))}
            </div>
          </Card>

          <Card title="Don't Rules" actions={<Button size="sm" variant="danger" onClick={addDontRule}>{Icons.plus} Add</Button>}>
            <div className="space-y-2">
              {builder.dontRules.map((rule, idx) => (
                <div key={rule.id} className="bg-slate-800/40 rounded-xl p-3 flex items-center gap-2">
                  <div className="flex flex-col gap-0.5">
                    <button onClick={() => moveDontRule(idx, -1)} className="text-slate-500 hover:text-white text-xs">▲</button>
                    <button onClick={() => moveDontRule(idx, 1)} className="text-slate-500 hover:text-white text-xs">▼</button>
                  </div>
                  <div className="flex-1">
                    <input value={rule.text} onChange={e => updateDontRule(rule.id, 'text', e.target.value)}
                      className="w-full bg-transparent text-sm border-none p-0 focus:ring-0" />
                  </div>
                  <input type="number" value={rule.penalty} onChange={e => updateDontRule(rule.id, 'penalty', parseInt(e.target.value) || 0)}
                    className="w-12 bg-slate-700 text-center text-sm rounded-lg px-1 py-1" />
                  <button onClick={() => deleteDontRule(rule.id)} className="text-slate-500 hover:text-coral-450 p-1">{Icons.trash}</button>
                </div>
              ))}
            </div>
          </Card>

          <Card title="Scoring Formula">
            <div className="bg-slate-800/60 rounded-xl p-4 text-center">
              <p className="text-lg font-bold gradient-text mb-2">Final = Do + Learning + Tasks + Journal - Penalties</p>
              <div className="grid grid-cols-2 gap-2 text-xs text-slate-400">
                <div className="bg-slate-700/40 rounded-lg p-2">Do Max: {builder.scoring.doMax}</div>
                <div className="bg-slate-700/40 rounded-lg p-2">Learning Max: {builder.scoring.learningMax}</div>
                <div className="bg-slate-700/40 rounded-lg p-2">Task Max: {builder.scoring.taskMax}</div>
                <div className="bg-slate-700/40 rounded-lg p-2">Journal Max: {builder.scoring.journalMax}</div>
              </div>
            </div>
          </Card>

          <Button variant="secondary" className="w-full" onClick={() => {
            updateState(s => ({ ...s, builder: { ...s.builder, doRules: [...DEFAULT_DO_RULES], dontRules: [...DEFAULT_DONT_RULES] } }));
            showToast('Rules reset to defaults', 'info');
          }}>Reset to Defaults</Button>
        </div>
      );
    }

    // ==================== TASKS TAB ====================
    function TasksTab() {
      const { state, updateState, showToast } = useApp();
      const currentDayData = state.days[todayStr()] || { todayTasks: [], tomorrowTasks: [] };
      const dayDate = todayStr();
      const [editingTask, setEditingTask] = useState(null);
      const [newTaskSection, setNewTaskSection] = useState(null);

      const taskTypes = ['primary', 'secondary', 'admin', 'learning', 'review', 'misc'];
      const priorities = ['low', 'medium', 'high'];

      const updateTasks = (section, tasks) => {
        updateState(s => {
          const days = { ...s.days };
          days[dayDate] = { ...days[dayDate], [section === 'today' ? 'todayTasks' : section === 'tomorrow' ? 'tomorrowTasks' : undefined]: tasks };
          if (section === 'backlog') return { ...s, taskBoard: { ...s.taskBoard, backlog: tasks } };
          const day = days[dayDate];
          day.score = calculateDayScore(day, s.builder.doRules, s.builder.dontRules, s.builder);
          days[dayDate] = day;
          return { ...s, days };
        });
      };

      const addTask = (section) => {
        const task = { id: uid(), title: 'New task', type: 'secondary', priority: 'medium', note: '', completed: false };
        if (section === 'today') updateTasks('today', [...currentDayData.todayTasks, task]);
        else if (section === 'tomorrow') updateTasks('tomorrow', [...currentDayData.tomorrowTasks, task]);
        else updateTasks('backlog', [...state.taskBoard.backlog, task]);
        setEditingTask({ ...task, section });
      };

      const updateTask = (section, task) => {
        const tasks = section === 'today' ? currentDayData.todayTasks : section === 'tomorrow' ? currentDayData.tomorrowTasks : state.taskBoard.backlog;
        updateTasks(section, tasks.map(t => t.id === task.id ? task : t));
        setEditingTask(null);
        showToast('Task updated', 'success');
      };

      const deleteTask = (section, id) => {
        const tasks = section === 'today' ? currentDayData.todayTasks : section === 'tomorrow' ? currentDayData.tomorrowTasks : state.taskBoard.backlog;
        updateTasks(section, tasks.filter(t => t.id !== id));
        showToast('Task deleted', 'info');
      };

      const toggleTask = (section, id) => {
        const tasks = section === 'today' ? currentDayData.todayTasks : section === 'tomorrow' ? currentDayData.tomorrowTasks : state.taskBoard.backlog;
        updateTasks(section, tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
      };

      const moveTask = (fromSection, toSection, taskId) => {
        const fromTasks = fromSection === 'today' ? currentDayData.todayTasks : fromSection === 'tomorrow' ? currentDayData.tomorrowTasks : state.taskBoard.backlog;
        const task = fromTasks.find(t => t.id === taskId);
        if (!task) return;
        const toTasks = toSection === 'today' ? currentDayData.todayTasks : toSection === 'tomorrow' ? currentDayData.tomorrowTasks : state.taskBoard.backlog;
        updateTasks(fromSection, fromTasks.filter(t => t.id !== taskId));
        if (toSection === 'today') updateTasks('today', [...currentDayData.todayTasks, task]);
        else if (toSection === 'tomorrow') updateTasks('tomorrow', [...currentDayData.tomorrowTasks, task]);
        else updateTasks('backlog', [...state.taskBoard.backlog, task]);
        showToast('Task moved', 'success');
      };

      const renderTaskList = (section, tasks, title) => (
        <Card title={title}>
          {tasks.length === 0 ? (
            <p className="text-sm text-slate-500 text-center py-4">No tasks</p>
          ) : (
            <div className="space-y-2">
              {tasks.map(task => (
                <div key={task.id} className={`bg-slate-800/40 rounded-xl p-3 flex items-center gap-2 ${task.completed ? 'opacity-60' : ''}`}>
                  <input type="checkbox" checked={task.completed} onChange={() => toggleTask(section, task.id)}
                    className="w-4 h-4 rounded border-slate-600 text-teal-450 bg-slate-800" />
                  <div className="flex-1 min-w-0" onClick={() => setEditingTask({ ...task, section })}>
                    <p className={`text-sm truncate ${task.completed ? 'line-through text-slate-500' : 'text-slate-200'}`}>{task.title}</p>
                    <p className="text-xs text-slate-500">{task.type} • {task.priority}</p>
                  </div>
                  <select value={section} onChange={e => moveTask(section, e.target.value, task.id)}
                    className="text-xs bg-slate-700 rounded-lg px-1 py-1 border-none">
                    <option value="today">Today</option>
                    <option value="tomorrow">Tomorrow</option>
                    <option value="backlog">Backlog</option>
                  </select>
                  <button onClick={() => deleteTask(section, task.id)} className="text-slate-500 hover:text-coral-450 p-1">{Icons.trash}</button>
                </div>
              ))}
            </div>
          )}
          <Button size="sm" variant="secondary" className="w-full mt-2" onClick={() => addTask(section)}>{Icons.plus} Add Task</Button>
        </Card>
      );

      return (
        <div className="pb-24 fade-in px-4 mt-4">
          {renderTaskList('today', currentDayData.todayTasks, 'Today Tasks')}
          {renderTaskList('tomorrow', currentDayData.tomorrowTasks, 'Tomorrow Tasks')}
          {renderTaskList('backlog', state.taskBoard.backlog, 'Backlog')}

          <Modal open={!!editingTask} onClose={() => setEditingTask(null)} title="Edit Task">
            {editingTask && (
              <div className="space-y-3">
                <Input label="Title" value={editingTask.title} onChange={v => setEditingTask({ ...editingTask, title: v })} />
                <div className="mb-3">
                  <label className="block text-xs font-medium text-slate-400 mb-1">Type</label>
                  <select value={editingTask.type} onChange={e => setEditingTask({ ...editingTask, type: e.target.value })}
                    className="w-full rounded-xl px-3 py-2.5 text-sm bg-slate-800/60 border border-slate-700">
                    {taskTypes.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div className="mb-3">
                  <label className="block text-xs font-medium text-slate-400 mb-1">Priority</label>
                  <select value={editingTask.priority} onChange={e => setEditingTask({ ...editingTask, priority: e.target.value })}
                    className="w-full rounded-xl px-3 py-2.5 text-sm bg-slate-800/60 border border-slate-700">
                    {priorities.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                <Input label="Note" value={editingTask.note} onChange={v => setEditingTask({ ...editingTask, note: v })} multiline />
                <Button variant="primary" className="w-full" onClick={() => updateTask(editingTask.section, editingTask)}>Save Task</Button>
              </div>
            )}
          </Modal>
        </div>
      );
    }

    // ==================== JOURNAL TAB ====================
    function JournalTab() {
      const { state, updateState, showToast } = useApp();
      const currentDayData = state.days[todayStr()] || { morningEntry: {}, eveningEntry: {}, nightEntry: {} };
      const builder = state.builder;
      const dayDate = todayStr();
      const [selectedDay, setSelectedDay] = useState(null);
      const [activeSection, setActiveSection] = useState('morning');

      const updateEntry = (section, field, value) => {
        updateState(s => {
          const days = { ...s.days };
          days[dayDate] = { ...days[dayDate], [section]: { ...days[dayDate][section], [field]: value } };
          days[dayDate].score = calculateDayScore(days[dayDate], s.builder.doRules, s.builder.dontRules, s.builder);
          return { ...s, days };
        });
      };

      const recentDays = Object.entries(state.days).sort((a, b) => b[0].localeCompare(a[0])).slice(0, 10);

      const sections = [
        { id: 'morning', label: 'Morning' },
        { id: 'evening', label: 'Evening' },
        { id: 'night', label: 'Night' },
        { id: 'history', label: 'History' }
      ];

      return (
        <div className="pb-24 fade-in px-4 mt-4">
          {/* Section Tabs */}
          <div className="flex gap-2 mb-3 overflow-x-auto pb-1">
            {sections.map(s => (
              <button key={s.id} onClick={() => setActiveSection(s.id)}
                className={`px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap ${activeSection === s.id ? 'bg-teal-450 text-white' : 'bg-slate-800 text-slate-400'}`}>
                {s.label}
              </button>
            ))}
          </div>

          {activeSection === 'morning' && (
            <Card title="Morning Entry">
              <div className="space-y-3">
                <Input label="Wake Time" value={currentDayData.morningEntry?.wakeTime || ''} onChange={v => updateEntry('morningEntry', 'wakeTime', v)} placeholder="e.g., 6:00 AM" />
                <Input label="Intention" value={currentDayData.morningEntry?.intention || ''} onChange={v => updateEntry('morningEntry', 'intention', v)} placeholder="Today's intention" multiline />
                <Input label="Main Focus" value={currentDayData.morningEntry?.mainFocus || ''} onChange={v => updateEntry('morningEntry', 'mainFocus', v)} placeholder="Main focus for today" />
                <Input label="Biggest Risk" value={currentDayData.morningEntry?.biggestRisk || ''} onChange={v => updateEntry('morningEntry', 'biggestRisk', v)} placeholder="What could derail you?" />
                <Input label="Mood (1-10)" value={currentDayData.morningEntry?.mood || ''} onChange={v => updateEntry('morningEntry', 'mood', v)} type="number" />
                <Input label="Energy (1-10)" value={currentDayData.morningEntry?.energy || ''} onChange={v => updateEntry('morningEntry', 'energy', v)} type="number" />
              </div>
            </Card>
          )}

          {activeSection === 'evening' && (
            <Card title="Evening Entry">
              <div className="space-y-3">
                <Input label="What Went Well" value={currentDayData.eveningEntry?.whatWentWell || ''} onChange={v => updateEntry('eveningEntry', 'whatWentWell', v)} multiline rows={3} />
                <Input label="What Slipped" value={currentDayData.eveningEntry?.whatSlipped || ''} onChange={v => updateEntry('eveningEntry', 'whatSlipped', v)} multiline rows={2} />
                <Input label="Lesson" value={currentDayData.eveningEntry?.lesson || ''} onChange={v => updateEntry('eveningEntry', 'lesson', v)} multiline rows={2} />
                <Input label="Improve Tomorrow" value={currentDayData.eveningEntry?.improveTomorrow || ''} onChange={v => updateEntry('eveningEntry', 'improveTomorrow', v)} multiline rows={2} />
              </div>
            </Card>
          )}

          {activeSection === 'night' && (
            <Card title="Night Review">
              <textarea value={currentDayData.nightEntry?.review || ''} onChange={e => updateEntry('nightEntry', 'review', e.target.value)}
                placeholder="Review your day in 2-3 sentences..."
                className="w-full rounded-xl px-3 py-3 text-sm bg-slate-800/50 border border-slate-700 focus:border-teal-450 min-h-[150px] resize-y" rows={6} />
            </Card>
          )}

          {activeSection === 'history' && (
            <Card title="Recent Days">
              <div className="space-y-2">
                {recentDays.map(([date, day]) => (
                  <div key={date} onClick={() => setSelectedDay(date)}
                    className="bg-slate-800/40 rounded-xl p-3 flex items-center justify-between cursor-pointer hover:bg-slate-800/60 transition">
                    <div>
                      <p className="text-sm font-medium">{date}</p>
                      <p className="text-xs text-slate-400">{day.summary ? day.summary.substring(0, 50) + '...' : 'No summary'}</p>
                    </div>
                    <ScoreBadge score={day.score?.final || 0} size="sm" />
                  </div>
                ))}
              </div>
            </Card>
          )}

          {/* Day Detail Modal */}
          <Modal open={!!selectedDay} onClose={() => setSelectedDay(null)} title={`Day Detail: ${selectedDay}`}>
            {selectedDay && state.days[selectedDay] && (() => {
              const day = state.days[selectedDay];
              return (
                <div className="space-y-4">
                  <div className="flex items-center justify-between">
                    <span className="text-slate-400 text-sm">{day.status.closed ? '✓ Closed' : 'Open'}</span>
                    <ScoreBadge score={day.score?.final || 0} />
                  </div>
                  <div className="grid grid-cols-2 gap-2 text-xs">
                    <div className="bg-slate-800/50 rounded-lg p-2">Do: {day.score?.doEarned || 0}</div>
                    <div className="bg-slate-800/50 rounded-lg p-2">Learning: {day.score?.learningEarned || 0}</div>
                    <div className="bg-slate-800/50 rounded-lg p-2">Tasks: {day.score?.taskEarned || 0}</div>
                    <div className="bg-slate-800/50 rounded-lg p-2">Journal: {day.score?.journalEarned || 0}</div>
                    <div className="bg-slate-800/50 rounded-lg p-2 text-coral-450">Penalty: {day.score?.penaltyLost || 0}</div>
                  </div>
                  {day.summary && <p className="text-sm text-slate-300 bg-slate-800/40 rounded-lg p-3">{day.summary}</p>}
                  {day.wins?.length > 0 && (
                    <div>
                      <p className="text-xs text-teal-350 font-medium mb-1">Wins</p>
                      {day.wins.map((w, i) => <p key={i} className="text-sm text-slate-300 bg-teal-450/10 rounded-lg px-3 py-1.5 mb-1">✓ {w}</p>)}
                    </div>
                  )}
                  {day.weaknesses?.length > 0 && (
                    <div>
                      <p className="text-xs text-coral-450 font-medium mb-1">Weaknesses</p>
                      {day.weaknesses.map((w, i) => <p key={i} className="text-sm text-slate-300 bg-coral-450/10 rounded-lg px-3 py-1.5 mb-1">⚠ {w}</p>)}
                    </div>
                  )}
                  {day.learningBlocks?.length > 0 && (
                    <div>
                      <p className="text-xs text-slate-400 font-medium mb-1">Learning Blocks</p>
                      {day.learningBlocks.map(b => (
                        <p key={b.id} className="text-sm text-slate-300 bg-slate-800/40 rounded-lg px-3 py-1.5 mb-1">
                          {b.completed ? '✓' : '○'} {b.title} ({b.minutes}min)
                        </p>
                      ))}
                    </div>
                  )}
                  {day.rawTodayDump && (
                    <div>
                      <p className="text-xs text-slate-400 font-medium mb-1">Raw Today Dump</p>
                      <pre className="text-xs text-slate-400 bg-slate-800/40 rounded-lg p-3 whitespace-pre-wrap max-h-40 overflow-y-auto">{day.rawTodayDump}</pre>
                    </div>
                  )}
                  {day.rawTomorrowDump && (
                    <div>
                      <p className="text-xs text-slate-400 font-medium mb-1">Raw Tomorrow Dump</p>
                      <pre className="text-xs text-slate-400 bg-slate-800/40 rounded-lg p-3 whitespace-pre-wrap max-h-40 overflow-y-auto">{day.rawTomorrowDump}</pre>
                    </div>
                  )}
                </div>
              );
            })()}
          </Modal>
        </div>
      );
    }

    // ==================== IDEAS TAB ====================
    function IdeasTab() {
      const { state, updateState, showToast } = useApp();
      const [editingIdea, setEditingIdea] = useState(null);

      const addIdea = () => {
        const idea = { id: uid(), title: 'New idea', note: '', urgency: 'medium', archived: false, createdAt: new Date().toISOString() };
        updateState(s => ({ ...s, ideas: [idea, ...s.ideas] }));
        setEditingIdea(idea);
      };

      const updateIdea = (idea) => {
        updateState(s => ({ ...s, ideas: s.ideas.map(i => i.id === idea.id ? idea : i) }));
        setEditingIdea(null);
        showToast('Idea updated', 'success');
      };

      const deleteIdea = (id) => {
        updateState(s => ({ ...s, ideas: s.ideas.filter(i => i.id !== id) }));
        showToast('Idea deleted', 'info');
      };

      const toggleArchive = (id) => {
        updateState(s => ({ ...s, ideas: s.ideas.map(i => i.id === id ? { ...i, archived: !i.archived } : i) }));
      };

      const convertToTask = (idea) => {
        const task = { id: uid(), title: idea.title, type: 'secondary', priority: idea.urgency === 'high' ? 'high' : 'medium', note: idea.note, completed: false };
        updateState(s => {
          const days = { ...s.days };
          const day = days[todayStr()] || { todayTasks: [] };
          day.todayTasks = [...(day.todayTasks || []), task];
          days[todayStr()] = day;
          return { ...s, days, ideas: s.ideas.filter(i => i.id !== idea.id) };
        });
        showToast('Converted to task', 'success');
      };

      const urgencies = ['low', 'medium', 'high'];

      const activeIdeas = state.ideas.filter(i => !i.archived);
      const archivedIdeas = state.ideas.filter(i => i.archived);

      return (
        <div className="pb-24 fade-in px-4 mt-4">
          <Card title="Idea Parking" actions={<Button size="sm" onClick={addIdea}>{Icons.plus} Add</Button>}>
            {activeIdeas.length === 0 ? (
              <p className="text-sm text-slate-500 text-center py-4">No ideas yet</p>
            ) : (
              <div className="space-y-2">
                {activeIdeas.map(idea => (
                  <div key={idea.id} className="bg-slate-800/40 rounded-xl p-3">
                    <div className="flex items-center gap-2 mb-1">
                      <span className={`text-xs px-2 py-0.5 rounded-full ${idea.urgency === 'high' ? 'bg-coral-450/20 text-coral-450' : idea.urgency === 'medium' ? 'bg-amber-400/20 text-amber-400' : 'bg-teal-450/20 text-teal-450'}`}>
                        {idea.urgency}
                      </span>
                      <span className="text-sm font-medium flex-1">{idea.title}</span>
                    </div>
                    {idea.note && <p className="text-xs text-slate-400 mb-2">{idea.note}</p>}
                    <div className="flex gap-1">
                      <Button size="sm" variant="ghost" onClick={() => setEditingIdea(idea)}>{Icons.edit}</Button>
                      <Button size="sm" variant="ghost" onClick={() => toggleArchive(idea.id)}>Archive</Button>
                      <Button size="sm" variant="ghost" onClick={() => convertToTask(idea)}>→ Task</Button>
                      <Button size="sm" variant="ghost" onClick={() => deleteIdea(idea.id)}>{Icons.trash}</Button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Card>

          {archivedIdeas.length > 0 && (
            <Card title="Archived Ideas">
              <div className="space-y-2">
                {archivedIdeas.map(idea => (
                  <div key={idea.id} className="bg-slate-800/30 rounded-xl p-3 opacity-60">
                    <span className="text-sm">{idea.title}</span>
                    <Button size="sm" variant="ghost" className="ml-2" onClick={() => toggleArchive(idea.id)}>Unarchive</Button>
                  </div>
                ))}
              </div>
            </Card>
          )}

          <Modal open={!!editingIdea} onClose={() => setEditingIdea(null)} title="Edit Idea">
            {editingIdea && (
              <div className="space-y-3">
                <Input label="Title" value={editingIdea.title} onChange={v => setEditingIdea({ ...editingIdea, title: v })} />
                <div className="mb-3">
                  <label className="block text-xs font-medium text-slate-400 mb-1">Urgency</label>
                  <select value={editingIdea.urgency} onChange={e => setEditingIdea({ ...editingIdea, urgency: e.target.value })}
                    className="w-full rounded-xl px-3 py-2.5 text-sm bg-slate-800/60 border border-slate-700">
                    {urgencies.map(u => <option key={u} value={u}>{u}</option>)}
                  </select>
                </div>
                <Input label="Note" value={editingIdea.note} onChange={v => setEditingIdea({ ...editingIdea, note: v })} multiline />
                <Button variant="primary" className="w-full" onClick={() => updateIdea(editingIdea)}>Save Idea</Button>
              </div>
            )}
          </Modal>
        </div>
      );
    }

    // ==================== BUILDER TAB ====================
    function BuilderTab() {
      const { state, updateState, showToast } = useApp();
      const settings = state.settings;
      const builder = state.builder;

      const updateSettings = (updates) => updateState(s => ({ ...s, settings: { ...s.settings, ...updates } }));
      const updateBuilder = (updates) => updateState(s => ({ ...s, builder: { ...s.builder, ...updates } }));
      const updateScoring = (updates) => updateState(s => ({ ...s, builder: { ...s.builder, scoring: { ...s.builder.scoring, ...updates } } }));
      const updateAI = (updates) => updateState(s => ({ ...s, settings: { ...s.settings, ai: { ...s.settings.ai, ...updates } } }));

      const exportData = () => {
        const data = JSON.stringify(state, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `stability-os-backup-${todayStr()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Data exported', 'success');
      };

      const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (data.version) {
              updateState(data);
              showToast('Data imported', 'success');
            } else {
              showToast('Invalid data format', 'error');
            }
          } catch(err) {
            showToast('Failed to parse JSON', 'error');
          }
        };
        reader.readAsText(file);
      };

      const resetApp = () => {
        if (confirm('Reset all data? This cannot be undone.')) {
          localStorage.removeItem(STORAGE_KEY);
          window.location.reload();
        }
      };

      const reseedData = () => {
        updateState(s => ({ ...s, days: seedDays() }));
        showToast('History reseeded', 'success');
      };

      return (
        <div className="pb-24 fade-in px-4 mt-4 space-y-3">
          {/* Goal Settings */}
          <Card title="Goal Settings">
            <Input label="App Title" value={settings.appTitle} onChange={v => updateSettings({ appTitle: v })} />
            <Input label="Goal Name" value={settings.activeGoalName} onChange={v => updateSettings({ activeGoalName: v })} />
            <div className="grid grid-cols-2 gap-3">
              <Input label="Goal Length (days)" value={settings.goalLengthDays} onChange={v => updateSettings({ goalLengthDays: parseInt(v) || 30 })} type="number" />
              <Input label="Current Day" value={settings.currentDay} onChange={v => updateSettings({ currentDay: parseInt(v) || 1 })} type="number" />
            </div>
            <Input label="Start Date" value={settings.goalStartDate} onChange={v => updateSettings({ goalStartDate: v })} type="date" />
          </Card>

          {/* Learning Block Templates */}
          <Card title="Learning Block Templates">
            {builder.learningBlockTemplates.map((tmpl, idx) => (
              <div key={tmpl.id} className="bg-slate-800/40 rounded-xl p-3 mb-2 flex items-center gap-2">
                <div className="flex-1">
                  <input value={tmpl.title} onChange={e => {
                    const tmpls = [...builder.learningBlockTemplates];
                    tmpls[idx] = { ...tmpl, title: e.target.value };
                    updateBuilder({ learningBlockTemplates: tmpls });
                  }} className="w-full bg-transparent text-sm border-none p-0 focus:ring-0" />
                </div>
                <input type="number" value={tmpl.defaultMinutes} onChange={e => {
                  const tmpls = [...builder.learningBlockTemplates];
                  tmpls[idx] = { ...tmpl, defaultMinutes: parseInt(e.target.value) || 60 };
                  updateBuilder({ learningBlockTemplates: tmpls });
                }} className="w-16 bg-slate-700 text-center text-sm rounded-lg px-1 py-1" />
                <button onClick={() => {
                  updateBuilder({ learningBlockTemplates: builder.learningBlockTemplates.filter(t => t.id !== tmpl.id) });
                }} className="text-slate-500 hover:text-coral-450 p-1">{Icons.trash}</button>
              </div>
            ))}
            <Button size="sm" variant="secondary" onClick={() => updateBuilder({ learningBlockTemplates: [...builder.learningBlockTemplates, { id: uid(), title: 'New Template', defaultMinutes: 60, category: 'learning' }] })}>
              {Icons.plus} Add Template
            </Button>
          </Card>

          {/* Task Scoring */}
          <Card title="Task Scoring">
            <div className="grid grid-cols-2 gap-2">
              {Object.entries(builder.scoring.taskTypePoints).map(([type, points]) => (
                <div key={type} className="bg-slate-800/40 rounded-lg p-2 flex items-center justify-between">
                  <span className="text-xs capitalize text-slate-400">{type}</span>
                  <input type="number" value={points} onChange={e => updateScoring({ taskTypePoints: { ...builder.scoring.taskTypePoints, [type]: parseInt(e.target.value) || 0 } })}
                    className="w-12 bg-slate-700 text-center text-sm rounded-lg px-1 py-1" />
                </div>
              ))}
            </div>
            <div className="grid grid-cols-2 gap-2 mt-3">
              <Input label="Do Max" value={builder.scoring.doMax} onChange={v => updateScoring({ doMax: parseInt(v) || 35 })} type="number" />
              <Input label="Learning Max" value={builder.scoring.learningMax} onChange={v => updateScoring({ learningMax: parseInt(v) || 25 })} type="number" />
              <Input label="Task Max" value={builder.scoring.taskMax} onChange={v => updateScoring({ taskMax: parseInt(v) || 20 })} type="number" />
              <Input label="Journal Max" value={builder.scoring.journalMax} onChange={v => updateScoring({ journalMax: parseInt(v) || 20 })} type="number" />
            </div>
          </Card>

          {/* AI Settings */}
          <Card title="AI Settings">
            <div className="flex items-center justify-between mb-3">
              <span className="text-sm font-medium">Enable AI</span>
              <button onClick={() => updateAI({ enabled: !settings.ai.enabled })}
                className={`w-12 h-6 rounded-full transition-all ${settings.ai.enabled ? 'bg-teal-450' : 'bg-slate-600'}`}>
                <div className={`w-5 h-5 bg-white rounded-full transition-all mt-0.5 ${settings.ai.enabled ? 'ml-6' : 'ml-0.5'}`}></div>
              </button>
            </div>
            <Input label="Endpoint" value={settings.ai.endpoint} onChange={v => updateAI({ endpoint: v })} />
            <Input label="Model" value={settings.ai.model} onChange={v => updateAI({ model: v })} placeholder="e.g., anthropic/claude-3-haiku" />
            <Input label="API Key" value={settings.ai.apiKey} onChange={v => updateAI({ apiKey: v })} type="password" />
            <Input label="System Prompt" value={settings.ai.systemPrompt} onChange={v => updateAI({ systemPrompt: v })} multiline rows={3} />
          </Card>

          {/* Data Tools */}
          <Card title="Data Tools">
            <div className="space-y-2">
              <Button variant="secondary" className="w-full" onClick={exportData}>Export JSON</Button>
              <label className="block">
                <Button variant="secondary" className="w-full" as="span">Import JSON</Button>
                <input type="file" accept=".json" onChange={importData} className="hidden" />
              </label>
              <Button variant="secondary" className="w-full" onClick={reseedData}>Reseed History</Button>
              <Button variant="danger" className="w-full" onClick={resetApp}>Reset App</Button>
            </div>
          </Card>
        </div>
      );
    }

    // ==================== INSTALL NOTICE ====================
    function InstallNotice() {
      const { state, updateState } = useApp();
      if (state.settings.ui?.installNoticeDismissed) return null;

      return (
        <div className="mx-4 mt-4 mb-2">
          <div className="bg-gradient-to-r from-violet-550/20 to-teal-450/20 border border-violet-450/30 rounded-2xl p-4">
            <div className="flex items-start justify-between">
              <div className="flex-1">
                <h3 className="font-semibold text-sm mb-1">Add to Home Screen</h3>
                <p className="text-xs text-slate-400">Install Stability OS for the best experience. Use your browser's "Add to Home Screen" option.</p>
              </div>
              <button onClick={() => updateState(s => ({ ...s, settings: { ...s.settings, ui: { ...s.settings.ui, installNoticeDismissed: true } } }))}
                className="text-slate-400 hover:text-white p-1">{Icons.x}</button>
            </div>
          </div>
        </div>
      );
    }

    // ==================== MAIN APP ====================
    function App() {
      const { activeTab } = useApp();

      return (
        <div className="min-h-screen bg-gradient-to-b from-slate-900 to-slate-950">
          <Toast />
          <InstallNotice />
          {activeTab === 'dashboard' && <DashboardTab />}
          {activeTab === 'rules' && <RulesTab />}
          {activeTab === 'tasks' && <TasksTab />}
          {activeTab === 'journal' && <JournalTab />}
          {activeTab === 'ideas' && <IdeasTab />}
          {activeTab === 'builder' && <BuilderTab />}
          <BottomNav />
        </div>
      );
    }

    // ==================== RENDER ====================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <AppProvider>
          <App />
        </AppProvider>
      </ErrorBoundary>
    );
  </script>
</body>
</html>
