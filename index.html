function makeEmptyDailyLog() {
  return deepClone(defaultData.today.dailyLogs[isoToday()]);
}

function normalizeList(items=[]) {
  const seen = new Set();
  return items.filter(Boolean).map(x => String(x).trim()).filter(Boolean).filter(x => {
    const k = x.toLowerCase();
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });
}

function normalizeBlocks(blocks=[]) {
  const seen = new Set();
  return (blocks || []).filter(Boolean).filter(b => {
    const key = `${(b.topic||'').toLowerCase()}|${b.time||''}|${Number(b.durationMin||0)}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function migrateState(configRaw, dataRaw) {
  const config = { ...deepClone(defaultConfig), ...(configRaw || {}) };
  const data = { ...deepClone(defaultData), ...(dataRaw || {}) };
  config.version = APP_VERSION;
  if (!data.today) data.today = { dailyLogs:{}, history:[] };
  if (!data.today.dailyLogs) data.today.dailyLogs = {};
  Object.keys(data.today.dailyLogs).forEach(k => { data.today.dailyLogs[k] = { ...makeEmptyDailyLog(), ...data.today.dailyLogs[k] }; });
  if (!data.today.dailyLogs[isoToday()]) data.today.dailyLogs[isoToday()] = makeEmptyDailyLog();
  if (!Array.isArray(data.today.history)) data.today.history = [];
  return { config, data };
}

function parseDump(text='') {
  const lines = String(text || '').split(/\n+/).map(x => x.trim()).filter(Boolean);
  const parsed = { primaryMit:'', secondaryMit:'', deepBlock:'', adminBlock:'', tomorrowTasks:[], workBlocks:[], wins:[], weaknesses:[], leaks:[], summary:'', lesson:'', wakeTime:'', sleepHoursApprox:null, visualisationMinutes:0, meditationMinutes:0, waterIntakeMl:0, noSocialMedia:false, sugarBreach:false, learningMinutes:0 };
  lines.forEach(line => {
    const l = line.toLowerCase();
    const tm = l.match(/(\d{1,2})[:.](\d{2})\s*(am|pm)?/);
    const mins = l.match(/(\d+)\s*(min|mins|minutes|hour|hr|h)/);
    const dMin = mins ? Number(mins[1]) * (['hour','hr','h'].includes(mins[2]) ? 60 : 1) : 0;
    const topic = /t-sql|sql/.test(l) ? 'SQL / T-SQL' : /power bi/.test(l) ? 'Power BI' : /dax/.test(l) ? 'DAX' : /semantic|schematic|quiz|retrieval|mock/.test(l) ? 'Quiz / Retrieval / Mock scenario' : '';
    if (/woke/.test(l) && tm) parsed.wakeTime = `${tm[1].padStart(2,'0')}:${tm[2]}`;
    if (/sleep/.test(l) && l.match(/(\d+)\s*h/)) parsed.sleepHoursApprox = Number((l.match(/(\d+)\s*h/)||[])[1] || 0);
    if (/visualisation/.test(l)) parsed.visualisationMinutes = Math.max(parsed.visualisationMinutes, dMin || 5);
    if (/meditation/.test(l)) parsed.meditationMinutes = Math.max(parsed.meditationMinutes, dMin || 5);
    if (/water/.test(l) && l.match(/(\d+)\s*ml/)) parsed.waterIntakeMl += Number((l.match(/(\d+)\s*ml/)||[])[1] || 0);
    if (/no social media/.test(l)) parsed.noSocialMedia = true;
    if (/biscuit|cake|sugar/.test(l)) parsed.sugarBreach = true;
    if ((/sql|power bi|quiz|retrieval|mock|dax|semantic/.test(l)) && dMin) {
      parsed.workBlocks.push({ time: tm ? `${tm[1].padStart(2,'0')}:${tm[2]}` : '', durationMin:dMin, topic: topic || 'Learning', notes: line });
      parsed.learningMinutes += dMin;
    }
    if (/tomorrow|must do tomorrow|next day/.test(l)) parsed.tomorrowTasks.push(line.replace(/^[-*]\s*/, ''));
    if (/focus.*sql/.test(l)) parsed.primaryMit = parsed.primaryMit || 'SQL learning';
    if (/power bi/.test(l)) parsed.secondaryMit = parsed.secondaryMit || 'Power BI learning';
    if (/admin.*time|admin.*on time/.test(l)) parsed.adminBlock = 'admin tasks only on time';
    if (/deep block|sql-focused progression/.test(l)) parsed.deepBlock = 'SQL-focused progression';
    if (/no social media|achieved|more focused|completed/.test(l)) parsed.wins.push(line);
    if (/snooze|late|shallow|distract|drift|sugar|sleep debt/.test(l)) parsed.weaknesses.push(line);
    if (/lesson|bottleneck/.test(l)) parsed.lesson = line;
    if (/summary|execution improved|effort was high/.test(l)) parsed.summary = line;
  });
  parsed.workBlocks = normalizeBlocks(parsed.workBlocks);
  parsed.wins = normalizeList(parsed.wins);
  parsed.weaknesses = normalizeList(parsed.weaknesses);
  parsed.tomorrowTasks = normalizeList(parsed.tomorrowTasks);
  return parsed;
}

function safeRead(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    if(!raw) return deepClone(fallback);
    const parsed = JSON.parse(raw);
    return parsed ?? deepClone(fallback);
  } catch {
    return deepClone(fallback);
  }
}
function safeWrite(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
function usePersistentState(key, fallback){
  const [value, setValue] = useState(() => safeRead(key, fallback));
  useEffect(() => { safeWrite(key, value); }, [key, value]);
  return [value, setValue];
}
function resolveOptions(config, optionsFrom){
  if(!optionsFrom) return [];
  const [group, name] = optionsFrom.split('.');
  return (config[group] && config[group][name]) ? config[group][name] : [];
}
function getRuleSet(config){
  return config.today.ruleSets.find(r => r.id === config.today.activeRuleSetId) || config.today.ruleSets[0];

function ArrayManager({title, items, onChange, placeholder='Add item'}) {
  const [draft, setDraft] = useState('');
  const add = () => {
    if(!draft.trim()) return;
    onChange([...(items || []), draft.trim()]);
    setDraft('');
  };
  return (
    <Card title={title}>
      <div className="space-y-2">
        {(items || []).map((item, i) => (
          <div key={i} className="flex items-center gap-2">
            <input
              value={item}
              onChange={e => {
                const next = [...items];
                next[i] = e.target.value;
                onChange(next);
              }}
              className="flex-1 rounded-2xl border border-white/10 bg-navy-850 px-3 py-2 text-sm text-white"
            />
            <button onClick={() => i > 0 && onChange(reorder(items, i, i - 1))} className="rounded-2xl bg-white/5 px-3 py-2 text-xs tap">↑</button>
            <button onClick={() => i < items.length - 1 && onChange(reorder(items, i, i + 1))} className="rounded-2xl bg-white/5 px-3 py-2 text-xs tap">↓</button>
            <button onClick={() => onChange(items.filter((_, idx) => idx !== i))} className="rounded-2xl bg-red-500/10 px-3 py-2 text-xs text-red-300 tap">Del</button>
          </div>
        ))}
        <div className="flex gap-2">
          <input value={draft} onChange={e => setDraft(e.target.value)} placeholder={placeholder} className="flex-1 rounded-2xl border border-white/10 bg-navy-850 px-3 py-2 text-sm text-white" />
          <button onClick={add} className="rounded-2xl bg-accent-500 px-4 py-2 text-sm font-semibold text-navy-950 tap">Add</button>
        </div>
      </div>
    </Card>
  );
}
function QuickForm({config, typeDef, value, onChange}) {
  if(!typeDef) return null;
  const setField = (name, val) => onChange({...value, [name]: val});
  return (
    <div className="space-y-3">
      {typeDef.fields.map(field => {
        const options = field.optionsFrom ? resolveOptions(config, field.optionsFrom) : (field.options || []);
        if(field.type === 'textarea') return <TextArea key={field.name} label={field.label} value={value[field.name] || ''} onChange={v => setField(field.name, v)} />;
        if(field.type === 'select') return <Select key={field.name} label={field.label} value={value[field.name] || ''} onChange={v => setField(field.name, v)} options={options} />;
        if(field.type === 'checkbox') return <Toggle key={field.name} label={field.label} checked={!!value[field.name]} onChange={() => setField(field.name, !value[field.name])} />;
        if(field.type === 'rating') return <Select key={field.name} label={field.label} value={String(value[field.name] ?? '')} onChange={v => setField(field.name, Number(v))} options={['1', '2', '3', '4', '5']} />;
        if(field.type === 'currency') return <Input key={field.name} label={field.label} value={value[field.name] ?? ''} type="number" step="0.01" onChange={v => setField(field.name, Number(v))} />;
        return <Input key={field.name} label={field.label} value={value[field.name] ?? ''} type={field.type || 'text'} onChange={v => setField(field.name, v)} />;
      })}
    </div>
  );
}

  const results = useMemo(() => {
    const q = searchQuery.trim().toLowerCase();
    if (!q) return [];
    const out = [];
    const pushIf = (items, type, tab, getTitle, getDate) => {
      items.forEach(item => {
        const hay = JSON.stringify(item).toLowerCase();
        if (hay.includes(q)) {
          out.push({
            id:uid(),
            type,
            tab,
            title:getTitle(item),
            date:getDate ? getDate(item) : '',
            item
          });
        }
      });
    };
    pushIf(data.today.history || [], 'History', 'today', x => x.review || x.primaryMit || 'History item', x => x.date);
    pushIf(Object.values(data.today.dailyLogs || {}), 'Daily Log', 'today', x => x.primaryMit || x.secondaryMit || 'Daily log', _ => todayKey);
    pushIf(data.legal.deadlines, 'Deadline', 'legal', x => x.title, x => x.dueDate);
    pushIf(data.legal.exhibits, 'Exhibit', 'legal', x => x.code + ' ' + (x.description || ''), x => x.documentDate);
    pushIf(data.legal.chronology, 'Chronology', 'legal', x => x.event, x => x.date);
    pushIf(data.legal.correspondence, 'Correspondence', 'legal', x => x.subject, x => x.dateSent);
    pushIf(data.money.bills, 'Bill', 'money', x => x.name, x => x.dueDate);
    pushIf(data.money.expenses, 'Expense', 'money', x => x.category + ' ' + (x.notes || ''), x => x.date);
    pushIf(data.business.leads, 'Lead', 'business', x => (x.company || x.name) + ' / ' + x.stage, x => x.nextFollowUp);
    return out.slice(0, 40);
  }, [searchQuery, data]);

  function updateLeadStage(leadId, stage) {
    setData(prev => {
      const next = deepClone(prev);
      next.business.leads = next.business.leads.map(lead => {
        if (lead.id !== leadId) return lead;
        if (
          stage === config.business.gatingRule.buildStage &&
          config.business.gatingRule.requiresDeposit &&
          (!lead.depositPaid || !lead.scopeSigned)
        ) {
          alert('Build stage blocked. Deposit paid and scope signed are both required.');
          return lead;
        }
        return { ...lead, stage };
      });
      return next;
    });
  }

  function editRule(setId, kind, ruleId, key, value) {
    setConfig(prev => {
      const next = deepClone(prev);
      const rs = next.today.ruleSets.find(r => r.id === setId);
      const arr = kind === 'do' ? rs.doRules : rs.dontRules;
      const item = arr.find(r => r.id === ruleId);
      item[key] = value;
      return next;
    });
  }
  function addRule(setId, kind) {
    const text = prompt('Rule text');
    if (!text) return;
    setConfig(prev => {
      const next = deepClone(prev);
      const rs = next.today.ruleSets.find(r => r.id === setId);
      if (kind === 'do') rs.doRules.push({ id:uid(), text, weight:1 });

      return next;
    });
  }

  function renderBusiness() {

          </>
        )}
      </div>
    );
  }

  const onboardingNeeded = !config.userSettings.setupComplete;

  return (
    <div className="mx-auto flex h-full max-w-md flex-col">
      <div className="top-safe px-4 pb-3">
        <div className="flex items-center justify-between">
          <div>
            <div className="text-xs uppercase tracking-[0.2em] text-slate-500">War-Room OS</div>
            <div className="text-lg font-semibold">{currentTabName}</div>
          </div>
          <div className="flex gap-2">
            <button onClick={() => setShowSearch(true)} className="rounded-2xl bg-white/5 px-3 py-2 text-sm tap">Search</button>
            <button onClick={() => setShowQuick(true)} className="rounded-2xl bg-white/5 px-3 py-2 text-sm tap">Capture</button>
          </div>
        </div>
      </div>

      {!installNoteDismissed && (
        <div className="mx-4 mb-3 rounded-2xl border border-white/10 bg-white/5 p-3 text-xs text-slate-300">
          Host this file on GitHub Pages as <code>index.html</code>. This single-file version is app-like and persistent. For a true install prompt and offline cache, a separate manifest and service worker are normally used.
          <button onClick={() => setInstallNoteDismissed(true)} className="ml-2 text-accent-400 tap">Hide</button>
        </div>
      )}

      <div className="flex-1 overflow-y-auto hide-scroll px-4 content-pad">
        {activeTab === 'today' && renderToday()}
        {activeTab === 'legal' && renderLegal()}
        {activeTab === 'money' && renderMoney()}
        {activeTab === 'business' && renderBusiness()}
        {activeTab === 'builder' && renderBuilder()}
        {!['today','legal','money','business','builder'].includes(activeTab) && (
          <Card title="Custom Tab">
            <div className="text-sm text-slate-400">This custom tab exists in navigation. Add modules via Builder or repurpose it later.</div>
          </Card>
        )}
      </div>

      <div className="fixed bottom-0 left-0 right-0 z-40">
        <div className="mx-auto max-w-md px-3 pb-[calc(10px+var(--safe-bottom))]">
          <div className="glass rounded-t-3xl rounded-b-none px-2 py-2 shadow-card">
            <div className="grid grid-cols-5 gap-1">
              {visibleTabs.slice(0,5).map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`rounded-2xl px-2 py-3 text-xs font-medium tap ${activeTab === tab.id ? 'bg-accent-500 text-navy-950' : 'text-slate-400'}`}>
                  {tab.name}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {showQuick && (
        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/55 p-3">
          <div className="glass max-h-[92vh] w-full max-w-md overflow-y-auto rounded-3xl p-4">
            <div className="flex items-center justify-between">
              <div className="text-lg font-semibold">Quick Capture</div>
              <button onClick={() => setShowQuick(false)} className="rounded-full bg-white/5 px-3 py-2 tap">×</button>
            </div>
            <div className="mt-3">
              <Select label="Capture type" value={quickType} onChange={v => { setQuickType(v); setQuickValue({ date:todayKey }); }} options={config.quickCapture.types.map(t => t.id)} />
              <div className="mt-2 text-xs text-slate-500">{quickDef?.name}</div>
            </div>
            <div className="mt-4">
              <QuickForm config={config} typeDef={quickDef} value={quickValue} onChange={setQuickValue} />
            </div>
            <div className="mt-4 flex gap-2">
              <button onClick={saveQuickCapture} className="flex-1 rounded-2xl bg-accent-500 px-4 py-3 font-semibold text-navy-950 tap">Save</button>
              <button onClick={() => setShowQuick(false)} className="rounded-2xl bg-white/10 px-4 py-3 tap">Cancel</button>
            </div>
          </div>
        </div>
      )}

      {showSearch && (
        <div className="fixed inset-0 z-50 flex items-start justify-center bg-black/55 p-3 pt-10">
          <div className="glass max-h-[92vh] w-full max-w-md overflow-y-auto rounded-3xl p-4">
            <div className="flex items-center justify-between">
              <div className="text-lg font-semibold">Global Search</div>
              <button onClick={() => setShowSearch(false)} className="rounded-full bg-white/5 px-3 py-2 tap">×</button>
            </div>
            <div className="mt-3">
              <Input value={searchQuery} onChange={setSearchQuery} placeholder="Search tasks, legal items, expenses, leads, notes…" />
            </div>
            <div className="mt-4 space-y-2">
              {results.map(res => (
                <button key={res.id} onClick={() => { setActiveTab(res.tab); setShowSearch(false); }} className="w-full rounded-2xl bg-white/5 px-3 py-3 text-left tap">
                  <div className="flex justify-between gap-2">
                    <div className="text-sm font-medium">{res.title}</div>
                    <Badge>{res.type}</Badge>
                  </div>
                  <div className="mt-1 text-xs text-slate-400">{prettifyDate(res.date)} · open in {res.tab}</div>
                </button>
              ))}
              {!results.length && searchQuery && <div className="text-sm text-slate-500">No results.</div>}
            </div>
          </div>
        </div>
      )}

      {onboardingNeeded && (
        <div className="fixed inset-0 z-[70] flex items-start justify-center overflow-y-auto bg-black/70 p-3 pt-8">
          <div className="glass w-full max-w-md rounded-3xl p-4">
            <div className="text-lg font-semibold">First-Time Setup</div>
            <div className="mt-1 text-sm text-slate-400">Set the defaults. Everything remains editable in Builder.</div>
            <div className="mt-4 grid gap-3">
              <Input label="Your name" value={config.userSettings.name} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, name:v } }))} />
              <Input label="App title" value={config.app.title} onChange={v => setConfig(prev => ({ ...prev, app:{ ...prev.app, title:v } }))} />
              <Input label="Wake time" type="time" value={config.userSettings.wakeTime} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, wakeTime:v } }))} />
              <Input label="Sleep target" type="number" step="0.5" value={config.userSettings.sleepTarget} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, sleepTarget:Number(v) } }))} />
              <Input label="Weekly review day" value={config.userSettings.weeklyReviewDay} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, weeklyReviewDay:v } }))} />
              <Input label="Weekly review time" type="time" value={config.userSettings.weeklyReviewTime} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, weeklyReviewTime:v } }))} />
              <Input label="Emergency fund target" type="number" value={config.userSettings.emergencyFundTarget} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, emergencyFundTarget:Number(v) } }))} />
              <Input label="Goal name" value={config.challenge.goalName} onChange={v => setConfig(prev => ({ ...prev, challenge:{ ...prev.challenge, goalName:v } }))} />
              <Input label="Goal days" type="number" value={config.challenge.goalDays} onChange={v => setConfig(prev => ({ ...prev, challenge:{ ...prev.challenge, goalDays:Number(v) } }))} />
              <Toggle label="Enable AI coach" checked={!!config.userSettings.modules.aiCoach} onChange={() => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, modules:{ ...prev.userSettings.modules, aiCoach:!prev.userSettings.modules.aiCoach } } }))} />
              <Toggle label="Enable health widgets" checked={!!config.userSettings.modules.healthWidgets} onChange={() => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, modules:{ ...prev.userSettings.modules, healthWidgets:!prev.userSettings.modules.healthWidgets } } }))} />
              <Toggle label="Enable business CRM" checked={!!config.userSettings.modules.businessCRM} onChange={() => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, modules:{ ...prev.userSettings.modules, businessCRM:!prev.userSettings.modules.businessCRM } } }))} />
              <button onClick={() => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, setupComplete:true } }))} className="mt-2 rounded-2xl bg-accent-500 px-4 py-3 font-semibold text-navy-950 tap">Start OS</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
