<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1226" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stability Lite" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Stability Lite</title>
  <link rel="manifest" href="./manifest.json" />
  <style>
    :root{
      --bg:#070d1b;--bg2:#0f1a33;--panel:rgba(18,30,56,.72);--panel2:rgba(30,45,79,.58);--text:#e7ecff;
      --muted:#9eb1d8;--teal:#41d9cf;--cyan:#57b6ff;--violet:#9f8fff;--warn:#ff7f78;
      --ok:#6ce39d;--safe-top:env(safe-area-inset-top,12px);--safe-bottom:env(safe-area-inset-bottom,12px);
    }
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;color:var(--text);
      background:radial-gradient(circle at 12% 0%, #173163 0, transparent 35%),radial-gradient(circle at 92% 8%, #302e61 0, transparent 30%),linear-gradient(180deg,var(--bg),#091327 60%,#0b1324);
    }
    #app{max-width:950px;margin:0 auto;padding:calc(var(--safe-top) + 12px) 14px calc(var(--safe-bottom) + 88px)}
    .glass{background:var(--panel);border:1px solid rgba(174,205,255,.18);backdrop-filter:blur(14px);border-radius:20px;box-shadow:0 16px 30px rgba(0,0,0,.25)}
    .row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1 1 180px}
    .card{padding:14px}.title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.big{font-size:34px;font-weight:800}
    .pill{padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px}
    .btn{border:1px solid rgba(165,197,251,.24);background:var(--panel2);color:var(--text);padding:10px 12px;border-radius:12px;cursor:pointer}
    .btn.primary{background:linear-gradient(135deg,#2f8cff,#32c9c1);color:#061124;border:none;font-weight:700}
    .btn.warn{background:rgba(255,127,120,.14);border-color:rgba(255,127,120,.35)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    input,textarea,select{width:100%;background:rgba(2,8,21,.45);border:1px solid rgba(163,192,245,.2);color:var(--text);border-radius:12px;padding:10px;font:inherit}
    textarea{min-height:90px;resize:vertical}
    label{display:block;font-size:12px;color:var(--muted);margin:8px 0}
    .list{display:grid;gap:8px}.item{background:rgba(9,18,37,.75);border:1px solid rgba(151,188,251,.16);padding:10px;border-radius:12px}
    .nav{position:fixed;left:0;right:0;bottom:0;padding:8px 10px calc(var(--safe-bottom) + 8px);display:flex;justify-content:center;background:linear-gradient(180deg,transparent,rgba(3,8,18,.85) 30%)}
    .nav .inner{display:flex;gap:7px;background:rgba(6,14,30,.82);border:1px solid rgba(156,191,255,.21);padding:6px;border-radius:14px}
    .tab{padding:10px 12px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-weight:700}
    .tab.active{background:linear-gradient(130deg,#2f8cff,#44d8cc);color:#081226}
    .muted{color:var(--muted)} .danger{color:var(--warn)} .ok{color:var(--ok)}
    .hidden{display:none}
    .modal{position:fixed;inset:0;background:rgba(3,7,16,.7);display:flex;align-items:center;justify-content:center;padding:14px}
    .modal-body{max-height:85vh;overflow:auto;max-width:760px;width:100%}
    .k{font-size:12px;color:var(--muted)}
    progress{width:100%;height:10px}
    .status{font-size:12px;margin-top:8px;color:var(--muted)}
    .status.ok{color:var(--ok)}
    .status.err{color:var(--warn)}
    .banner{margin-top:10px;padding:10px 12px;border-radius:12px;background:rgba(87,182,255,.14);border:1px solid rgba(87,182,255,.35);font-size:13px}
    .toast-wrap{position:fixed;right:14px;top:calc(var(--safe-top) + 10px);z-index:50;display:grid;gap:8px}
    .toast{padding:10px 12px;border-radius:12px;background:rgba(14,26,50,.95);border:1px solid rgba(150,188,255,.35);font-size:12px;max-width:320px}
    .toast.ok{border-color:rgba(108,227,157,.45)} .toast.err{border-color:rgba(255,127,120,.45)}
    .spin{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toastWrap"></div>
<div class="nav"><div class="inner" id="bottomNav"></div></div>
<script>
(()=>{
'use strict';
const APP_VERSION = 7;
const LS_NEW = 'stability_lite_state_v1';
const LS_OLD = ['stability_os_data_v5','stability_os_config_v5','stability_os_data_v4','stability_os_config_v4'];
const uid = ()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-5);
const todayKey = ()=>new Date().toISOString().slice(0,10);
const deep = (x)=>JSON.parse(JSON.stringify(x));
const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));
const asArr=(x)=>Array.isArray(x)?x:[];

const defaultState = ()=>({
  version: APP_VERSION,
  settings:{appTitle:'Stability Lite',activeGoalName:'Execution Sprint',goalLengthDays:30,currentDay:1,goalStartDate:todayKey(),
    ai:{enabled:false,endpoint:'https://openrouter.ai/api/v1/chat/completions',model:'',apiKey:'',siteUrl:'',siteName:'Stability Lite',systemPrompt:'Refine summaries and next actions.'},
    ui:{themeVariant:'indigo',installNoticeDismissed:false,memoryMode:false,freshRunResetAt:''}
  },
  builder:{
    morningQuestions:['What matters most today?','Biggest risk?','How will I protect focus?'],
    eveningQuestions:['What went well?','What slipped?','What will I improve tomorrow?'],
    nightQuestions:['Day review snapshot','Tomorrow plan summary'],
    doRules:[
      {id:uid(),text:'Wake by target time',points:4},
      {id:uid(),text:'Water after waking',points:4},
      {id:uid(),text:'Meditation completed',points:4},
      {id:uid(),text:'Visualisation completed',points:4},
      {id:uid(),text:'First focus block completed',points:5},
      {id:uid(),text:'Total learning target completed',points:5},
      {id:uid(),text:'Day-end review completed',points:5},
      {id:uid(),text:'Tomorrow plan completed',points:4}
    ],
    dontRules:[
      {id:uid(),text:'Social media / reels / shorts',points:8},
      {id:uid(),text:'Sugar / biscuit / cake',points:5},
      {id:uid(),text:'Random research drift',points:5},
      {id:uid(),text:'AI drift',points:4},
      {id:uid(),text:'Unplanned nap',points:3}
    ],
    learningBlockTemplates:[{id:uid(),title:'SQL Practice',minutes:45,category:'learning'},{id:uid(),title:'Power BI Build',minutes:60,category:'builder'}],
    scoring:{doMax:35,learningMax:25,taskMax:20,journalMax:20,dontPenaltyCap:25,taskTypePoints:{primary:6,secondary:4,admin:3,learning:4,review:3,misc:2}}
  },
  days:{},
  taskBoard:{backlog:[],templates:[]},
  ideas:[],
  backups:{},
  archive:{legacyHistory:[]},
  migration:{status:'fresh',notes:[],migratedAt:new Date().toISOString()},
  _legacy:{}
});

function ensureDay(day){
  return Object.assign({
    rawTodayDump:'',rawTomorrowDump:'',parsePreviewToday:null,parsePreviewTomorrow:null,doChecked:{},dontChecked:{},learningBlocks:[],tomorrowBlocks:[],tasks:[],
    morningEntry:{},eveningEntry:{},nightEntry:{review:''},summary:'',wins:[],weaknesses:[],
    score:{doEarned:0,learningEarned:0,taskEarned:0,journalEarned:0,penaltyLost:0,final:0},
    status:{closed:false,closedAt:null},appliedFingerprints:{todayDump:[],tomorrowDump:[]},tomorrowPlanSummary:''
  }, day||{});
}

function parseDuration(txt){
  const re = /(\d+(?:\.\d+)?)\s*(hours?|hrs?|hr|h|minutes?|mins?|min|m)\b/i;
  const m = String(txt||'').match(re);
  if(!m) return 0;
  const n = Number(m[1]||0); if(!Number.isFinite(n)) return 0;
  const u = m[2].toLowerCase();
  return /h|hour|hr/.test(u) ? Math.round(n*60) : Math.round(n);
}
function parseClockTime(line){
  const s = String(line||'');
  const m = s.match(/\b(\d{1,2})(?::(\d{2}))\s*(am|pm)?\b/i);
  if(!m) return '';
  const hRaw = Number(m[1]); const mm = Number(m[2]||0); const ap=(m[3]||'').toLowerCase();
  const matched = m[0];
  if(!matched.includes(':') && !ap) return '';
  const after = s.slice((m.index||0)+matched.length).trim().toLowerCase();
  if(!matched.includes(':') && /^(min|mins|minutes|m|hour|hr|h)\b/.test(after)) return '';
  let h = hRaw;
  if(ap==='pm' && h<12) h+=12;
  if(ap==='am' && h===12) h=0;
  if(h>23 || mm>59) return '';
  return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
function hashFinger(text){let h=2166136261; for(const c of String(text||'')){h^=c.charCodeAt(0); h+= (h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24);} return (h>>>0).toString(16);}

function parseDump(text, mode='today'){
  const lines = String(text||'').split(/\n+/).map(v=>v.trim()).filter(Boolean);
  const out = {suggestedDo:[],suggestedDont:[],learningBlocks:[],completedTasks:[],summary:'',wins:[],weaknesses:[],warnings:[],confidence:0.65,aiUsed:false,tomorrowTasks:[],priorities:[]};
  const topicMap=[
    ['power bi','Power BI'],['t sql','SQL / T-SQL'],['tsql','SQL / T-SQL'],['sql','SQL / T-SQL'],
    ['quiz','Quiz'],['revision','Revision'],['learning','Learning'],['meditation','Meditation'],['visualisation','Visualisation']
  ];
  for(const line of lines){
    const l = line.toLowerCase();
    if(/done|finished|completed|achieved|wrapped|sent|submitted|closed|resolved|\[x\]|✅/.test(l)) out.completedTasks.push(line.replace(/^[-*]\s*/,''));
    if(/win|good|focused|strong|progress|kept|disciplined|on time/.test(l)) out.wins.push(line);
    if(/slip|weak|drift|late|miss|distract|delay|procrast|avoid|stuck/.test(l)) out.weaknesses.push(line);
    if(/social media|reels|shorts|distraction|tab switching|random research|ai drift|nap/.test(l)) out.suggestedDont.push(line);
    if(/sugar|biscuit|cake/.test(l)) out.suggestedDont.push(line);
    if(/do\b|completed\b|done\b/.test(l)) out.suggestedDo.push(line);

    const minutes = parseDuration(line);
    const time = parseClockTime(line);
    let topic=''; for(const [k,v] of topicMap){ if(l.includes(k)){topic=v; break;}}
    if(topic && minutes>0) {
      const category = /meditation|visualisation/.test(l) ? 'wellbeing' : 'learning';
      out.learningBlocks.push({id:uid(),label:topic,minutes,startTime:time,category,note:line,completed:true});
    }

    if(mode==='tomorrow' && /tomorrow|next|plan|priority|must/.test(l)){
      out.tomorrowTasks.push({id:uid(),title:line.replace(/^[-*]\s*/,''),type:/primary/.test(l)?'primary':'misc',completed:false,priority:/high|urgent|must/.test(l)?'high':'medium',dueDate:'',tag:'',notes:''});
      if(/primary|urgent|must/.test(l)) out.priorities.push(line);
    }
  }
  out.completedTasks = [...new Set(out.completedTasks)].map(t=>({id:uid(),title:t,type:'review',completed:true,priority:'medium',dueDate:'',tag:'',notes:''}));
  out.suggestedDo = [...new Set(out.suggestedDo)].slice(0,8);
  out.suggestedDont = [...new Set(out.suggestedDont)].slice(0,8);
  out.wins = [...new Set(out.wins)].slice(0,6);
  out.weaknesses = [...new Set(out.weaknesses)].slice(0,6);
  out.summary = lines.slice(0,3).join(' | ') || 'No summary generated yet.';
  if(lines.length<2){ out.warnings.push('Very short dump; parser confidence reduced.'); out.confidence=0.35; }
  if(lines.length>10) out.confidence=0.85;
  return out;
}
const parseTodayDump = (text)=>parseDump(text,'today');
const parseTomorrowDump = (text)=>parseDump(text,'tomorrow');

function safeAIRefine(preview, raw){
  const ai = state.settings.ai;
  if(!ai.enabled || !ai.endpoint || !ai.model || !ai.apiKey) return Promise.resolve({...preview,warnings:[...(preview.warnings||[]),'AI unavailable: fill endpoint/model/key or enable AI.'],aiUsed:false});
  const body = {model:ai.model,messages:[{role:'system',content:ai.systemPrompt||'Refine parser output.'},{role:'user',content:`Raw dump:\n${raw}\n\nCurrent JSON:\n${JSON.stringify(preview)}`}],temperature:.2};
  return fetch(ai.endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ai.apiKey,'HTTP-Referer':ai.siteUrl||'','X-Title':ai.siteName||'Stability Lite'},body:JSON.stringify(body)})
    .then(r=>r.json()).then(j=>{
      const txt = j?.choices?.[0]?.message?.content || '';
      const m = txt.match(/\{[\s\S]*\}/);
      if(!m) throw new Error('No JSON from AI');
      const parsed = JSON.parse(m[0]);
      return Object.assign({}, preview, parsed, {aiUsed:true});
    }).catch(err=>({...preview,warnings:[...(preview.warnings||[]),`AI refine failed: ${err.message}`],aiUsed:false}));
}

function fromOldState(){
  const out = defaultState();
  const rawData = readJSON('stability_os_data_v5') || readJSON('stability_os_data_v4') || null;
  const rawConfig = readJSON('stability_os_config_v5') || readJSON('stability_os_config_v4') || null;
  if(!rawData && !rawConfig) return null;
  out.migration.status='migrated';
  out.migration.notes.push('Migrated from Stability OS v4/v5 localStorage.');
  out._legacy = {config:rawConfig||{},data:rawData||{}};

  if(rawConfig){
    out.settings.appTitle = rawConfig.app?.title || out.settings.appTitle;
    out.settings.activeGoalName = rawConfig.challenge?.goalName || out.settings.activeGoalName;
    out.settings.goalLengthDays = Number(rawConfig.challenge?.goalDays || out.settings.goalLengthDays);
    out.settings.currentDay = Number(rawConfig.challenge?.currentDay || out.settings.currentDay);
    out.settings.goalStartDate = rawConfig.challenge?.startedAt || out.settings.goalStartDate;
    const rs = rawConfig.today?.ruleSets?.[0] || {};
    const doRules = asArr(rs.doRules).map(r=>({id:r.id||uid(),text:r.text||'DO rule',points:Math.max(1,Math.round(Number(r.weight||5)))}));
    const dontRules = asArr(rs.dontRules).map(r=>({id:r.id||uid(),text:r.text||"DON'T rule",points:Math.max(1,Math.round(Math.abs(Number(r.weight||5))))}));
    if(doRules.length) out.builder.doRules = doRules;
    if(dontRules.length) out.builder.dontRules = dontRules;
    if(Array.isArray(rawConfig.today?.morningQuestions)) out.builder.morningQuestions = rawConfig.today.morningQuestions;
    if(Array.isArray(rawConfig.today?.eveningQuestions)) out.builder.eveningQuestions = rawConfig.today.eveningQuestions;
    if(rawConfig.ai) out.settings.ai = Object.assign(out.settings.ai,{enabled:!!rawConfig.ai.enabled,endpoint:rawConfig.ai.endpoint||out.settings.ai.endpoint,model:rawConfig.ai.model||'',apiKey:rawConfig.ai.apiKey||'',siteUrl:rawConfig.ai.siteUrl||'',siteName:rawConfig.ai.siteName||'Stability Lite',systemPrompt:rawConfig.ai.systemMode||out.settings.ai.systemPrompt});
  }
  if(rawData?.today?.dailyLogs){
    Object.entries(rawData.today.dailyLogs).forEach(([d,v])=>{
      const day = ensureDay();
      day.rawTodayDump = v.todayDump || '';
      day.rawTomorrowDump = v.tomorrowDump || '';
      day.parsePreviewToday = v.todayDumpParsed || null;
      day.parsePreviewTomorrow = v.tomorrowDumpParsed || null;
      day.learningBlocks = asArr(v.workBlocks).map(b=>({id:uid(),label:b.topic||'Learning',minutes:Number(b.durationMin||b.minutes||25),startTime:b.time||'',category:'learning',note:b.notes||'',completed:true}));
      day.tasks = [];
      if(v.primaryMit) day.tasks.push({id:uid(),title:v.primaryMit,type:'primary',completed:!!v.coreCompleted?.primary,priority:'high',dueDate:d,tag:'MIT',notes:''});
      if(v.secondaryMit) day.tasks.push({id:uid(),title:v.secondaryMit,type:'secondary',completed:!!v.coreCompleted?.secondary,priority:'medium',dueDate:d,tag:'MIT',notes:''});
      if(v.adminBlock) day.tasks.push({id:uid(),title:v.adminBlock,type:'admin',completed:!!v.coreCompleted?.admin,priority:'low',dueDate:d,tag:'admin',notes:''});
      if(Array.isArray(v.tomorrowChecklist)) {
        v.tomorrowChecklist.forEach(t=>day.tasks.push({id:uid(),title:String(t),type:'review',completed:false,priority:'medium',dueDate:'',tag:'tomorrow',notes:'',tomorrow:true}));
      }
      day.doChecked = v.rulesState || {};
      day.dontChecked = {
        sugar: !!v.sugarBreach,
        social: !!(v.leaks||[]).find(x=>String(x).toLowerCase().includes('social'))
      };
      day.morningEntry = v.journalMorning || {};
      day.eveningEntry = v.journalEvening || {};
      day.nightEntry = {review:v.review||''};
      day.summary = v.daySummary || '';
      day.wins = asArr(v.wins);
      day.weaknesses = asArr(v.weaknesses);
      day.status = {closed:!!v.completedAt,closedAt:v.completedAt||null};
      day.appliedFingerprints = {
        todayDump: asArr(v.appliedFingerprints?.todayDump).map(x=>String(x)),
        tomorrowDump: asArr(v.appliedFingerprints?.tomorrowDump).map(x=>String(x))
      };
      day.tomorrowBlocks = asArr(v.tomorrowBlocks).map(b=>({id:b.id||uid(),label:b.label||b.title||'Block',minutes:Number(b.minutes||25),startTime:b.startTime||b.time||'',category:b.category||'learning',note:b.note||'',completed:!!b.completed}));
      if(v.todayDumpParsed?.workBlocks) {
        day.learningBlocks = uniqueBy([...(day.learningBlocks||[]), ...asArr(v.todayDumpParsed.workBlocks).map(b=>({id:uid(),label:b.topic||'Learning',minutes:Number(b.durationMin||25),startTime:b.time||'',category:'learning',note:b.notes||'',completed:true}))], b=>`${String(b.label).toLowerCase()}|${Number(b.minutes)||0}|${b.startTime||''}`);
      }
      if(v.scoreComputed || v.scoreBreakdown) {
        const legacy = v.scoreBreakdown || {};
        day.score = {
          doEarned: Number(legacy.doEarned || 0),
          learningEarned: Number(legacy.workEarned || legacy.learningEarned || 0),
          taskEarned: Number(legacy.taskEarned || 0),
          journalEarned: Number(legacy.journalEarned || 0),
          penaltyLost: Number(legacy.penaltyLost || 0),
          final: Number(v.scoreComputed || legacy.final || 0)
        };
      }
      out.days[d]=day;
    });
  }
  if(rawData?.today?.history){
    asArr(rawData.today.history).forEach(h=>{
      if(h?.date && !out.days[h.date]) out.days[h.date]=ensureDay({summary:h.summary||'',score:h.score||ensureDay().score,status:{closed:true,closedAt:h.closedAt||null}});
      if(h?.date && out.days[h.date]){
        out.days[h.date].wins = asArr(h.wins || out.days[h.date].wins);
        out.days[h.date].weaknesses = asArr(h.weaknesses || out.days[h.date].weaknesses);
      }
    });
  }
  if(Array.isArray(rawData?.legal?.tasks)){
    out.taskBoard.backlog = uniqueBy(rawData.legal.tasks.map(t=>({id:uid(),title:t.title||'Legacy task',type:'misc',completed:!!t.completed,priority:String(t.priority||'medium').toLowerCase(),dueDate:t.dueDate||'',tag:'legacy-legal',notes:t.notes||''})), t=>`${t.title}|${t.dueDate}`);
  }
  if(rawData?.legal || rawData?.money || rawData?.business || rawData?.support || rawData?.kernel) out.migration.notes.push('Preserved removed modules under _legacy for safety.');
  return out;
}

const memoryStore = {};
function storageAvailable(){
  try{
    const k='__stability_probe__';
    localStorage.setItem(k,'1'); localStorage.removeItem(k);
    return true;
  }catch{ return false; }
}
let MEMORY_MODE = !storageAvailable();
function readJSON(k){
  try{
    if(MEMORY_MODE) return JSON.parse(memoryStore[k] || 'null');
    return JSON.parse(localStorage.getItem(k)||'null');
  }catch{return null}
}
function loadState(){
  const fresh = readJSON(LS_NEW);
  if(fresh && fresh.version) return hydrate(fresh);
  const migrated = fromOldState();
  return hydrate(migrated || defaultState());
}
function hydrate(s){
  const d = defaultState();
  const out = Object.assign(d,s||{});
  out.version = APP_VERSION;
  out.days = out.days||{};
  out.builder = Object.assign(d.builder,out.builder||{});
  out.settings = Object.assign(d.settings,out.settings||{});
  out.archive = Object.assign(d.archive,out.archive||{});
  out.builder.scoring = Object.assign(d.builder.scoring, out.builder.scoring||{});
  out.builder.scoring.taskTypePoints = Object.assign({primary:6,secondary:4,admin:3,learning:4,review:3,misc:2}, out.builder.scoring.taskTypePoints||{});
  Object.keys(out.days).forEach(k=>out.days[k]=ensureDay(out.days[k]));
  if(!out.days[todayKey()]) out.days[todayKey()] = ensureDay();
  out.settings.ui = Object.assign(d.settings.ui,out.settings.ui||{});
  out.settings.ui.memoryMode = MEMORY_MODE;
  return out;
}

let state = loadState();
applyFreshRunResetIfNeeded();
let activeTab = 'dashboard';
let modalDay = null;
let applyLock = false;
let actionStatus = {};
let deferredInstallPrompt = null;
const buttonMeta = {};

function save(){
  try{
    if(MEMORY_MODE) memoryStore[LS_NEW] = JSON.stringify(state);
    else localStorage.setItem(LS_NEW, JSON.stringify(state));
  }catch{
    MEMORY_MODE = true;
    state.settings.ui.memoryMode = true;
    memoryStore[LS_NEW] = JSON.stringify(state);
  }
}
function day(){ const k=todayKey(); if(!state.days[k]) state.days[k]=ensureDay(); return state.days[k]; }
function recalcPersist(){ try{ computeScore(day()); save(); }catch{} }
function setActionStatus(key,status,msg=''){ actionStatus[key]={status,msg,at:Date.now()}; }
function statusText(key){ return actionStatus[key]?.msg || ''; }
function pushToast(msg,tone='ok'){
  const wrap = document.getElementById('toastWrap');
  if(!wrap) return;
  const el = document.createElement('div');
  el.className = `toast ${tone}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}
function setBtnState(id, state='idle'){
  const btn = document.getElementById(id); if(!btn) return;
  if(!buttonMeta[id]) buttonMeta[id] = {text:btn.textContent};
  if(state==='working'){ btn.disabled = true; btn.innerHTML = `<span class=\"spin\"></span> Working`; }
  else if(state==='done'){ btn.disabled = false; btn.textContent = 'Done'; setTimeout(()=>{ if(document.getElementById(id)) document.getElementById(id).textContent = buttonMeta[id].text; }, 500); }
  else { btn.disabled = false; btn.textContent = buttonMeta[id].text; }
}
function uniqueBy(arr, keyFn){
  const seen = new Set();
  return (arr||[]).filter(item=>{
    const k = keyFn(item);
    if(seen.has(k)) return false;
    seen.add(k);
    return true;
  });
}
function applyFreshRunResetIfNeeded(){
  const today = todayKey();
  if(state.settings.ui.freshRunResetAt === today) return;
  const priorDays = Object.keys(state.days).filter(k=>k!==today);
  const archived = priorDays.map(k=>({
    date:k,
    label:'Legacy Seeded History / Previous Attempt',
    data:deep(state.days[k]||{})
  }));
  if(archived.length){
    state.archive.legacyHistory = [...archived, ...asArr(state.archive.legacyHistory)];
  }
  priorDays.forEach(k=>{
    state.days[k] = ensureDay(state.days[k]);
    state.days[k].status = Object.assign(state.days[k].status||{}, {attemptLabel:'Legacy Seeded History / Previous Attempt'});
  });
  state.settings.activeGoalName = 'Fresh 30-Day Run';
  state.settings.goalLengthDays = 30;
  state.settings.currentDay = 1;
  state.settings.goalStartDate = today;
  state.days[today] = ensureDay();
  state.settings.ui.freshRunResetAt = today;
  state.migration.notes = uniqueBy([`Fresh run reset on ${today}`, ...(state.migration.notes||[])], x=>x);
}

function computeScore(d){
  const sc = state.builder.scoring;
  const doPoints = clamp(state.builder.doRules.reduce((sum,r)=>sum + (d.doChecked[r.id]?Number(r.points||0):0),0),0,sc.doMax);
  const learnDone = d.learningBlocks.filter(b=>b.completed).reduce((s,b)=>s+Number(b.minutes||0),0);
  const learningPoints = clamp(Math.round((learnDone/180)*sc.learningMax),0,sc.learningMax);
  const taskPoints = clamp(d.tasks.filter(t=>t.completed).reduce((s,t)=>s+Number(sc.taskTypePoints[t.type]||2),0),0,sc.taskMax);
  const journalFilled = (Object.values(d.morningEntry).some(Boolean)?1:0)+(Object.values(d.eveningEntry).some(Boolean)?1:0)+(d.nightEntry.review?1:0);
  const journalPoints = clamp(Math.round((journalFilled/3)*sc.journalMax),0,sc.journalMax);
  const penalty = clamp(state.builder.dontRules.reduce((sum,r)=>sum+(d.dontChecked[r.id]?Number(r.points||0):0),0),0,sc.dontPenaltyCap);
  d.score = {doEarned:doPoints,learningEarned:learningPoints,taskEarned:taskPoints,journalEarned:journalPoints,penaltyLost:penalty,final:clamp(doPoints+learningPoints+taskPoints+journalPoints-penalty,0,100)};
}

  on('installAppBtn', async()=>{
    if(!deferredInstallPrompt){ pushToast('Install prompt not available yet.','err'); return; }
    try{
      await deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      pushToast('Install prompt shown.','ok');

      ui();

      pushToast('Install prompt failed.','err');

  });

  if(byId('rawTodayDump')) byId('rawTodayDump').oninput=e=>{d.rawTodayDump=e.target.value;save();};
  if(byId('rawTomorrowDump')) byId('rawTomorrowDump').oninput=e=>{d.rawTomorrowDump=e.target.value;save();};
  on('parseToday',()=>{ setBtnState('parseToday','working'); d.parsePreviewToday=parseTodayDump(d.rawTodayDump); d.parsePreviewToday.aiUsed=false; setActionStatus('today','ok','Parsed locally.'); pushToast('Today dump parsed.','ok'); setBtnState('parseToday','done'); ui();});
  on('parseTomorrow',()=>{ setBtnState('parseTomorrow','working'); d.parsePreviewTomorrow=parseTomorrowDump(d.rawTomorrowDump); d.parsePreviewTomorrow.aiUsed=false; setActionStatus('tomorrow','ok','Tomorrow dump parsed.'); pushToast('Tomorrow dump parsed.','ok'); setBtnState('parseTomorrow','done'); ui();});
  on('aiToday',async()=>{ setBtnState('aiToday','working'); setActionStatus('today','', 'AI refine working...'); const local = parseTodayDump(d.rawTodayDump); const refined = await safeAIRefine(local, d.rawTodayDump); d.parsePreviewToday = Object.assign({}, local, refined, {aiUsed:!!refined.aiUsed, providerError: refined.aiUsed ? '' : (refined.warnings||[]).slice(-1)[0]||''}); if(!d.parsePreviewToday.aiUsed) pushToast(d.parsePreviewToday.providerError || 'AI failed; local parse kept.','err'); else pushToast('AI refine complete (today).','ok'); setActionStatus('today', d.parsePreviewToday.aiUsed ? 'ok' : 'err', d.parsePreviewToday.aiUsed ? 'AI refine complete.' : 'AI failed; local parse kept.'); setBtnState('aiToday','done'); ui();});
  on('aiTomorrow',async()=>{ setBtnState('aiTomorrow','working'); setActionStatus('tomorrow','', 'AI refine working...'); const local = parseTomorrowDump(d.rawTomorrowDump); const refined = await safeAIRefine(local, d.rawTomorrowDump); d.parsePreviewTomorrow = Object.assign({}, local, refined, {aiUsed:!!refined.aiUsed, providerError: refined.aiUsed ? '' : (refined.warnings||[]).slice(-1)[0]||''}); if(!d.parsePreviewTomorrow.aiUsed) pushToast(d.parsePreviewTomorrow.providerError || 'AI failed; local parse kept.','err'); else pushToast('AI refine complete (tomorrow).','ok'); setActionStatus('tomorrow', d.parsePreviewTomorrow.aiUsed ? 'ok' : 'err', d.parsePreviewTomorrow.aiUsed ? 'AI refine tomorrow complete.' : 'AI failed; local parse kept.'); setBtnState('aiTomorrow','done'); ui();});
  on('clearToday',()=>{d.rawTodayDump=''; d.parsePreviewToday=null; setActionStatus('today','ok','Cleared today dump.'); pushToast('Today dump cleared.','ok'); ui();});
  on('clearTomorrow',()=>{d.rawTomorrowDump=''; d.parsePreviewTomorrow=null; setActionStatus('tomorrow','ok','Cleared tomorrow dump.'); pushToast('Tomorrow dump cleared.','ok'); ui();});
  on('applyToday',()=>{
    setBtnState('applyToday','working');
    if(applyLock) return; applyLock=true;
    const p = d.parsePreviewToday || parseTodayDump(d.rawTodayDump);
    const fp = hashFinger('today|'+d.rawTodayDump+'|'+JSON.stringify(p));
    d.appliedFingerprints.todayDump = d.appliedFingerprints.todayDump || [];
    if(d.appliedFingerprints.todayDump.includes(fp)){ setActionStatus('today','err','Duplicate apply blocked.'); pushToast('Duplicate today apply blocked.','err'); applyLock=false; setBtnState('applyToday','idle'); return; }
    d._undoToday = deep({learningBlocks:d.learningBlocks,tasks:d.tasks,doChecked:d.doChecked,dontChecked:d.dontChecked,summary:d.summary,wins:d.wins,weaknesses:d.weaknesses});
    d.appliedFingerprints.todayDump.push(fp);
    d.learningBlocks = uniqueBy([...d.learningBlocks, ...asArr(p.learningBlocks)], b=>`${String(b.label||'').toLowerCase()}|${Number(b.minutes)||0}|${b.startTime||''}|${String(b.category||'').toLowerCase()}`);
    d.tasks = uniqueBy([...d.tasks, ...asArr(p.completedTasks)], t=>`${String(t.title||'').toLowerCase()}|${t.type||''}|${t.tomorrow?'t':''}`);
    d.summary = p.summary || d.summary; d.wins = [...new Set([...(d.wins||[]),...(p.wins||[])])]; d.weaknesses=[...new Set([...(d.weaknesses||[]),...(p.weaknesses||[])])];
    state.builder.doRules.forEach(r=>{ if((p.suggestedDo||[]).some(s=>s.toLowerCase().includes((r.text||'').toLowerCase().split(' ')[0]))) d.doChecked[r.id]=true;});
    state.builder.dontRules.forEach(r=>{ if((p.suggestedDont||[]).some(s=>s.toLowerCase().includes((r.text||'').toLowerCase().split(' ')[0]))) d.dontChecked[r.id]=true;});
    setActionStatus('today','ok','Applied preview to today. Undo is available.');
    pushToast('Applied parsed update to today.','ok');
    applyLock=false; setBtnState('applyToday','done'); ui();
  });
  on('undoToday',()=>{ setBtnState('undoToday','working'); if(!d._undoToday){ setBtnState('undoToday','idle'); return; } Object.assign(d,d._undoToday); d._undoToday=null; setActionStatus('today','ok','Undid last today apply.'); pushToast('Undo complete.','ok'); setBtnState('undoToday','done'); ui(); });
  on('applyTomorrow',()=>{
    setBtnState('applyTomorrow','working');
    const p = d.parsePreviewTomorrow || parseTomorrowDump(d.rawTomorrowDump);
    const fp = hashFinger('tomorrow|'+d.rawTomorrowDump+'|'+JSON.stringify(p));
    d.appliedFingerprints.tomorrowDump = d.appliedFingerprints.tomorrowDump || [];
    if(d.appliedFingerprints.tomorrowDump.includes(fp)){ setActionStatus('tomorrow','err','Duplicate tomorrow apply blocked.'); pushToast('Duplicate tomorrow apply blocked.','err'); setBtnState('applyTomorrow','idle'); return; }
    d.appliedFingerprints.tomorrowDump.push(fp);
    d.tasks = uniqueBy([...d.tasks,...asArr(p.tomorrowTasks).map(t=>Object.assign(t,{tomorrow:true,completed:false}))], t=>`${String(t.title||'').toLowerCase()}|${t.tomorrow?'t':'f'}|${t.type||''}`);
    d.tomorrowBlocks = uniqueBy([...(d.tomorrowBlocks||[]), ...asArr(p.learningBlocks).map(b=>Object.assign({}, b, {completed:false}))], b=>`${String(b.label||'').toLowerCase()}|${Number(b.minutes)||0}|${b.startTime||''}|${String(b.category||'').toLowerCase()}`);
    d.tomorrowPlanSummary = p.summary || d.tomorrowPlanSummary;
    setActionStatus('tomorrow','ok','Applied tomorrow plan.');
    pushToast('Applied tomorrow plan.','ok');
    setBtnState('applyTomorrow','done');
    ui();
  });

  on('addBlock',()=>{ d.learningBlocks.push({id:uid(),label:prompt('Label?','Learning')||'Learning',minutes:Number(prompt('Minutes?','45')||45),category:prompt('Category?','learning')||'learning',startTime:prompt('Start time (optional)','')||'',note:prompt('Note','')||'',completed:false}); ui(); });
  document.querySelectorAll('[data-act]').forEach(el=>el.onclick=(e)=>handleAction(e.currentTarget.dataset));
  document.querySelectorAll('[data-addtask]').forEach(el=>el.onclick=()=>addTask(el.dataset.addtask));

  if(byId('nightReview')) byId('nightReview').oninput=e=>{d.nightEntry.review=e.target.value; recalcPersist();};
  if(byId('tomorrowSummary')) byId('tomorrowSummary').oninput=e=>{d.tomorrowPlanSummary=e.target.value; recalcPersist();};
  on('closeDay',()=>{
    setBtnState('closeDay','working');
    if(d.status.closed){ pushToast('Day is already closed.','err'); setBtnState('closeDay','idle'); return; }
    const hasReview = !!(d.nightEntry.review||'').trim();
    const hasTomorrow = !!(d.rawTomorrowDump||'').trim() || !!(d.tomorrowPlanSummary||'').trim() || d.tasks.some(t=>t.tomorrow) || asArr(d.tomorrowBlocks).length>0;
    if(!hasReview){ pushToast('Cannot close day: add night review first.','err'); setBtnState('closeDay','idle'); return; }
    if(!hasTomorrow){ pushToast('Cannot close day: add tomorrow dump/tasks/blocks first.','err'); setBtnState('closeDay','idle'); return; }
    d.status={closed:true,closedAt:new Date().toISOString()};
    pushToast('Day closed successfully.','ok');
    setBtnState('closeDay','done');
    ui();
  });
  on('reopenDay',()=>{d.status={closed:false,closedAt:null}; ui();});

  const mapFields = ['wakeTime','intention','mainFocus','risk','mood','energy'];
  mapFields.forEach(k=>{ const el=byId(k); if(el) el.oninput=()=>{d.morningEntry[k==='risk'?'biggestRisk':k]=el.value; recalcPersist();}; });
  ['wentWell','slipped','lesson','improve'].forEach(k=>{ const el=byId(k); if(el) el.oninput=()=>{d.eveningEntry[k==='improve'?'improveTomorrow':k]=el.value; recalcPersist();}; });
  if(byId('nightJournal')) byId('nightJournal').oninput=e=>{d.nightEntry.review=e.target.value; recalcPersist();};
  document.querySelectorAll('[data-jq]').forEach(el=>el.oninput=()=>{
    const k = el.dataset.jq;
    const idx = Number(el.dataset.idx||0);
    if(k==='morning'){ d.morningEntry.answers = d.morningEntry.answers || []; d.morningEntry.answers[idx]=el.value; }
    if(k==='evening'){ d.eveningEntry.answers = d.eveningEntry.answers || []; d.eveningEntry.answers[idx]=el.value; }
    if(k==='night'){ d.nightEntry.answers = d.nightEntry.answers || []; d.nightEntry.answers[idx]=el.value; }
    recalcPersist();
  });

  // builder binds
  [['setAppTitle','appTitle'],['setGoalName','activeGoalName'],['setGoalStart','goalStartDate']].forEach(([id,key])=>{const el=byId(id); if(el) el.oninput=()=>{state.settings[key]=el.value; save();};});
  [['setGoalDays','goalLengthDays'],['setCurrentDay','currentDay']].forEach(([id,key])=>{const el=byId(id); if(el) el.oninput=()=>{state.settings[key]=Number(el.value||1); save();};});
  on('resetGoal',()=>{if(confirm('Reset goal progress?')){state.settings.currentDay=1;state.days={};state.days[todayKey()]=ensureDay();ui();}});
  on('newGoalTemplate',()=>{state.settings.currentDay=1; state.settings.goalStartDate=todayKey(); alert('New goal template staged. Edit fields as needed.'); save();});

  ['scDo','scLearn','scTask','scJournal','scPenalty'].forEach(id=>{const el=byId(id); if(el) el.oninput=()=>{const s=state.builder.scoring; s.doMax=Number(v('scDo')||35);s.learningMax=Number(v('scLearn')||25);s.taskMax=Number(v('scTask')||20);s.journalMax=Number(v('scJournal')||20);s.dontPenaltyCap=Number(v('scPenalty')||25); save();};});
  document.querySelectorAll('[data-tasktype]').forEach(el=>el.oninput=()=>{state.builder.scoring.taskTypePoints[el.dataset.tasktype]=Number(el.value||0); save();});

  [['aiEndpoint','endpoint'],['aiModel','model'],['aiKey','apiKey'],['aiSiteUrl','siteUrl'],['aiSiteName','siteName'],['aiPrompt','systemPrompt']].forEach(([id,key])=>{const el=byId(id); if(el) el.oninput=()=>{state.settings.ai[key]=el.value; save();};});
  const aiE = byId('aiEnabled'); if(aiE) aiE.onchange=()=>{state.settings.ai.enabled=aiE.checked; save();};

  on('addTpl',()=>{state.builder.learningBlockTemplates.push({id:uid(),title:prompt('Title','New template')||'New template',minutes:Number(prompt('Minutes','45')||45),category:prompt('Category','learning')||'learning'}); ui();});
  on('addIdea',()=>{state.ideas.unshift({id:uid(),title:prompt('Idea title','')||'Untitled',description:prompt('Description','')||'',tag:prompt('Tag','')||'',createdAt:new Date().toISOString().slice(0,10),urgency:prompt('Urgency (low/normal/high)','normal')||'normal',note:'',archived:false,important:false}); ui();});

  on('exportJson',()=>{ setBtnState('exportJson','working'); const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='stability-lite-backup.json'; a.click(); URL.revokeObjectURL(a.href); pushToast('Backup exported.','ok'); if(MEMORY_MODE) pushToast('Memory mode active: export is from temporary session state.','err'); setBtnState('exportJson','done');});
  on('importJson',()=>{ setBtnState('importJson','working'); byId('importFile').click(); setBtnState('importJson','done');});
  if(byId('importFile')) byId('importFile').onchange=(e)=>{const f=e.target.files?.[0]; if(!f)return; const fr=new FileReader(); fr.onload=()=>{try{state=hydrate(JSON.parse(fr.result)); state.migration.notes.push('Imported from backup JSON.'); pushToast('Backup imported.','ok'); ui();}catch{pushToast('Invalid JSON import.','err');}}; fr.readAsText(f);};
  on('resetToday',()=>{if(confirm('Reset only today?')){setBtnState('resetToday','working');state.days[todayKey()]=ensureDay(); pushToast('Today reset complete.','ok'); setBtnState('resetToday','done'); ui();}});
  on('resetGoalData',()=>{if(confirm('Reset only current goal data?')){setBtnState('resetGoalData','working');state.days={}; state.settings.currentDay=1; state.settings.goalStartDate=todayKey(); state.days[todayKey()]=ensureDay(); pushToast('Current goal reset complete.','ok'); setBtnState('resetGoalData','done'); ui();}});
  on('fullReset',()=>{if(confirm('Full reset local data?')){setBtnState('fullReset','working');state=defaultState(); applyFreshRunResetIfNeeded(); pushToast('Full reset complete.','ok'); setBtnState('fullReset','done'); ui();}});

  const cm = byId('closeModal'); if(cm) cm.onclick=()=>{modalDay=null; ui();};
}

function addTask(scope){
  const t = {id:uid(),title:prompt('Task title','')||'New task',type:prompt('Type (primary/secondary/admin/learning/review/misc)','misc')||'misc',completed:false,priority:prompt('Priority (low/medium/high)','medium')||'medium',dueDate:prompt('Due date YYYY-MM-DD','')||'',tag:prompt('Tag/category','')||'',notes:prompt('Notes','')||'',tomorrow:scope==='tomorrow'};
  if(scope==='backlog') state.taskBoard.backlog.push(t); else day().tasks.push(t); ui();
}

function handleAction(ds){
  const d = day();
  const i = Number(ds.i||0); const scope = ds.scope;
  const arrForScope=()=> scope==='backlog'?state.taskBoard.backlog : d.tasks.filter(t=>scope==='tomorrow'?t.tomorrow:!t.tomorrow);
  const replaceScope=(newArr)=>{
    if(scope==='backlog') state.taskBoard.backlog=newArr;
    else { const untouched=d.tasks.filter(t=>scope==='tomorrow'?!t.tomorrow:t.tomorrow); d.tasks = scope==='tomorrow'?[...untouched,...newArr]:[...newArr,...untouched]; }
  };
  switch(ds.act){
    case 'toggleBlock': d.learningBlocks[i].completed=!d.learningBlocks[i].completed; break;
    case 'editBlock': {const b=d.learningBlocks[i]; b.label=prompt('Label',b.label)||b.label; b.minutes=Number(prompt('Minutes',String(b.minutes))||b.minutes); b.startTime=prompt('Start',b.startTime)||b.startTime; b.category=prompt('Category',b.category)||b.category; b.note=prompt('Note',b.note)||b.note; } break;
    case 'delBlock': d.learningBlocks.splice(i,1); break;
    case 'doCheck': d.doChecked[ds.id]=!d.doChecked[ds.id]; break;
    case 'dontCheck': d.dontChecked[ds.id]=!d.dontChecked[ds.id]; break;
    case 'taskToggle': {const a=arrForScope(); a[i].completed=!a[i].completed; replaceScope(a);} break;
    case 'taskUp': {const a=arrForScope(); if(i>0){[a[i-1],a[i]]=[a[i],a[i-1]];} replaceScope(a);} break;
    case 'taskDown': {const a=arrForScope(); if(i<a.length-1){[a[i+1],a[i]]=[a[i],a[i+1]];} replaceScope(a);} break;
    case 'taskEdit': {const a=arrForScope(); const t=a[i]; t.title=prompt('Title',t.title)||t.title; t.type=prompt('Type',t.type)||t.type; t.priority=prompt('Priority',t.priority)||t.priority; t.dueDate=prompt('Due date',t.dueDate)||t.dueDate; t.tag=prompt('Tag',t.tag)||t.tag; t.notes=prompt('Notes',t.notes)||t.notes; replaceScope(a);} break;
    case 'taskDel': {const a=arrForScope(); a.splice(i,1); replaceScope(a);} break;
    case 'openHistory': modalDay = ds.day; break;
    case 'ideaEdit': {const x=state.ideas[i]; x.title=prompt('Title',x.title)||x.title; x.description=prompt('Description',x.description)||x.description; x.tag=prompt('Tag',x.tag)||x.tag; x.urgency=prompt('Urgency',x.urgency)||x.urgency; x.note=prompt('Note',x.note)||x.note;} break;
    case 'ideaArchive': state.ideas[i].archived=!state.ideas[i].archived; break;
    case 'ideaTask': d.tasks.push({id:uid(),title:state.ideas[i].title,type:'misc',completed:false,priority:'medium',dueDate:'',tag:state.ideas[i].tag||'idea',notes:state.ideas[i].description||''}); break;
    case 'ideaImportant': state.ideas[i].important=!state.ideas[i].important; break;
    case 'ideaDel': state.ideas.splice(i,1); break;
    case 'ruleUp': move(state.builder[ds.key],i,-1); break;
    case 'ruleDown': move(state.builder[ds.key],i,1); break;
    case 'ruleEdit': {const r=state.builder[ds.key][i]; r.text=prompt('Rule',r.text)||r.text; r.points=Number(prompt('Points',String(r.points))||r.points);} break;
    case 'ruleDel': state.builder[ds.key].splice(i,1); break;
    case 'ruleAdd': state.builder[ds.key].push({id:uid(),text:prompt('Rule text','New rule')||'New rule',points:Number(prompt('Points','5')||5)}); break;
    case 'tplEdit': {const t=state.builder.learningBlockTemplates[i]; t.title=prompt('Title',t.title)||t.title; t.minutes=Number(prompt('Minutes',String(t.minutes))||t.minutes); t.category=prompt('Category',t.category)||t.category;} break;
    case 'tplDel': state.builder.learningBlockTemplates.splice(i,1); break;
    case 'qAdd': state.builder[ds.key].push(prompt('Question','New question')||'New question'); break;
    case 'qEdit': state.builder[ds.key][i]=prompt('Question',state.builder[ds.key][i])||state.builder[ds.key][i]; break;
    case 'qDel': state.builder[ds.key].splice(i,1); break;
  }
  ui();
}
function move(arr,i,delta){const j=i+delta;if(j<0||j>=arr.length)return; [arr[i],arr[j]]=[arr[j],arr[i]];}

window.addEventListener('error',()=>{try{document.getElementById('app').insertAdjacentHTML('afterbegin','<div class="glass card danger">Recovered from runtime error.</div>')}catch{}});
window.addEventListener('unhandledrejection',()=>{try{document.getElementById('app').insertAdjacentHTML('afterbegin','<div class="glass card danger">Recovered from async error.</div>')}catch{}});
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  pushToast('Install is available for this app.','ok');
  ui();
});
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('./service-worker.js').catch(()=>{}); });
}

ui();
})();
</script>
</body>
