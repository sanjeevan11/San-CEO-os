  const next = [...arr];

const prettifyDate = (v) => {

function getHourlyQuote() {
  const hour = new Date().getHours();
  const bucket = hour < 10 ? 'dawn' : hour < 18 ? 'day' : 'evening';

function makeEmptyDailyLog() {
  return deepClone(defaultData.today.dailyLogs[isoToday()]);
}

function normalizeList(items=[]) {
  const seen = new Set();
  return items.filter(Boolean).map(x => String(x).trim()).filter(Boolean).filter(x => {
    const k = x.toLowerCase();
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });
}

function normalizeBlocks(blocks=[]) {
  const seen = new Set();
  return (blocks || []).filter(Boolean).filter(b => {
    const key = `${(b.topic||'').toLowerCase()}|${b.time||''}|${Number(b.durationMin||0)}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function normalizeText(t='') {
  return String(t || '').toLowerCase().replace(/[^\w\s:.-]/g, '').replace(/\s+/g, ' ').trim();
}

function eventFingerprint({ rawText='', selectedTags=[], dayKey='', parserVersion='v1', actionType='' }) {
  return [normalizeText(rawText), normalizeList(selectedTags).join(','), dayKey, parserVersion, actionType].join('|');
}
function stableHash(str='') {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h) + str.charCodeAt(i);
  return (h >>> 0).toString(16);
}

function migrateState(configRaw, dataRaw) {
  const config = { ...deepClone(defaultConfig), ...(configRaw || {}) };
  const data = ensureDataShape({ ...deepClone(defaultData), ...(dataRaw || {}) });
  config.version = APP_VERSION;
  if (!data.today) data.today = { dailyLogs:{}, history:[] };
  if (!data.today.dailyLogs) data.today.dailyLogs = {};
  Object.keys(data.today.dailyLogs).forEach(k => { data.today.dailyLogs[k] = { ...makeEmptyDailyLog(), ...data.today.dailyLogs[k] }; });
  if (!data.today.dailyLogs[isoToday()]) data.today.dailyLogs[isoToday()] = makeEmptyDailyLog();
  if (!Array.isArray(data.today.history)) data.today.history = [];
  data.kernel = ensureKernelShape(data.kernel);
  if (!Array.isArray(data.kernel.runbooks) || !data.kernel.runbooks.length) data.kernel.runbooks = deepClone(defaultData.kernel.runbooks);
  if (!Array.isArray(data.kernel.templateLocker) || !data.kernel.templateLocker.length) data.kernel.templateLocker = deepClone(defaultData.kernel.templateLocker);
  if (!data.kernel.migrations) data.kernel.migrations = deepClone(defaultData.kernel.migrations);
  if (!data.legal.tasks) data.legal.tasks = deepClone(defaultData.legal.tasks);
  if (!data.legal.waiting) data.legal.waiting = deepClone(defaultData.legal.waiting);
  if (!data.legal.promises) data.legal.promises = deepClone(defaultData.legal.promises);
  if (!data.legal.blockers) data.legal.blockers = deepClone(defaultData.legal.blockers);
  if (!data.business.jobApplications) data.business.jobApplications = deepClone(defaultData.business.jobApplications);
  if (!data.support) data.support = deepClone(defaultData.support);
  if (!Array.isArray(data.support.items)) data.support.items = deepClone(defaultData.support.items);
  return { config, data };
}

function parseDump(text='') {
  const lines = String(text || '').split(/\n+/).map(x => x.trim()).filter(Boolean);
  const parsed = { primaryMit:'', secondaryMit:'', deepBlock:'', adminBlock:'', tomorrowTasks:[], workBlocks:[], wins:[], weaknesses:[], leaks:[], summary:'', lesson:'', wakeTime:'', sleepHoursApprox:null, visualisationMinutes:0, meditationMinutes:0, waterIntakeMl:0, noSocialMedia:false, sugarBreach:false, learningMinutes:0 };
  lines.forEach(line => {
    const l = line.toLowerCase();
    const tm = l.match(/(\d{1,2})[:.](\d{2})\s*(am|pm)?/);
    const mins = l.match(/(\d+)\s*(min|mins|minutes|hour|hr|h)/);
    const dMin = mins ? Number(mins[1]) * (['hour','hr','h'].includes(mins[2]) ? 60 : 1) : 0;
    const topic = /t-sql|sql/.test(l) ? 'SQL / T-SQL' : /power bi/.test(l) ? 'Power BI' : /dax/.test(l) ? 'DAX' : /semantic|schematic|quiz|retrieval|mock/.test(l) ? 'Quiz / Retrieval / Mock scenario' : '';
    if (/woke/.test(l) && tm) parsed.wakeTime = `${tm[1].padStart(2,'0')}:${tm[2]}`;
    if (/sleep/.test(l) && l.match(/(\d+)\s*h/)) parsed.sleepHoursApprox = Number((l.match(/(\d+)\s*h/)||[])[1] || 0);
    if (/visualisation/.test(l)) parsed.visualisationMinutes = Math.max(parsed.visualisationMinutes, dMin || 5);
    if (/meditation/.test(l)) parsed.meditationMinutes = Math.max(parsed.meditationMinutes, dMin || 5);
    if (/water/.test(l) && l.match(/(\d+)\s*ml/)) parsed.waterIntakeMl += Number((l.match(/(\d+)\s*ml/)||[])[1] || 0);
    if (/no social media/.test(l)) parsed.noSocialMedia = true;
    if (/biscuit|cake|sugar/.test(l)) parsed.sugarBreach = true;
    if (/admin.*on time|admin task only on time/.test(l)) parsed.adminBlock = parsed.adminBlock || 'admin tasks only on time';
    if (/shallow|distracted|slow/.test(l)) parsed.leaks.push('shallow_or_distracted_block');
    if (/drift|random idea|research/.test(l)) parsed.leaks.push('drift_or_random_research');
    if (/focused|strong/.test(l)) parsed.wins.push('focused block');
    if ((/sql|power bi|quiz|retrieval|mock|dax|semantic/.test(l)) && dMin) {
      parsed.workBlocks.push({ time: tm ? `${tm[1].padStart(2,'0')}:${tm[2]}` : '', durationMin:dMin, topic: topic || 'Learning', notes: line });
      parsed.learningMinutes += dMin;
    }
    if (/tomorrow|must do tomorrow|next day/.test(l)) parsed.tomorrowTasks.push(line.replace(/^[-*]\s*/, ''));
    if (/focus.*sql/.test(l)) parsed.primaryMit = parsed.primaryMit || 'SQL learning';
    if (/power bi/.test(l)) parsed.secondaryMit = parsed.secondaryMit || 'Power BI learning';
    if (/admin.*time|admin.*on time/.test(l)) parsed.adminBlock = 'admin tasks only on time';
    if (/deep block|sql-focused progression/.test(l)) parsed.deepBlock = 'SQL-focused progression';
    if (/no social media|achieved|more focused|completed/.test(l)) parsed.wins.push(line);
    if (/snooze|late|shallow|distract|drift|sugar|sleep debt/.test(l)) parsed.weaknesses.push(line);
    if (/lesson|bottleneck/.test(l)) parsed.lesson = line;
    if (/summary|execution improved|effort was high/.test(l)) parsed.summary = line;
  });
  parsed.workBlocks = normalizeBlocks(parsed.workBlocks);
  parsed.wins = normalizeList(parsed.wins);
  parsed.weaknesses = normalizeList(parsed.weaknesses);
  parsed.tomorrowTasks = normalizeList(parsed.tomorrowTasks);
  return parsed;
}

function parseTimeToken(input='') {
  const s = String(input || '').trim();
  const m = s.match(/(\d{1,2})(?:[:.](\d{2}))?\s*(am|pm)?/i);
  if (!m) return '';
  const hasSeparator = /[:.]\d{2}/.test(m[0]);
  const hasAmPm = /(am|pm)/i.test(m[0]);
  if (!hasSeparator && !hasAmPm) return '';
  const trailing = s.slice(m.index + m[0].length).trim().toLowerCase();
  if (!hasSeparator && /^(min|mins|minutes|hr|hour|h)\b/.test(trailing)) return '';
  let hh = Number(m[1] || 0);
  let mm = Number(m[2] || 0);
  const ap = (m[3] || '').toLowerCase();
  if (ap === 'pm' && hh < 12) hh += 12;
  if (ap === 'am' && hh === 12) hh = 0;
  if (hh > 23 || mm > 59) return '';
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

function parseDumpV2(text='') {
  const raw = String(text || '');
  const normalized = raw.replace(/waked up/ig, 'woke up');
  const lines = normalized.split(/\n+/).map(x => x.trim()).filter(Boolean);
  const parsed = parseDump(normalized);
  parsed.workBlocks = [];
  parsed.learningMinutes = 0;
  lines.forEach(line => {
    const l = line.toLowerCase();
    const t = parseTimeToken(line);
    const d = l.match(/(\d+)\s*(min|mins|minutes|hour|hr|h)/);
    const durationMin = d ? Number(d[1]) * (['hour','hr','h'].includes(d[2]) ? 60 : 1) : 0;
    const hasTopic = /sql|t-sql|power bi|dax|semantic|quiz|retrieval|mock/.test(l);
    const topic = /t-sql|sql/.test(l) ? 'SQL / T-SQL' : /power bi/.test(l) ? 'Power BI' : /dax/.test(l) ? 'DAX' : /quiz|retrieval|mock/.test(l) ? 'Quiz / Retrieval / Mock scenario' : 'Learning';
    if (hasTopic && durationMin > 0) {
      parsed.workBlocks.push({ time:t || '', durationMin, topic, notes:line });
      parsed.learningMinutes += durationMin;
    }
    if (/focus mostly on/.test(l) && /sql|power bi|dax/.test(l)) parsed.primaryMit = parsed.primaryMit || (topic.includes('Power BI') ? 'Power BI learning' : 'SQL learning');
    if (/then.*little power bi|little power bi/.test(l)) parsed.secondaryMit = parsed.secondaryMit || 'Power BI learning';
    if (/admin task only on time|admin on time|follow up|email/.test(l)) parsed.adminBlock = parsed.adminBlock || 'admin tasks only on time';
    if (/biscuit|cake|sugar/.test(l)) parsed.sugarBreach = true;
    if (/social media|reels|shorts/.test(l)) parsed.leaks.push('social_media');
    if (/nap/.test(l)) parsed.leaks.push('nap');
    if (/random idea|research unrelated|switching tabs|researched/.test(l)) parsed.leaks.push('drift');
  });
  parsed.wakeTime = parsed.wakeTime || parseTimeToken((lines.find(l => /woke|wake/.test(l.toLowerCase())) || ''));
  parsed.workBlocks = normalizeBlocks(parsed.workBlocks);
  parsed.wins = normalizeList(parsed.wins || []);
  parsed.weaknesses = normalizeList(parsed.weaknesses || []);
  parsed.tomorrowTasks = normalizeList(parsed.tomorrowTasks || []);
  parsed.leaks = normalizeList(parsed.leaks || []);
  return parsed;
}

function sanitizeParsed(parsed) {
  if (!parsed || typeof parsed !== 'object') return null;
  const safe = {
    primaryMit: String(parsed.primaryMit || ''),
    secondaryMit: String(parsed.secondaryMit || ''),
    deepBlock: String(parsed.deepBlock || ''),
    adminBlock: String(parsed.adminBlock || ''),
    tomorrowTasks: normalizeList(parsed.tomorrowTasks || []),
    workBlocks: normalizeBlocks(parsed.workBlocks || []),
    wins: normalizeList(parsed.wins || []),
    weaknesses: normalizeList(parsed.weaknesses || []),
    summary: String(parsed.summary || ''),
    lesson: String(parsed.lesson || ''),
    wakeTime: String(parsed.wakeTime || ''),
    sleepHoursApprox: Number.isFinite(Number(parsed.sleepHoursApprox)) ? Number(parsed.sleepHoursApprox) : null,
    visualisationMinutes: Number(parsed.visualisationMinutes || 0),
    meditationMinutes: Number(parsed.meditationMinutes || 0),
    waterIntakeMl: Number(parsed.waterIntakeMl || 0),
    noSocialMedia: !!parsed.noSocialMedia,
    sugarBreach: !!parsed.sugarBreach,
    learningMinutes: Number(parsed.learningMinutes || 0),
    leaks: normalizeList(parsed.leaks || [])
  };
  return safe;
}

function safeRead(key, fallback){

}

        </div>
      );
    }
    return this.props.children;
  }
}

    const start = Date.now();
    try {
      await fn();
      const hold = Math.max(0, (opts.minMs || 1700) - (Date.now() - start));
      await new Promise(r => setTimeout(r, hold));
      setActionStates(prev => ({ ...prev, [key]:'success' }));
      showToast('success', opts.success || 'Done');
    } catch (e) {
      console.error(e);
      setActionStates(prev => ({ ...prev, [key]:'error' }));
      showToast('error', opts.failure || 'Action failed');

  async function aiRefineParsed({ kind, rawText, deterministicParsed, appSummary }) {
    if (!config.ai.enabled || !config.ai.apiKey) return { parsed:deterministicParsed, aiUsed:false, providerError:'ai_disabled_or_no_key', latencyMs:0 };
    const t0 = Date.now();
    const prompt = `Return strict JSON only. kind=${kind}. deterministicParsed=${JSON.stringify(deterministicParsed)} rawText=${rawText} context=${appSummary}`;
    const payload = {
      model: config.ai.model,
      messages: [
        { role:'system', content:'Return JSON only with keys: summary,wins,weaknesses,lesson,suggestedTomorrowTasks,confidence,uncertainty' },
        { role:'user', content: prompt }
      ]
    };
    const res = await fetch(config.ai.endpoint, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':`Bearer ${config.ai.apiKey}`,
        ...(config.ai.siteUrl ? { 'HTTP-Referer':config.ai.siteUrl } : {}),
        ...(config.ai.siteName ? { 'X-Title':config.ai.siteName } : {})
      },
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    const text = json?.choices?.[0]?.message?.content || '';
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) return { parsed:deterministicParsed, aiUsed:false, error:'No JSON from AI', latencyMs:Date.now()-t0 };
    try {
      const ai = JSON.parse(match[0]);
      return {
        parsed:{
          ...deterministicParsed,
          summary: ai.summary || deterministicParsed.summary,
          wins: normalizeList([...(deterministicParsed.wins || []), ...((ai.wins || []).map(String))]),
          weaknesses: normalizeList([...(deterministicParsed.weaknesses || []), ...((ai.weaknesses || []).map(String))]),
          lesson: ai.lesson || deterministicParsed.lesson,
          tomorrowTasks: normalizeList([...(deterministicParsed.tomorrowTasks || []), ...((ai.suggestedTomorrowTasks || []).map(String))]),
          confidence: Number(ai.confidence || 0),
          uncertainty: String(ai.uncertainty || '')
        },
        aiUsed:true,
        latencyMs:Date.now()-t0
      };
    } catch {
      return { parsed:deterministicParsed, aiUsed:false, error:'Invalid AI JSON', latencyMs:Date.now()-t0 };
    }
  }

  async function parseTodayDump() {

    setParseStage('Rules pass…');
    const evt = recordEvent({ sourceType:'typed_dump', rawText:raw, selectedTags:['day_progress'], parseStatus:'rules_parsed' });
    let parsed = sanitizeParsed(parseDumpV2(raw));
    if (!parsed) throw new Error('Parsed object invalid');
    let aiUsed = false;
    if (config.ai.enabled && config.ai.apiKey) {
      setParseStage('AI refine…');
      const refined = await aiRefineParsed({ kind:'today', rawText:raw, deterministicParsed:parsed, appSummary });
      parsed = sanitizeParsed(refined.parsed) || parsed;
      aiUsed = !!refined.aiUsed;
      if (refined.error) showToast('error', refined.error);
      parsed.__aiMeta = { aiUsed:!!refined.aiUsed, latencyMs:refined.latencyMs || 0, providerError:refined.error || refined.providerError || '' };
    }
    await new Promise(r => setTimeout(r, Math.max(0, 1200 - (Date.now() - start))));
    parsed.__eventId = evt.eventId;
    parsed.__fingerprint = evt.eventFingerprint;
    parsed.confidence = parsed.workBlocks.length ? 0.86 : 0.62;
    parsed.uncertainty = parsed.workBlocks.length ? '' : 'No clear timed work blocks detected';
    parsed.__meta = { eventId:evt.eventId, aiUsed, parseVersion:'v2', confidence:parsed.confidence, uncertainty:parsed.uncertainty, ...(parsed.__aiMeta || {}) };
    updateToday({ todayDumpParsed:parsed });
    setParseStage('');

  function applyTodayDumpParsed(replace=false) {

    const fpToday = stableHash(`${normalizeText(todaysLog.todayDump || '')}|${todayKey}|today_dump`);
    if ((todaysLog.appliedFingerprints?.todayDump || []).includes(fpToday) && !replace) {
      alert('Already applied for this exact today dump.');
      return;
    }
    if (alreadyApplied && !replace) {

      return;

        return { ...next, kernel:{ ...k, needsReview:[{ id:uid(), at:new Date().toISOString(), dayKey:todayKey, payload:deepClone(p), reason:'invalid_parsed_shape' }, ...k.needsReview] } };
      });
      throw new Error('Parsed data malformed');
    }
    const patch = {
      primaryMit: (replace || !todaysLog.primaryMit) ? (safeParsed.primaryMit || todaysLog.primaryMit) : todaysLog.primaryMit,
      secondaryMit: (replace || !todaysLog.secondaryMit) ? (safeParsed.secondaryMit || todaysLog.secondaryMit) : todaysLog.secondaryMit,
      deepBlock: (replace || !todaysLog.deepBlock) ? (safeParsed.deepBlock || todaysLog.deepBlock) : todaysLog.deepBlock,

      wakeTime: safeParsed.wakeTime || todaysLog.wakeTime,
      sleepHours: safeParsed.sleepHoursApprox ?? todaysLog.sleepHours,
      visualisationMinutes: safeParsed.visualisationMinutes || todaysLog.visualisationMinutes || 0,
      meditationMinutes: safeParsed.meditationMinutes || todaysLog.meditationMinutes || 0,
      waterIntakeMl: (todaysLog.waterIntakeMl || 0) + (safeParsed.waterIntakeMl || 0),
      noSocialMedia: safeParsed.noSocialMedia || todaysLog.noSocialMedia,
      sugarBreach: safeParsed.sugarBreach || todaysLog.sugarBreach,
      workBlocks: normalizeBlocks([...(replace ? [] : (todaysLog.workBlocks || [])), ...(safeParsed.workBlocks || [])]),
      wins: normalizeList([...(replace ? [] : (todaysLog.wins || [])), ...(safeParsed.wins || [])]),
      weaknesses: normalizeList([...(replace ? [] : (todaysLog.weaknesses || [])), ...(safeParsed.weaknesses || [])]),
      daySummary: safeParsed.summary || todaysLog.daySummary,
      lesson: safeParsed.lesson || todaysLog.lesson,
      learningMinutes: (safeParsed.learningMinutes || 0) || (replace ? 0 : (todaysLog.learningMinutes || 0)),
      appliedFingerprints:{
        todayDump: replace ? [fpToday] : normalizeList([...(todaysLog.appliedFingerprints?.todayDump || []), fpToday]),
        tomorrowDump:[...(todaysLog.appliedFingerprints?.tomorrowDump || [])]
      },
      parseApplySessionId: uid()
    };
    patch.learningMinutes = normalizeBlocks(patch.workBlocks).reduce((a,b) => a + Number(b.durationMin || 0), 0);

    const start = Date.now();
    setParseStage('Rules pass…');
    const evt = recordEvent({ sourceType:'typed_dump', rawText:raw, selectedTags:['tomorrow_plan'], parseStatus:'rules_parsed' });
    let parsed = sanitizeParsed(parseDumpV2(raw));
    if (!parsed) throw new Error('Tomorrow parse failed');
    let aiUsed = false;
    if (config.ai.enabled && config.ai.apiKey) {
      setParseStage('AI refine…');
      const refined = await aiRefineParsed({ kind:'tomorrow', rawText:raw, deterministicParsed:parsed, appSummary });
      parsed = sanitizeParsed(refined.parsed) || parsed;
      aiUsed = !!refined.aiUsed;
      if (refined.error) showToast('error', refined.error);
      parsed.__aiMeta = { aiUsed:!!refined.aiUsed, latencyMs:refined.latencyMs || 0, providerError:refined.error || refined.providerError || '' };
    }
    await new Promise(r => setTimeout(r, Math.max(0, 1200 - (Date.now() - start))));
    const parsedTomorrowTasks = Array.isArray(parsed.tomorrowTasks) ? parsed.tomorrowTasks : [];
    const tasks = normalizeList(parsedTomorrowTasks.length ? parsedTomorrowTasks : (todaysLog.tomorrowDump || '').split('\n')).map(t => {

  function endDay() {
    if (closeLockRef.current || closeBusy) {
      alert('Close Day is already running. Please wait.');
      return;
    }
    if (!todaysLog.coreCompleted?.review || !todaysLog.coreCompleted?.tomorrow) {
      alert('Close day blocked: complete Day-End Review and Tomorrow Plan checkboxes.');
      return;
    }
    if (!todaysLog.coreCompleted?.primary) {
      alert('Close day blocked: Primary MIT must be completed.');
      return;
    }
    if (!workBlockMeta.hasMeaningfulBlock) {
      alert('Close day blocked: add at least one meaningful work block.');
      return;
    }
    if (config.challenge.endRequiresReview && (!todaysLog.review?.trim() || !(todaysLog.nextDayPlan?.trim() || (todaysLog.tomorrowChecklist || []).length))) {
      alert('End of day is blocked until you complete the review and tomorrow plan.');
      return;
    }
    const now = new Date();
    const currentHour = now.getHours();
    const currentMinute = now.getMinutes();
    const inStandardWindow = (currentHour === 23) || (currentHour === 0 && currentMinute <= 55);
    if (!inStandardWindow && !confirm('You are outside the standard close window (23:00–00:55). Close day anyway?')) {
      return;
    }
    const lastClosedAt = todaysLog.lastClosedAt ? new Date(todaysLog.lastClosedAt).getTime() : 0;
    const elapsed = now.getTime() - lastClosedAt;
    if (lastClosedAt && elapsed < (12 * 60 * 60 * 1000)) {
      alert('Day already closed recently. You can only close a day once in a 12-hour window unless you explicitly reopen/edit it.');
      return;
    }
    const dayCloseFingerprint = `close:${todayKey}:${todayScore}:${(todaysLog.workBlocks || []).length}:${(todaysLog.tomorrowChecklist || []).length}`;
    if (todaysLog.closeFingerprint === dayCloseFingerprint && todaysLog.completedAt) {
      alert('Day already closed recently. You can only close a day once in a 12-hour window unless you explicitly reopen/edit it.');
      return;
    }
    closeLockRef.current = true;
    setCloseBusy(true);
    const startedAt = Date.now();
    const snapshot = {
      id:uid(),
      date:todayKey,
      score:todayScore,
      challengeDay:config.challenge.currentDay,
      review:todaysLog.review,
      nextDayPlan:todaysLog.nextDayPlan,
      scoreBreakdown:{ coreExecPoints, workBlockPoints:workBlockMeta.points, driverPoints, penaltyPoints, activeHardGates:[...activeHardGates] },
      primaryMit:todaysLog.primaryMit,
      secondaryMit:todaysLog.secondaryMit,
      workBlocks: normalizeBlocks(todaysLog.workBlocks || []),
      wins: normalizeList(todaysLog.wins || []),
      weaknesses: normalizeList(todaysLog.weaknesses || []),
      daySummary: todaysLog.daySummary || '',
      health:{ ...todaysLog.health, sleep:todaysLog.sleepHours }
    };
    setData(prev => {
      const existing = (prev.today.history || []).find(h => h.date === todayKey || Number(h.challengeDay) === Number(config.challenge.currentDay));
      if (existing?.closeFingerprint === dayCloseFingerprint) return prev;
      return ({
      ...prev,
      today: {
        ...prev.today,
        history:[...(prev.today.history || []).filter(h => !(h.date === todayKey || Number(h.challengeDay) === Number(config.challenge.currentDay))), { ...snapshot, closeFingerprint:dayCloseFingerprint }],
        dailyLogs:{
          ...prev.today.dailyLogs,
          [todayKey]: {
            ...prev.today.dailyLogs[todayKey],
            completedAt:new Date().toISOString(),
            timerRunning:false,
            lastClosedAt:new Date().toISOString(),
            closeSessionId:uid(),
            closeFingerprint:dayCloseFingerprint
          }
        }
      }
    })});
    setConfig(prev => ({
      ...prev,
      challenge:{ ...prev.challenge, currentDay: prev.challenge.currentDay + 1 }
    }));
    const holdMs = Math.max(0, 2000 - (Date.now() - startedAt));
    setTimeout(() => {
      closeLockRef.current = false;
      setCloseBusy(false);
      alert('Day closed and archived.');
    }, holdMs);
  }

                          <div key={rule.id} className="grid grid-cols-[1fr_70px_60px] gap-2">
                            <input value={rule.text} onChange={e => editRule(rs.id, 'do', rule.id, 'text', e.target.value)} className="rounded-2xl border border-white/10 bg-navy-850 px-3 py-2 text-sm text-white" />
                            <input value={rule.weight} type="number" onChange={e => editRule(rs.id, 'do', rule.id, 'weight', Number(e.target.value))} className="rounded-2xl border border-white/10 bg-navy-850 px-3 py-2 text-sm text-white" />
                            <button onClick={() => setConfig(prev => {
                              const next = deepClone(prev);
                              const tgt = next.today.ruleSets.find(r => r.id === rs.id);
                              tgt.doRules = tgt.doRules.filter(x => x.id !== rule.id);
                              return next;
                            })} className="rounded-2xl bg-red-500/10 px-3 py-2 text-xs text-red-300 tap">Del</button>
                          </div>
                        ))}
                        <button onClick={() => addRule(rs.id, 'do')} className="rounded-2xl bg-white/5 px-3 py-2 text-sm tap">Add DO rule</button>
                      </div>
                    </div>

                    <div>
                      <div className="mb-2 text-sm font-semibold text-red-300">DON'T</div>
                      <div className="space-y-2">
                        {rs.dontRules.map(rule => (
                          <div key={rule.id} className="grid grid-cols-[1fr_70px_60px] gap-2">
                            <input value={rule.text} onChange={e => editRule(rs.id, 'dont', rule.id, 'text', e.target.value)} className="rounded-2xl border border-white/10 bg-navy-850 px-3 py-2 text-sm text-white" />
                            <input value={rule.weight} type="number" onChange={e => editRule(rs.id, 'dont', rule.id, 'weight', Number(e.target.value))} className="rounded-2xl border border-white/10 bg-navy-850 px-3 py-2 text-sm text-white" />
                            <button onClick={() => setConfig(prev => {
                              const next = deepClone(prev);
                              const tgt = next.today.ruleSets.find(r => r.id === rs.id);
                              tgt.dontRules = tgt.dontRules.filter(x => x.id !== rule.id);
                              return next;
                            })} className="rounded-2xl bg-red-500/10 px-3 py-2 text-xs text-red-300 tap">Del</button>
                          </div>
                        ))}
                        <button onClick={() => addRule(rs.id, 'dont')} className="rounded-2xl bg-white/5 px-3 py-2 text-sm tap">Add DON'T rule</button>
                      </div>
                    </div>
                  </div>
                </div>
              ))}

              <button onClick={() => {
                const name = prompt('Rule set name');
                if (!name) return;
                setConfig(prev => ({
                  ...prev,
                  today:{ ...prev.today, ruleSets:[...prev.today.ruleSets, { id:uid(), name, doRules:[], dontRules:[] }] }
                }));
              }} className="rounded-2xl bg-accent-500 px-4 py-2 text-sm font-semibold text-navy-950 tap">New rule set</button>
            </div>
          </Card>
        )}

        {builderSection === 'workflow' && (
          <>
            <ArrayManager title="Legal matter types" items={config.legal.matterTypes} onChange={v => setConfig(prev => ({ ...prev, legal:{ ...prev.legal, matterTypes:v } }))} />
            <ArrayManager title="Business stages" items={config.business.stages} onChange={v => setConfig(prev => ({ ...prev, business:{ ...prev.business, stages:v } }))} />
            <ArrayManager title="Money categories" items={config.money.categories} onChange={v => setConfig(prev => ({ ...prev, money:{ ...prev.money, categories:v } }))} />
            <ArrayManager title="Morning questions" items={config.today.morningQuestions} onChange={v => setConfig(prev => ({ ...prev, today:{ ...prev.today, morningQuestions:v } }))} />
            <ArrayManager title="Evening questions" items={config.today.eveningQuestions} onChange={v => setConfig(prev => ({ ...prev, today:{ ...prev.today, eveningQuestions:v } }))} />
          </>
        )}

        {builderSection === 'today' && (
          <>
            <Card title="Today modules">
              <div className="grid gap-2">
                {Object.keys(config.today.widgets).map(k => (
                  <Toggle key={k} label={k} checked={!!config.today.widgets[k]} onChange={() => setConfig(prev => ({ ...prev, today:{ ...prev.today, widgets:{ ...prev.today.widgets, [k]: !prev.today.widgets[k] } } }))} />
                ))}
              </div>
            </Card>

            <Card title="MIT labels + score weights">
              <div className="grid gap-3">
                <Input label="Primary MIT label" value={config.today.mitLabels.primary} onChange={v => setConfig(prev => ({ ...prev, today:{ ...prev.today, mitLabels:{ ...prev.today.mitLabels, primary:v } } }))} />
                <Input label="Secondary MIT label" value={config.today.mitLabels.secondary} onChange={v => setConfig(prev => ({ ...prev, today:{ ...prev.today, mitLabels:{ ...prev.today.mitLabels, secondary:v } } }))} />
                <Input label="Deep label" value={config.today.mitLabels.deep} onChange={v => setConfig(prev => ({ ...prev, today:{ ...prev.today, mitLabels:{ ...prev.today.mitLabels, deep:v } } }))} />
                <Input label="Admin label" value={config.today.mitLabels.admin} onChange={v => setConfig(prev => ({ ...prev, today:{ ...prev.today, mitLabels:{ ...prev.today.mitLabels, admin:v } } }))} />
                {Object.entries(config.today.scoreWeights).map(([k, v]) => (
                  <Input key={k} label={`Weight: ${k}`} type="number" value={v} onChange={val => setConfig(prev => ({ ...prev, today:{ ...prev.today, scoreWeights:{ ...prev.today.scoreWeights, [k]: Number(val) } } }))} />
                ))}
              </div>
            </Card>

            <Card title="Schedule blocks">
              <div className="space-y-2">
                {config.today.scheduleBlocks.map((block, i) => (
                  <div key={block.id} className="grid grid-cols-[1fr_88px_88px_60px] gap-2">
                    <input value={block.name} onChange={e => setConfig(prev => {
                      const next = deepClone(prev);
                      next.today.scheduleBlocks[i].name = e.target.value;
                      return next;
                    })} className="rounded-2xl border border-white/10 bg-navy-850 px-3 py-2 text-sm text-white" />
                    <input type="time" value={block.start} onChange={e => setConfig(prev => {
                      const next = deepClone(prev);
                      next.today.scheduleBlocks[i].start = e.target.value;
                      return next;
                    })} className="rounded-2xl border border-white/10 bg-navy-850 px-3 py-2 text-sm text-white" />
                    <input type="time" value={block.end} onChange={e => setConfig(prev => {
                      const next = deepClone(prev);
                      next.today.scheduleBlocks[i].end = e.target.value;
                      return next;
                    })} className="rounded-2xl border border-white/10 bg-navy-850 px-3 py-2 text-sm text-white" />
                    <button onClick={() => setConfig(prev => {
                      const next = deepClone(prev);
                      next.today.scheduleBlocks = next.today.scheduleBlocks.filter((_, idx) => idx !== i);
                      return next;
                    })} className="rounded-2xl bg-red-500/10 px-3 py-2 text-xs text-red-300 tap">Del</button>
                  </div>
                ))}
                <button onClick={() => setConfig(prev => ({ ...prev, today:{ ...prev.today, scheduleBlocks:[...prev.today.scheduleBlocks, { id:uid(), name:'New Block', start:'09:00', end:'10:00' }] } }))} className="rounded-2xl bg-accent-500 px-4 py-2 text-sm font-semibold text-navy-950 tap">Add block</button>
              </div>
            </Card>
          </>
        )}

        {builderSection === 'ai' && (
          <Card title="AI Settings">
            <div className="grid gap-3">
              <Toggle label="Enable AI" checked={!!config.ai.enabled} onChange={() => setConfig(prev => ({ ...prev, ai:{ ...prev.ai, enabled:!prev.ai.enabled } }))} />
              <Input label="Endpoint" value={config.ai.endpoint} onChange={v => setConfig(prev => ({ ...prev, ai:{ ...prev.ai, endpoint:v } }))} />
              <Input label="Model" value={config.ai.model} onChange={v => setConfig(prev => ({ ...prev, ai:{ ...prev.ai, model:v } }))} />
              <Input label="API key (saved locally in this browser only)" value={config.ai.apiKey} onChange={v => setConfig(prev => ({ ...prev, ai:{ ...prev.ai, apiKey:v } }))} />
              <Input label="Site URL (optional)" value={config.ai.siteUrl} onChange={v => setConfig(prev => ({ ...prev, ai:{ ...prev.ai, siteUrl:v } }))} />
              <Input label="Site name" value={config.ai.siteName} onChange={v => setConfig(prev => ({ ...prev, ai:{ ...prev.ai, siteName:v } }))} />
              <TextArea label="System mode" value={config.ai.systemMode} onChange={v => setConfig(prev => ({ ...prev, ai:{ ...prev.ai, systemMode:v } }))} rows={4} />
              <div className="rounded-2xl border border-amber-400/20 bg-amber-500/10 p-3 text-xs text-amber-200">
                Security note: do not commit your API key into GitHub Pages source. Save it only inside the app on your own device after deployment.
              </div>
            </div>
          </Card>
        )}

        {builderSection === 'data' && (
          <>
            <Card title="Data Tools">
              <div className="grid gap-3">
                <button onClick={exportBackup} className="rounded-2xl bg-accent-500 px-4 py-3 font-semibold text-navy-950 tap">Export full backup</button>
                <label className="rounded-2xl bg-white/5 px-4 py-3 text-sm cursor-pointer">
                  Import backup
                  <input type="file" accept="application/json" className="hidden" onChange={e => importBackup(e.target.files[0])} />
                </label>
                <button onClick={resetDemo} className="rounded-2xl bg-white/5 px-4 py-3 text-sm tap">Reset demo data only</button>
                <button onClick={wipeAll} className="rounded-2xl bg-red-500/10 px-4 py-3 text-sm text-red-300 tap">Full wipe</button>
              </div>
            </Card>

            <Card title="Advanced Config JSON">
              <TextArea value={JSON.stringify(config, null, 2)} onChange={v => { try { setConfig(JSON.parse(v)); } catch {} }} rows={18} />
              <div className="mt-2 text-xs text-slate-500">Advanced users can edit the entire config here. Invalid JSON is ignored.</div>
            </Card>
          </>
        )}
      </div>
    );
  }

  const onboardingNeeded = !config.userSettings.setupComplete;

  return (
    <div className="mx-auto flex h-full max-w-md flex-col">
      <div className="top-safe px-4 pb-3">
        <div className="flex items-center justify-between">
          <div>
            <div className="text-xs uppercase tracking-[0.2em] text-slate-500">War-Room OS</div>
            <div className="text-lg font-semibold">{currentTabName}</div>
          </div>
          <div className="flex gap-2">
            <ActionButton state={actionStates.openSearch || 'idle'} onClick={() => runSafeAction('openSearch', async () => setShowSearch(true), { minMs:250, success:'Search ready' })} className="bg-white/5 px-3 py-2">Search</ActionButton>
            <ActionButton state={actionStates.openQuick || 'idle'} onClick={() => runSafeAction('openQuick', async () => setShowQuick(true), { minMs:250, success:'Capture ready' })} className="bg-white/5 px-3 py-2">Capture</ActionButton>
          </div>
        </div>
      </div>

      {!installNoteDismissed && !isStandalone && (
        <div className="mx-4 mb-3 rounded-2xl border border-white/10 bg-white/5 p-3 text-xs text-slate-300">
          Install Stability OS for full-screen mobile mode and offline shell.
          <div className="mt-2 flex flex-wrap gap-2">
            {deferredInstallPrompt ? <button onClick={promptInstall} className="rounded-xl bg-accent-500 px-3 py-2 text-xs font-semibold text-navy-950 tap">Install App</button> : <div className="text-slate-400">Use browser menu → “Add to Home screen”.</div>}
            <button onClick={() => setInstallNoteDismissed(true)} className="text-accent-400 tap">Hide</button>
          </div>
        </div>
      )}

      <div className="flex-1 overflow-y-auto hide-scroll px-4 content-pad">
        <TabErrorBoundary tabId={activeTab} onReset={() => setActiveTab('today')}>
          {activeTab === 'today' && renderToday()}
          {activeTab === 'inbox' && renderInbox()}
          {activeTab === 'command' && renderCommand()}
          {activeTab === 'legal' && renderLegal()}
          {activeTab === 'money' && renderMoney()}
          {activeTab === 'business' && renderBusiness()}
          {activeTab === 'history' && renderHistory()}
          {activeTab === 'builder' && renderBuilder()}
          {!['today','inbox','command','legal','money','business','history','builder'].includes(activeTab) && (
            <Card title="Custom Tab">
              <div className="text-sm text-slate-400">This custom tab exists in navigation. Add modules via Builder or repurpose it later.</div>
            </Card>
          )}
        </TabErrorBoundary>
      </div>
      {toast && (
        <div className={`fixed left-1/2 top-[calc(var(--safe-top)+8px)] z-[90] -translate-x-1/2 rounded-2xl px-4 py-2 text-xs shadow-card ${toast.tone === 'error' ? 'bg-red-500/90 text-white' : 'bg-emerald-500/90 text-navy-950'}`}>
          {toast.text}
        </div>
      )}

      <div className="fixed bottom-0 left-0 right-0 z-40">
        <div className="mx-auto max-w-md px-3 pb-[calc(10px+var(--safe-bottom))]">
          <div className="glass rounded-t-3xl rounded-b-none px-2 py-2 shadow-card">
            <div className="flex gap-1 overflow-x-auto hide-scroll">
              {visibleTabs.map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`shrink-0 rounded-2xl px-3 py-3 text-xs font-medium tap ${activeTab === tab.id ? 'bg-accent-500 text-navy-950' : 'text-slate-400'}`}>
                  {tab.name}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {showQuick && (
        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/55 p-3">
          <div className="glass max-h-[92vh] w-full max-w-md overflow-y-auto rounded-3xl p-4">
            <div className="flex items-center justify-between">
              <div className="text-lg font-semibold">Quick Capture</div>
              <button onClick={() => setShowQuick(false)} className="rounded-full bg-white/5 px-3 py-2 tap">×</button>
            </div>
            <div className="mt-3">
              <Select label="Capture type" value={quickType} onChange={v => { setQuickType(v); setQuickValue({ date:todayKey }); }} options={config.quickCapture.types.map(t => t.id)} />
              <div className="mt-2 text-xs text-slate-500">{quickDef?.name}</div>
            </div>
            <div className="mt-4">
              <QuickForm config={config} typeDef={quickDef} value={quickValue} onChange={setQuickValue} />
            </div>
            <div className="mt-4 flex gap-2">
              <ActionButton state={actionStates.quickSave || 'idle'} onClick={() => runSafeAction('quickSave', async () => saveQuickCapture(), { success:'Quick capture saved', failure:'Quick capture failed' })} className="flex-1 bg-accent-500 font-semibold text-navy-950">Save</ActionButton>
              <button onClick={() => setShowQuick(false)} className="rounded-2xl bg-white/10 px-4 py-3 tap">Cancel</button>
            </div>
          </div>
        </div>
      )}

      {showSearch && (
        <div className="fixed inset-0 z-50 flex items-start justify-center bg-black/55 p-3 pt-10">
          <div className="glass max-h-[92vh] w-full max-w-md overflow-y-auto rounded-3xl p-4">
            <div className="flex items-center justify-between">
              <div className="text-lg font-semibold">Global Search</div>
              <button onClick={() => setShowSearch(false)} className="rounded-full bg-white/5 px-3 py-2 tap">×</button>
            </div>
            <div className="mt-3">
              <Input value={searchQuery} onChange={setSearchQuery} placeholder="Search tasks, legal items, expenses, leads, notes…" />
            </div>
            <div className="mt-4 space-y-2">
              {results.map(res => (
                <button key={res.id} onClick={() => { setActiveTab(res.tab); setShowSearch(false); }} className="w-full rounded-2xl bg-white/5 px-3 py-3 text-left tap">
                  <div className="flex justify-between gap-2">
                    <div className="text-sm font-medium">{res.title}</div>
                    <Badge>{res.type}</Badge>
                  </div>
                  <div className="mt-1 text-xs text-slate-400">{prettifyDate(res.date)} · open in {res.tab}</div>
                </button>
              ))}
              {!results.length && searchQuery && <div className="text-sm text-slate-500">No results.</div>}
            </div>
          </div>
        </div>
      )}

      {selectedHistory && (
        <div className="fixed inset-0 z-[72] flex items-end justify-center bg-black/70 p-3">
          <div className="glass max-h-[92vh] w-full max-w-md overflow-y-auto rounded-3xl p-4">
            <div className="flex items-center justify-between">
              <div className="text-lg font-semibold">Day {selectedHistory.challengeDay} detail</div>
              <button onClick={() => setSelectedHistory(null)} className="rounded-full bg-white/5 px-3 py-2 tap">×</button>
            </div>
            <div className="mt-2 text-xs text-slate-400">{prettifyDate(selectedHistory.date)}</div>
            <div className="mt-3 grid grid-cols-2 gap-2 text-xs">
              <div className="rounded-xl bg-white/5 p-2">Final: {selectedHistory.score}%</div>
              <div className="rounded-xl bg-white/5 p-2">Drivers: {selectedHistory.scoreBreakdown?.driverPoints ?? '—'}</div>
              <div className="rounded-xl bg-white/5 p-2">Penalties: {selectedHistory.scoreBreakdown?.penaltyPoints ?? '—'}</div>
              <div className="rounded-xl bg-white/5 p-2">Work Blocks: {(selectedHistory.workBlocks || []).length}</div>
            </div>
            <div className="mt-3 text-xs text-slate-300">Wins: {(selectedHistory.wins || []).join(' | ') || '—'}</div>
            <div className="mt-1 text-xs text-slate-300">Weaknesses: {(selectedHistory.weaknesses || []).join(' | ') || '—'}</div>
            <div className="mt-1 text-xs text-slate-300">Lesson: {selectedHistory.lesson || '—'}</div>
            <div className="mt-1 text-xs text-slate-300">Review: {selectedHistory.review || '—'}</div>
            <div className="mt-3">
              <ActionButton state={actionStates.aiHistorySummary || 'idle'} onClick={() => runSafeAction('aiHistorySummary', async () => summarizeHistoryDay(), { success:'History day summarized', failure:'AI summary failed' })}>AI Summarize This Day</ActionButton>
            </div>
            {selectedHistory.aiSummary ? <div className="mt-3 rounded-xl bg-white/5 p-3 text-xs text-slate-200 whitespace-pre-wrap">{selectedHistory.aiSummary}</div> : null}
          </div>
        </div>
      )}

      {onboardingNeeded && (
        <div className="fixed inset-0 z-[70] flex items-start justify-center overflow-y-auto bg-black/70 p-3 pt-8">
          <div className="glass w-full max-w-md rounded-3xl p-4">
            <div className="text-lg font-semibold">First-Time Setup</div>
            <div className="mt-1 text-sm text-slate-400">Set the defaults. Everything remains editable in Builder.</div>
            <div className="mt-4 grid gap-3">
              <Input label="Your name" value={config.userSettings.name} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, name:v } }))} />
              <Input label="App title" value={config.app.title} onChange={v => setConfig(prev => ({ ...prev, app:{ ...prev.app, title:v } }))} />
              <Input label="Wake time" type="time" value={config.userSettings.wakeTime} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, wakeTime:v } }))} />
              <Input label="Sleep target" type="number" step="0.5" value={config.userSettings.sleepTarget} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, sleepTarget:Number(v) } }))} />
              <Input label="Weekly review day" value={config.userSettings.weeklyReviewDay} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, weeklyReviewDay:v } }))} />
              <Input label="Weekly review time" type="time" value={config.userSettings.weeklyReviewTime} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, weeklyReviewTime:v } }))} />
              <Input label="Emergency fund target" type="number" value={config.userSettings.emergencyFundTarget} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, emergencyFundTarget:Number(v) } }))} />
              <Input label="Goal name" value={config.challenge.goalName} onChange={v => setConfig(prev => ({ ...prev, challenge:{ ...prev.challenge, goalName:v } }))} />
              <Input label="Goal days" type="number" value={config.challenge.goalDays} onChange={v => setConfig(prev => ({ ...prev, challenge:{ ...prev.challenge, goalDays:Number(v) } }))} />
              <Toggle label="Enable AI coach" checked={!!config.userSettings.modules.aiCoach} onChange={() => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, modules:{ ...prev.userSettings.modules, aiCoach:!prev.userSettings.modules.aiCoach } } }))} />
              <Toggle label="Enable health widgets" checked={!!config.userSettings.modules.healthWidgets} onChange={() => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, modules:{ ...prev.userSettings.modules, healthWidgets:!prev.userSettings.modules.healthWidgets } } }))} />
              <Toggle label="Enable business CRM" checked={!!config.userSettings.modules.businessCRM} onChange={() => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, modules:{ ...prev.userSettings.modules, businessCRM:!prev.userSettings.modules.businessCRM } } }))} />
              <button onClick={() => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, setupComplete:true } }))} className="mt-2 rounded-2xl bg-accent-500 px-4 py-3 font-semibold text-navy-950 tap">Start OS</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppErrorBoundary><App /></AppErrorBoundary>);
</script>
</body>
</html>
