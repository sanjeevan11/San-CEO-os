const prettifyDate = (v) => {
  if (!v) return '—';
  try { return new Date(v + (v.length === 10 ? 'T00:00:00' : '')).toLocaleDateString(undefined, { day:'numeric', month:'short', year:'numeric' }); }

};

// Optional native companion extension point (Android WebView/TWA bridge placeholder)
const nativeBridge = {
  isAvailable() {
    return typeof window !== 'undefined' && !!(window.StabilityNative || window.AndroidBridge);
  },
  async getUsageStats() {
    try {
      if (window.StabilityNative?.getUsageStats) return await window.StabilityNative.getUsageStats();
      if (window.AndroidBridge?.getUsageStats) return JSON.parse(window.AndroidBridge.getUsageStats());
    } catch {}
    return { supported:false, source:'web-only', data:[] };
  },
  async postEvent(eventName, payload={}) {
    try {
      if (window.StabilityNative?.postMessage) return await window.StabilityNative.postMessage(eventName, payload);
      if (window.AndroidBridge?.postMessage) return window.AndroidBridge.postMessage(JSON.stringify({ eventName, payload }));
    } catch {}
    return { ok:false, reason:'native_bridge_unavailable' };
  },
  async getHealthSignals() {
    try {
      if (window.StabilityNative?.getHealthSignals) return await window.StabilityNative.getHealthSignals();
      if (window.AndroidBridge?.getHealthSignals) return JSON.parse(window.AndroidBridge.getHealthSignals());
    } catch {}
    return { supported:false, source:'web-only', data:{} };
  }
};

function migrateConfigData(rawConfig, rawData) {
  const nextConfig = deepClone(rawConfig || defaultConfig);

  if (!nextConfig.today.taskTypes) nextConfig.today.taskTypes = [...defaultConfig.today.taskTypes];
  if (!nextConfig.today.taskPriorities) nextConfig.today.taskPriorities = [...defaultConfig.today.taskPriorities];
  if (!nextConfig.today.defaultTaskPriority) nextConfig.today.defaultTaskPriority = defaultConfig.today.defaultTaskPriority;
  if (!nextConfig.today.hardGates) nextConfig.today.hardGates = deepClone(defaultConfig.today.hardGates);
  if (!Array.isArray(nextConfig.legal.matterTypes) || !nextConfig.legal.matterTypes.length) nextConfig.legal.matterTypes = [...defaultConfig.legal.matterTypes];
  if (!Array.isArray(nextConfig.legal.taskTypes)) nextConfig.legal.taskTypes = [...defaultConfig.legal.taskTypes];

  if (!Array.isArray(nextConfig.legal.contactCategories)) nextConfig.legal.contactCategories = [...defaultConfig.legal.contactCategories];

  if (!nextConfig.today.ruleSets?.length || nextConfig.today.ruleSets[0].name !== 'San Core Operating Rules') {
    nextConfig.today.ruleSets = deepClone(defaultConfig.today.ruleSets);
    nextConfig.today.activeRuleSetId = 'default';
  }

  nextConfig.version = APP_VERSION;

  const logs = nextData.today?.dailyLogs || {};
  Object.keys(logs).forEach(k => {
    logs[k] = { ...makeEmptyDailyLog(), ...logs[k] };
    if (!Array.isArray(logs[k].tomorrowChecklist)) logs[k].tomorrowChecklist = [];

function readInitialState() {
  const configRaw = safeRead(LS.config, safeRead(LS.legacyConfig, safeRead(LS.olderConfig, safeRead(LS.oldestConfig, safeRead(LS.ancientConfig, safeRead(LS.primordialConfig, defaultConfig))))));
  const dataRaw = safeRead(LS.data, safeRead(LS.legacyData, safeRead(LS.olderData, safeRead(LS.oldestData, safeRead(LS.ancientData, safeRead(LS.primordialData, defaultData))))));
  return migrateConfigData(configRaw, dataRaw);
}

function safeRead(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    if(!raw) return deepClone(fallback);
    const parsed = JSON.parse(raw);
    return parsed ?? deepClone(fallback);
  } catch {
    return deepClone(fallback);
  }
}
function safeWrite(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
function usePersistentState(key, fallback){
  const [value, setValue] = useState(() => safeRead(key, fallback));
  useEffect(() => { safeWrite(key, value); }, [key, value]);
  return [value, setValue];
}
function resolveOptions(config, optionsFrom){
  if(!optionsFrom) return [];
  const [group, name] = optionsFrom.split('.');
  return (config[group] && config[group][name]) ? config[group][name] : [];
}
function getRuleSet(config){
  return config.today.ruleSets.find(r => r.id === config.today.activeRuleSetId) || config.today.ruleSets[0];
}

function TextArea({label, value, onChange, placeholder='', rows=3}) {
  return (
    <label className="block">

function Select({label, value, onChange, options=[]}) {

      <select

function Toggle({label, checked, onChange}) {
  return (
    <button onClick={onChange} className="w-full flex items-center justify-between rounded-2xl border border-white/10 bg-navy-850 px-4 py-3 text-left tap">

function Badge({children, tone='default'}) {
  const map = {
    default:'bg-white/5 text-slate-300 border-white/10',
    good:'bg-teal-500/10 text-teal-300 border-teal-400/20',
    warn:'bg-amber-500/10 text-amber-300 border-amber-400/20',
    bad:'bg-red-500/10 text-red-300 border-red-400/20'
  };
  return <span className={`rounded-full border px-2.5 py-1 text-[11px] ${map[tone] || map.default}`}>{children}</span>;
}
function ArrayManager({title, items, onChange, placeholder='Add item'}) {
  const [draft, setDraft] = useState('');
  const add = () => {
    if(!draft.trim()) return;
    onChange([...(items || []), draft.trim()]);
    setDraft('');
  };
  return (
    <Card title={title}>
      <div className="space-y-2">
        {(items || []).map((item, i) => (
          <div key={i} className="flex items-center gap-2">
            <input
              value={item}
              onChange={e => {
                const next = [...items];
                next[i] = e.target.value;
                onChange(next);
              }}
              className="flex-1 rounded-2xl border border-white/10 bg-navy-850 px-3 py-2 text-sm text-white"
            />
            <button onClick={() => i > 0 && onChange(reorder(items, i, i - 1))} className="rounded-2xl bg-white/5 px-3 py-2 text-xs tap">↑</button>
            <button onClick={() => i < items.length - 1 && onChange(reorder(items, i, i + 1))} className="rounded-2xl bg-white/5 px-3 py-2 text-xs tap">↓</button>
            <button onClick={() => onChange(items.filter((_, idx) => idx !== i))} className="rounded-2xl bg-red-500/10 px-3 py-2 text-xs text-red-300 tap">Del</button>
          </div>
        ))}
        <div className="flex gap-2">
          <input value={draft} onChange={e => setDraft(e.target.value)} placeholder={placeholder} className="flex-1 rounded-2xl border border-white/10 bg-navy-850 px-3 py-2 text-sm text-white" />
          <button onClick={add} className="rounded-2xl bg-accent-500 px-4 py-2 text-sm font-semibold text-navy-950 tap">Add</button>
        </div>
      </div>
    </Card>
  );
}
function QuickForm({config, typeDef, value, onChange}) {
  if(!typeDef) return null;
  const setField = (name, val) => onChange({...value, [name]: val});
  return (
    <div className="space-y-3">
      {typeDef.fields.map(field => {
        const options = field.optionsFrom ? resolveOptions(config, field.optionsFrom) : (field.options || []);
        if(field.type === 'textarea') return <TextArea key={field.name} label={field.label} value={value[field.name] || ''} onChange={v => setField(field.name, v)} />;
        if(field.type === 'select') return <Select key={field.name} label={field.label} value={value[field.name] || ''} onChange={v => setField(field.name, v)} options={options} />;
        if(field.type === 'checkbox') return <Toggle key={field.name} label={field.label} checked={!!value[field.name]} onChange={() => setField(field.name, !value[field.name])} />;
        if(field.type === 'rating') return <Select key={field.name} label={field.label} value={String(value[field.name] ?? '')} onChange={v => setField(field.name, Number(v))} options={['1', '2', '3', '4', '5']} />;
        if(field.type === 'currency') return <Input key={field.name} label={field.label} value={value[field.name] ?? ''} type="number" step="0.01" onChange={v => setField(field.name, Number(v))} />;
        return <Input key={field.name} label={field.label} value={value[field.name] ?? ''} type={field.type || 'text'} onChange={v => setField(field.name, v)} />;
      })}
    </div>
  );
}

      const urgency = dueDelta < 0 ? 5 : dueDelta === 0 ? 4 : dueDelta <= 2 ? 3 : dueDelta <= 7 ? 2 : 1;

      return urgency*w.urgency + leverage*w.leverage + riskReduction*w.riskReduction + unlock*w.unlock + modeBoost*w.modeBoost + (5-Math.min(5, Math.max(0, dueDelta)))*w.dueProximity + loopReduction*w.loopReduction;

  function parsePlanFromAi(text) {
    if (!text) return null;
    const clean = String(text).trim();
    const jsonMatch = clean.match(/```json\s*([\s\S]*?)```/i) || clean.match(/\{[\s\S]*\}/);
    if (jsonMatch) {
      try {
        const parsed = JSON.parse(jsonMatch[1] || jsonMatch[0]);
        if (parsed) return parsed;
      } catch {}
    }
    const lines = clean.split('\n').map(x => x.trim()).filter(Boolean);
    const mapped = { primaryMit:'', secondaryMit:'', deepBlock:'', adminEvidence:'', extraTasks:[] };
    lines.forEach(line => {
      const normalized = line.toLowerCase();
      const val = line.replace(/^[\-\d\.)\s]*/, '').split(':').slice(1).join(':').trim() || line;
      if (normalized.includes('primary mit')) mapped.primaryMit = val;
      else if (normalized.includes('secondary')) mapped.secondaryMit = val;
      else if (normalized.includes('deep block')) mapped.deepBlock = val;
      else if (normalized.includes('admin')) mapped.adminEvidence = val;
      else if (normalized.startsWith('-') || normalized.startsWith('*') || normalized.includes('extra')) mapped.extraTasks.push(val);
    });
    return mapped;
  }

  function buildTomorrowFromAi(parsed) {
    if (!parsed) return null;
    const checklist = [];
    if (parsed.primaryMit) checklist.push(newTaskDraft({ title: parsed.primaryMit, type:'primary_mit', priority:'critical' }));
    if (parsed.secondaryMit) checklist.push(newTaskDraft({ title: parsed.secondaryMit, type:'secondary_mit', priority:'high' }));
    if (parsed.deepBlock) checklist.push(newTaskDraft({ title: parsed.deepBlock, type:'deep_block', priority:'high' }));
    if (parsed.adminEvidence || parsed.adminBlock) checklist.push(newTaskDraft({ title: parsed.adminEvidence || parsed.adminBlock, type:'admin_evidence', priority:'medium' }));
    const extras = Array.isArray(parsed.extraTasks) ? parsed.extraTasks : [];
    extras.slice(0,5).forEach(t => checklist.push(newTaskDraft({ title: typeof t === 'string' ? t : (t.title || ''), type: (t.type && config.today.taskTypes.includes(t.type)) ? t.type : 'extra', note: t.note || '', estMinutes: t.estMinutes || '', priority: t.priority || 'medium' })));
    return checklist.filter(t => t.title && t.title.trim());
  }

      setAiResult(text);
      if (mode === 'tomorrow' || mode === 'rebuildCore') {

      updateToday({

      });
    } catch (e) {
      setAiResult('AI button tap worked, but provider request failed. Check API key, endpoint, model, or network, then retry.');

    }
  }

  async function parseDailyLogWithAI() {
    if (!todaysLog.aiDailyLogInput?.trim()) {
      alert('Paste your day notes first.');
      return;
    }
    if (!config.ai.enabled || !config.ai.apiKey) {
      updateToday({ aiDailyLogRawOutput:'AI unavailable. Add API key in Builder > AI settings.', aiDailyLogParsed:null });
      return;
    }
    setAiBusy(true);
    try {
      const schemaHint = {
        coreExecution: { primaryMit:'', secondaryMit:'', deepBlock:'', adminBlock:'' },
        workBlocks:[{ time:'', durationMin:0, activityType:'', topic:'', notes:'' }],
        totalLearningMinutes:0,
        completedDrivers:[],
        brokenKillers:[],
        summary:'',
        wins:[],
        weaknesses:[],
        lesson:'',
        suggestedTomorrowTasks:[{ title:'', type:'extra', note:'', estMinutes:0, priority:'medium' }],
        confidenceNotes:[],
        uncertaintyNotes:[]
      };
      const prompt = `Parse this messy daily log into strict JSON only using this schema: ${JSON.stringify(schemaHint)}. If uncertain, keep fields empty but valid. Log: ${todaysLog.aiDailyLogInput}`;
      const res = await fetch(config.ai.endpoint, {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'Authorization': `Bearer ${config.ai.apiKey}`,
          ...(config.ai.siteUrl ? { 'HTTP-Referer': config.ai.siteUrl } : {}),
          ...(config.ai.siteName ? { 'X-Title': config.ai.siteName } : {})
        },
        body: JSON.stringify({ model: config.ai.model, messages:[{ role:'system', content: config.ai.systemMode }, { role:'user', content: prompt }] })
      });
      const json = await res.json();
      const text = json?.choices?.[0]?.message?.content || json?.error?.message || '';
      let parsed = null;
      try {
        const block = text.match(/```json\s*([\s\S]*?)```/i);
        parsed = JSON.parse(block ? block[1] : text);
      } catch {}
      if (!parsed || typeof parsed !== 'object') {
        updateToday({ aiDailyLogParsed:null, aiDailyLogRawOutput:text || 'Parse failed. No structured output.' });
        return;
      }
      const normalized = {
        ...parsed,
        workBlocks: normalizeParsedBlocks(parsed.workBlocks),
        totalLearningMinutes: Number(parsed.totalLearningMinutes || 0) || normalizeParsedBlocks(parsed.workBlocks).reduce((a,b) => a + Number(b.durationMin || 0), 0),
        completedDrivers: Array.isArray(parsed.completedDrivers) ? parsed.completedDrivers : [],
        brokenKillers: Array.isArray(parsed.brokenKillers) ? parsed.brokenKillers : [],
        wins: Array.isArray(parsed.wins) ? parsed.wins : [],
        weaknesses: Array.isArray(parsed.weaknesses) ? parsed.weaknesses : [],
        suggestedTomorrowTasks: Array.isArray(parsed.suggestedTomorrowTasks) ? parsed.suggestedTomorrowTasks : []
      };
      updateToday({ aiDailyLogParsed: normalized, aiDailyLogRawOutput:'', parseSourceType:'ai_parsed_log' });
    } catch {
      updateToday({ aiDailyLogParsed:null, aiDailyLogRawOutput:'AI parse failed. You can keep using manual fields.' });
    } finally {
      setAiBusy(false);
    }
  }

  function parseInboxRules(text, tags=[]) {
    const lines = String(text || '').split(/\n+/).map(l => l.trim()).filter(Boolean);
    const items = [];
    const warn = [];
    const has = (line, arr) => arr.some(k => line.includes(k));
    lines.forEach((line, idx) => {
      const l = line.toLowerCase();
      const duration = l.match(/(\d+)\s*(min|mins|minutes|hour|hr|h)/);
      const time = l.match(/\b(\d{1,2})[:.](\d{2})\s*(am|pm)?\b/);
      const dueDate = (l.match(/(\d{4}-\d{2}-\d{2})/) || [])[1] || '';
      if (has(l,['hearing','deadline','submit by','filing','appointment','due'])) {
        items.push({ id:uid(), destination:'deadline', confidence:0.9, reasons:['hard-date keyword'], title:line, date:dueDate, sourceLine:idx, checked:true });
      } else if (has(l,['slept','sleep','woke','wake','snoozed','water','meditation','walked','workout','steps','stress','caffeine','sugar'])) {
        items.push({ id:uid(), destination:'body_signal', confidence:0.82, reasons:['body ops keyword'], title:line, sourceLine:idx, checked:true });
      } else if (has(l,['awaiting response','no reply','follow up','chase','waiting for','pending','emailed'])) {
        items.push({ id:uid(), destination:'waiting', confidence:0.86, reasons:['waiting/follow-up keyword'], whatAwaiting:line, nextChaseDate:dueDate, sourceLine:idx, checked:true });
      } else if (has(l,['job','application','cv','interview','role','employer'])) {
        items.push({ id:uid(), destination:'job_hunt', confidence:0.8, reasons:['job hunt keyword'], title:line, sourceLine:idx, checked:true });
      } else if (has(l,['semantic model','retrieval practice','mock scenario','revised dax','completed module','weak concept','quiz'])) {
        items.push({ id:uid(), destination:'learning_update', confidence:0.84, reasons:['learning ops keyword'], title:line, sourceLine:idx, checked:true });
      } else if (has(l,['tomorrow','next day','must do tomorrow','follow up tomorrow'])) {
        items.push({ id:uid(), destination:'tomorrow_task', confidence:0.82, reasons:['tomorrow keyword'], title:line.replace(/.*tomorrow\s*/i,'' ) || line, sourceLine:idx, checked:true });
      } else if ((duration || time) && has(l,['studied','learning','revised','reviewed','quiz','power bi','dax','semantic','sql','coding','building','preparing'])) {
        const mins = duration ? Number(duration[1]) * (['hour','hr','h'].includes(duration[2]) ? 60 : 1) : 0;
        items.push({ id:uid(), destination:'work_block', confidence:0.88, reasons:['time+work verb'], time: time ? `${time[1].padStart(2,'0')}:${time[2]}` : '', durationMin: mins, topic:line, sourceLine:idx, checked:true });
      } else if (has(l,['youtube','social media','reels','shorts','random browsing','unrelated tabs','nap','snoozed','sugar','biscuits','cake','ai drift','phone first'])) {
        items.push({ id:uid(), destination:'leakage', confidence:0.91, reasons:['killer keyword'], title:line, sourceLine:idx, checked:true });
      } else if (has(l,['idea','later','someday','maybe build','future'])) {
        items.push({ id:uid(), destination:'idea', confidence:0.75, reasons:['parking lot keyword'], title:line, sourceLine:idx, checked:false });
      } else {
        items.push({ id:uid(), destination:'note', confidence:0.55, reasons:['generic fallback'], title:line, sourceLine:idx, checked:false });
      }
    });
    if (tags.length) warn.push(`Tags applied: ${tags.join(', ')}`);
    return { parserVersion:'v8-hybrid-rules-1', usedAI:false, items, warnings:warn };
  }

  async function runInboxParse() {
    if (!inboxInput.trim()) return;
    setInboxBusy(true);
    const rulesPreview = parseInboxRules(inboxInput, inboxTags);
    if (!config.ai.enabled || !config.ai.apiKey) {
      setInboxPreview(rulesPreview);
      setInboxBusy(false);
      return;
    }
    try {
      const prompt = `Parse notes into JSON array items with destination/confidence/reasons and fields. Keep strict JSON. Notes: ${inboxInput}`;
      const res = await fetch(config.ai.endpoint, { method:'POST', headers:{ 'Content-Type':'application/json','Authorization':`Bearer ${config.ai.apiKey}`,...(config.ai.siteUrl ? { 'HTTP-Referer': config.ai.siteUrl } : {}),...(config.ai.siteName ? { 'X-Title': config.ai.siteName } : {}) }, body: JSON.stringify({ model:config.ai.model, messages:[{ role:'system', content: config.ai.systemMode }, { role:'user', content:prompt }] }) });
      const json = await res.json();
      const text = json?.choices?.[0]?.message?.content || '';
      let aiItems = [];
      try {
        const raw = text.match(/```json\s*([\s\S]*?)```/i);
        const parsed = JSON.parse(raw ? raw[1] : text);
        aiItems = Array.isArray(parsed?.items) ? parsed.items : (Array.isArray(parsed) ? parsed : []);
      } catch {}
      const merged = { ...rulesPreview, usedAI: aiItems.length > 0, items: aiItems.length ? aiItems.map((x,i) => ({ id:x.id || uid(), checked:Number(x.confidence || 0) >= (config.kernel?.confidenceThresholds?.medium || 0.6), ...x, sourceLine:i })) : rulesPreview.items };
      setInboxPreview(merged);
    } catch {
      setInboxPreview({ ...rulesPreview, warnings:[...(rulesPreview.warnings || []), 'AI failed, rules-only preview used.'] });
    } finally { setInboxBusy(false); }
  }

        } else if (it.destination === 'work_block') {
          const b = { id:uid(), time:it.time || '', durationMin:Number(it.durationMin || 0), activityType:it.activityType || 'learning', topic:it.topic || it.title || '', notes:'from inbox parse' };
          const log = next.today.dailyLogs[todayKey] || makeEmptyDailyLog();

          next.kernel.objects.sessions.unshift({ id:b.id, type:'work_block', date:todayKey, time:b.time, durationMin:b.durationMin, topic:b.topic, notes:b.notes, source:'inbox' });
        } else if (it.destination === 'tomorrow_task') {
          const task = newTaskDraft({ title:it.title || 'Inbox task', type:'extra' });
          const log = next.today.dailyLogs[todayKey] || makeEmptyDailyLog();
          log.tomorrowChecklist = [...(log.tomorrowChecklist || []), task];
          next.today.dailyLogs[todayKey] = log;
        } else if (it.destination === 'idea') {
          next.kernel.parkingLot.unshift({ id:uid(), title:it.title || 'Captured idea', sourceText:it.title || '', category:'app feature', urgency:'later', linkedDomain:it.domain || 'general', notes:'from inbox', createdAt:now, reviewedAt:'', status:'parked' });
          next.kernel.objects.ideas.unshift({ id:uid(), title:it.title || 'Idea', domain:it.domain || 'general', status:'parked', source:'inbox' });
        } else if (it.destination === 'body_signal') {
          const lower = String(it.title || '').toLowerCase();
          const sleep = (lower.match(/(\d+(\.\d+)?)\s*h/) || [])[1];
          const water = (lower.match(/(\d+)\s*ml/) || [])[1];
          const meditation = (lower.match(/(\d+)\s*min.*meditat/) || [])[1];
          const steps = (lower.match(/(\d+)\s*steps/) || [])[1];
          const existing = next.kernel.bodyOps?.daily?.[todayKey] || {};
          next.kernel.bodyOps.daily[todayKey] = {
            ...existing,
            sleepHours: sleep ? Number(sleep) : (existing.sleepHours || Number(next.today.dailyLogs[todayKey]?.sleepHours || 0)),
            waterMl: (existing.waterMl || 0) + (water ? Number(water) : 0),
            meditationMin: (existing.meditationMin || 0) + (meditation ? Number(meditation) : 0),
            steps: (existing.steps || 0) + (steps ? Number(steps) : 0),
            sugarBreach: existing.sugarBreach || lower.includes('sugar'),
            wakeActual: existing.wakeActual || ((lower.match(/woke\s*(at)?\s*([0-9:.apm]+)/) || [])[2] || ''),
            recoveryNote: [existing.recoveryNote, it.title].filter(Boolean).join(' · ')
          };
          next.kernel.bodyOps.signals.unshift({ id:uid(), date:todayKey, text:it.title || '', source:'inbox' });
        } else if (it.destination === 'learning_update') {
          const baseTrack = /dax/.test((it.title || '').toLowerCase()) ? 'DAX' : /sql/.test((it.title || '').toLowerCase()) ? 'SQL / T-SQL' : /semantic/.test((it.title || '').toLowerCase()) ? 'Semantic Models' : 'Power BI';
          next.kernel.learningOps.units.unshift({ id:uid(), track:baseTrack, topic:it.title || 'Captured learning note', status:/weak/.test((it.title || '').toLowerCase()) ? 'weak under pressure' : /complete|tested|quiz/.test((it.title || '').toLowerCase()) ? 'tested' : 'practiced', linkedSessionIds:[], linkedQuizIds:[], proofItem:'', confidence:2, nextReviseDate:'', notes:'from inbox parse' });
        } else if (it.destination === 'job_hunt') {
          next.kernel.jobHunt.applications.unshift({ id:uid(), targetRole:'', employer:it.title || '', jobSource:'inbox', cvVersion:'', applicationDate:todayKey, stage:'saved', followUpDate:'', interviewDate:'', notes:'from inbox parse', proofItems:[], outcome:'' });
        } else if (it.destination === 'leakage') {
          const label = String(it.title || '').toLowerCase();
          const leakType = label.includes('sugar') ? 'sugar' : label.includes('ai') ? 'ai_drift' : label.includes('nap') ? 'unplanned_nap' : label.includes('phone') ? 'phone_before_mit' : label.includes('social') ? 'social_media' : label.includes('side') ? 'side_project_drift' : label.includes('research') ? 'random_research' : label.includes('tab') ? 'multitasking' : 'late_shutdown';
          next.kernel.leakDefense.records.unshift({ id:uid(), type:leakType, timestamp:new Date().toISOString(), trigger:'inbox_parse', context:it.title || '', severity:'medium', recoveryAction:'return_to_mit', linkedDay:todayKey, linkedMode:next.kernel.mode || 'Normal', linkedState:next.kernel.inferredState || 'Drifting' });
        }
      });
      next.kernel.inbox.processed = [{ id:uid(), at:now, count:chosen.length, sourceText:inboxInput.slice(0,500), selectedTags:inboxTags }, ...(next.kernel.inbox.processed || [])].slice(0,30);
      next.kernel.inbox.auditTrail = [{ id:uid(), at:now, rawSourceText:inboxInput, selectedTags:inboxTags, parserVersion:inboxPreview.parserVersion, usedAI:!!inboxPreview.usedAI, destinationsWritten:[...new Set(chosen.map(x => x.destination))], warnings:inboxPreview.warnings || [] }, ...(next.kernel.inbox.auditTrail || [])].slice(0,40);
      next.kernel.inbox.lastApplyUndo = before;
      return next;
    });
  }

  async function runCommand(qRaw) {
    const q = String(qRaw || commandInput || '').trim();
    if (!q) return;
    setCommandBusy(true);
    const ql = q.toLowerCase();
    let response = '';
    if (ql.includes('what matters') || ql.includes('next 5')) {
      response = rankedKernelItems.slice(0,5).map((x,i) => `${i+1}. [${x.kind}] ${x.title || x.whatAwaiting || x.opportunity || 'Untitled'} (${x.domain || 'general'})`).join('\n') || 'No ranked items yet.';
    } else if (ql.includes('legal next 5')) {
      response = next5LegalActions.map((x,i)=>`${i+1}. ${x.title} · ${x.matterType} · due ${x.dueDate || '—'}`).join('\n') || 'No legal actions.';
    } else if (ql.includes('why did i drift')) {
      response = `State: ${inferredKernelState}. Drift signals: missed drivers ${missedDriverCount}, broken killers ${brokenKillerCount}, open loops ${openLoops.length}. Correction: lock MIT-only and complete one 25m block now.`;
    } else if (ql.includes('what do i truly know') || ql.includes('weak under pressure') || ql.includes('revise next')) {
      const units = kernel.learningOps?.units || [];
      const strong = units.filter(u => ['strong','tested'].includes(u.status)).map(u => `${u.track}:${u.topic}`).slice(0,5);
      const weak = units.filter(u => u.status === 'weak under pressure' || Number(u.confidence || 0) <= 2).map(u => `${u.track}:${u.topic}`).slice(0,5);
      response = `Learning snapshot:\nStrong/tested: ${strong.join('; ') || 'none yet'}\nWeak under pressure: ${weak.join('; ') || 'none flagged'}\nRevise next: ${(weak[0] || strong[0] || 'Power BI fundamentals')}.`;
    } else if (ql.includes('job') || ql.includes('interview') || ql.includes('cv')) {
      const jobs = kernel.jobHunt?.applications || [];
      const nextJobs = jobs.filter(j => ['saved','applied','follow-up due','interview prep'].includes(j.stage)).slice(0,5);
      response = nextJobs.length ? nextJobs.map((j,i)=>`${i+1}. ${j.employer || 'Employer'} · ${j.stage} · follow-up ${j.followUpDate || '—'}`).join('\n') : 'No job actions yet. Add job records from Inbox or Command.';
    } else if (ql.includes('build tomorrow')) {
      await askAI('tomorrow');
      response = 'Triggered AI Build Tomorrow Plan. Review checklist in Journal card.';
    } else if (ql.includes('weekly review')) {
      const best = (data.today.history || []).slice().sort((a,b)=>b.score-a.score)[0];
      const worst = (data.today.history || []).slice().sort((a,b)=>a.score-b.score)[0];
      response = `Weekly board: Best day ${best?.challengeDay || '—'} (${best?.score || 0}%). Worst day ${worst?.challengeDay || '—'} (${worst?.score || 0}%). Top bottleneck: ${(openLoops[0]?.title || 'insufficient data')}.`;
    } else {
      response = `Use app state first:\n- Current mode: ${kernel.mode || 'Normal'}\n- Inferred state: ${inferredKernelState}\n- Open loops: ${openLoops.length}\n- Overdue waiting: ${overdueWaiting.length}\n- Top ranked: ${(rankedKernelItems[0]?.title || 'none')}`;
      if (config.ai.enabled && config.ai.apiKey) {
        try {
          const res = await fetch(config.ai.endpoint, { method:'POST', headers:{ 'Content-Type':'application/json','Authorization':`Bearer ${config.ai.apiKey}`,...(config.ai.siteUrl ? { 'HTTP-Referer': config.ai.siteUrl } : {}),...(config.ai.siteName ? { 'X-Title': config.ai.siteName } : {}) }, body: JSON.stringify({ model:config.ai.model, messages:[{ role:'system', content: config.ai.systemMode }, { role:'user', content: `Using this state, answer command:
${q}
State:
${appSummary}` }] }) });
          const json = await res.json();
          const text = json?.choices?.[0]?.message?.content;
          if (text) response = text;
        } catch {}
      }
    }
    setCommandOutput(response);
    setData(prev => ({ ...prev, kernel:{ ...prev.kernel, commandHistory:[{ id:uid(), at:new Date().toISOString(), command:q, output:response }, ...(prev.kernel.commandHistory || [])].slice(0,40) } }));
    setCommandBusy(false);
  }

  function renderHistoryBoard() {
    const hist = data.today.history || [];
    const strongest = hist.slice().sort((a,b)=>b.score-a.score).slice(0,3);
    const weakest = hist.slice().sort((a,b)=>a.score-b.score).slice(0,3);
    const naps = hist.filter(h => (h.tags || []).some(t => String(t).includes('nap'))).length;
    const sugars = hist.filter(h => (h.tags || []).some(t => String(t).includes('sugar'))).length;
    const closure = hist.filter(h => h.review && h.review.trim()).length;
    const bodySignals = kernel.bodyOps?.signals || [];
    const avgSleep = bodySignals.length ? (bodySignals.reduce((a,b) => a + Number(b.sleepHours || 0), 0) / bodySignals.length).toFixed(1) : '0.0';
    return (
      <div className="space-y-4 fade-up">
        <Card title="History Intelligence">
          <div className="grid grid-cols-2 gap-2 text-xs">
            <div className="rounded-2xl bg-white/5 p-3">Strongest: {strongest.map(x => `D${x.challengeDay}`).join(', ') || '—'}</div>
            <div className="rounded-2xl bg-white/5 p-3">Weakest: {weakest.map(x => `D${x.challengeDay}`).join(', ') || '—'}</div>
            <div className="rounded-2xl bg-white/5 p-3">Open loops now: {openLoops.length}</div>
            <div className="rounded-2xl bg-white/5 p-3">Naps tagged: {naps}</div>
            <div className="rounded-2xl bg-white/5 p-3">Sugar days: {sugars}</div>
            <div className="rounded-2xl bg-white/5 p-3">Strong closures: {closure}</div>
            <div className="rounded-2xl bg-white/5 p-3">Avg sleep: {avgSleep}h</div>
            <div className="rounded-2xl bg-white/5 p-3">Top leaks: {recurringLeaks.map(x => x[0]).join(', ') || 'none'}</div>
          </div>
        </Card>
        <Card title="Weekly Board Review">
          <button onClick={() => {
            const summary = { id:uid(), at:new Date().toISOString(), wins: strongest.map(x => `Day ${x.challengeDay}`), losses: weakest.map(x => `Day ${x.challengeDay}`), bottleneck: openLoops[0]?.title || 'None', bestDay: strongest[0]?.challengeDay || null, worstDay: weakest[0]?.challengeDay || null, legalSnapshot: `${overdueLegalTasks.length} overdue legal tasks`, revenueSnapshot: `${followUpsDue.length} follow-ups due`, healthSnapshot: `Sleep ${todaysLog.sleepHours || 0}h`, tightenRule:'Protect MIT start', stopDoing:'Meta-work during execution blocks' };
            setData(prev => ({ ...prev, kernel:{ ...prev.kernel, weeklyReviews:[summary, ...(prev.kernel.weeklyReviews || [])] } }));

        </Card>
      </div>
    );
  }

                <Input label="Deep label" value={config.today.mitLabels.deep} onChange={v => setConfig(prev => ({ ...prev, today:{ ...prev.today, mitLabels:{ ...prev.today.mitLabels, deep:v } } }))} />
                <Input label="Admin label" value={config.today.mitLabels.admin} onChange={v => setConfig(prev => ({ ...prev, today:{ ...prev.today, mitLabels:{ ...prev.today.mitLabels, admin:v } } }))} />
                <Input label="Hard gate cap: missing Primary MIT rule" type="number" value={config.today.hardGates.primaryMitRuleCap} onChange={val => setConfig(prev => ({ ...prev, today:{ ...prev.today, hardGates:{ ...prev.today.hardGates, primaryMitRuleCap:Number(val) } } }))} />
                <Input label="Hard gate cap: missing 90-minute MIT block rule" type="number" value={config.today.hardGates.deepBlockRuleCap} onChange={val => setConfig(prev => ({ ...prev, today:{ ...prev.today, hardGates:{ ...prev.today.hardGates, deepBlockRuleCap:Number(val) } } }))} />
                <Input label="Task types (comma separated)" value={(config.today.taskTypes || []).join(', ')} onChange={val => setConfig(prev => ({ ...prev, today:{ ...prev.today, taskTypes: val.split(',').map(x => x.trim()).filter(Boolean) } }))} />
                <Input label="Task priorities (comma separated)" value={(config.today.taskPriorities || []).join(', ')} onChange={val => setConfig(prev => ({ ...prev, today:{ ...prev.today, taskPriorities: val.split(',').map(x => x.trim()).filter(Boolean) } }))} />
                <Select label="Default task priority" value={config.today.defaultTaskPriority} onChange={val => setConfig(prev => ({ ...prev, today:{ ...prev.today, defaultTaskPriority:val } }))} options={config.today.taskPriorities || []} />
              </div>
            </Card>

            <Card title="Schedule blocks">
              <div className="space-y-2">
                {config.today.scheduleBlocks.map((block, i) => (
                  <div key={block.id} className="grid grid-cols-[1fr_88px_88px_60px] gap-2">
                    <input value={block.name} onChange={e => setConfig(prev => {
                      const next = deepClone(prev);
                      next.today.scheduleBlocks[i].name = e.target.value;
                      return next;
                    })} className="rounded-2xl border border-white/10 bg-navy-850 px-3 py-2 text-sm text-white" />
                    <input type="time" value={block.start} onChange={e => setConfig(prev => {
                      const next = deepClone(prev);
                      next.today.scheduleBlocks[i].start = e.target.value;
                      return next;
                    })} className="rounded-2xl border border-white/10 bg-navy-850 px-3 py-2 text-sm text-white" />
                    <input type="time" value={block.end} onChange={e => setConfig(prev => {
                      const next = deepClone(prev);
                      next.today.scheduleBlocks[i].end = e.target.value;
                      return next;
                    })} className="rounded-2xl border border-white/10 bg-navy-850 px-3 py-2 text-sm text-white" />
                    <button onClick={() => setConfig(prev => {
                      const next = deepClone(prev);
                      next.today.scheduleBlocks = next.today.scheduleBlocks.filter((_, idx) => idx !== i);
                      return next;
                    })} className="rounded-2xl bg-red-500/10 px-3 py-2 text-xs text-red-300 tap">Del</button>
                  </div>
                ))}
                <button onClick={() => setConfig(prev => ({ ...prev, today:{ ...prev.today, scheduleBlocks:[...prev.today.scheduleBlocks, { id:uid(), name:'New Block', start:'09:00', end:'10:00' }] } }))} className="rounded-2xl bg-accent-500 px-4 py-2 text-sm font-semibold text-navy-950 tap">Add block</button>
              </div>
            </Card>
          </>
        )}

        {builderSection === 'ai' && (
          <Card title="AI Settings">
            <div className="grid gap-3">
              <Toggle label="Enable AI" checked={!!config.ai.enabled} onChange={() => setConfig(prev => ({ ...prev, ai:{ ...prev.ai, enabled:!prev.ai.enabled } }))} />
              <Input label="Endpoint" value={config.ai.endpoint} onChange={v => setConfig(prev => ({ ...prev, ai:{ ...prev.ai, endpoint:v } }))} />
              <Input label="Model" value={config.ai.model} onChange={v => setConfig(prev => ({ ...prev, ai:{ ...prev.ai, model:v } }))} />
              <Input label="API key (saved locally in this browser only)" value={config.ai.apiKey} onChange={v => setConfig(prev => ({ ...prev, ai:{ ...prev.ai, apiKey:v } }))} />
              <Input label="Site URL (optional)" value={config.ai.siteUrl} onChange={v => setConfig(prev => ({ ...prev, ai:{ ...prev.ai, siteUrl:v } }))} />
              <Input label="Site name" value={config.ai.siteName} onChange={v => setConfig(prev => ({ ...prev, ai:{ ...prev.ai, siteName:v } }))} />
              <TextArea label="System mode" value={config.ai.systemMode} onChange={v => setConfig(prev => ({ ...prev, ai:{ ...prev.ai, systemMode:v } }))} rows={4} />
              <div className="rounded-2xl border border-amber-400/20 bg-amber-500/10 p-3 text-xs text-amber-200">
                Security note: do not commit your API key into GitHub Pages source. Save it only inside the app on your own device after deployment.
              </div>
            </div>
          </Card>
        )}

        {builderSection === 'data' && (
          <>
            <Card title="Data Tools">
              <div className="grid gap-3">
                <button onClick={exportBackup} className="rounded-2xl bg-accent-500 px-4 py-3 font-semibold text-navy-950 tap">Export full backup</button>
                <label className="rounded-2xl bg-white/5 px-4 py-3 text-sm cursor-pointer">
                  Import backup
                  <input type="file" accept="application/json" className="hidden" onChange={e => importBackup(e.target.files[0])} />
                </label>
                <button onClick={resetDemo} className="rounded-2xl bg-white/5 px-4 py-3 text-sm tap">Reset demo data only</button>
                <button onClick={wipeAll} className="rounded-2xl bg-red-500/10 px-4 py-3 text-sm text-red-300 tap">Full wipe</button>
              </div>
            </Card>

            <Card title="Advanced Config JSON">
              <TextArea value={JSON.stringify(config, null, 2)} onChange={v => { try { setConfig(JSON.parse(v)); } catch {} }} rows={18} />
              <div className="mt-2 text-xs text-slate-500">Advanced users can edit the entire config here. Invalid JSON is ignored.</div>
            </Card>
          </>
        )}
      </div>
    );
  }

  const onboardingNeeded = !config.userSettings.setupComplete;

  return (
    <div className="mx-auto relative flex h-full max-w-md flex-col">
      {shouldShowScene && (
        <div className="scene-shell" aria-hidden="true">
          <div className="scene-image" style={{ backgroundImage:`url('${selectedScene.src}')`, opacity: sceneConfig.backgroundIntensity === 'high' ? .88 : sceneConfig.backgroundIntensity === 'low' ? .52 : .72, animationDuration: sceneConfig.motionIntensity === 'dynamic' ? '24s' : '36s', animationPlayState: sceneConfig.motionIntensity === 'off' || sceneConfig.lowDataMode ? 'paused' : 'running' }}></div>
          <div className="scene-overlay"></div>
          {sceneConfig.quoteOverlay && (
            <div className="scene-quote">
              <div>{sceneQuote}</div>
            </div>
          )}
        </div>
      )}
      <div className="relative z-10 top-safe px-4 pb-3">
        <div className="flex items-center justify-between">
          <div>
            <div className="text-xs uppercase tracking-[0.2em] text-slate-500">War-Room OS</div>
            <div className="text-lg font-semibold">{currentTabName}</div>
          </div>
          <div className="flex gap-2">
            <button onClick={() => setShowSearch(true)} className="rounded-2xl bg-white/5 px-3 py-2 text-sm tap">Search</button>
            <button onClick={() => setShowQuick(true)} className="rounded-2xl bg-white/5 px-3 py-2 text-sm tap">Capture</button>
          </div>
        </div>
      </div>

      {!installNoteDismissed && !isStandalone && (
        <div className="relative z-10 mx-4 mb-3 rounded-2xl border border-white/10 bg-white/5 p-3 text-xs text-slate-300">
          <div className="font-semibold text-slate-200 mb-1">Install Stability OS</div>
          {installPromptEvent ? 'Install for app-like offline access and faster launch.' : 'Use browser menu → Add to Home screen if no direct install prompt appears.'}
          <div className="mt-2 flex gap-2">
            {installPromptEvent && <button onClick={async () => { try { await installPromptEvent.prompt(); } catch {} setInstallPromptEvent(null); }} className="rounded-xl bg-accent-500 px-3 py-2 text-xs font-semibold text-navy-950 tap">Install App</button>}
            <button onClick={() => setInstallNoteDismissed(true)} className="rounded-xl bg-white/10 px-3 py-2 text-xs tap">Dismiss</button>
          </div>
        </div>
      )}

      <div className="relative z-10 flex-1 overflow-y-auto hide-scroll px-4 content-pad">
        {activeTab === 'today' && renderToday()}
        {activeTab === 'inbox' && renderInbox()}
        {activeTab === 'command' && renderCommand()}
        {activeTab === 'legal' && renderLegal()}
        {activeTab === 'money' && renderMoney()}
        {activeTab === 'business' && renderBusiness()}
        {activeTab === 'history' && renderHistoryBoard()}
        {activeTab === 'builder' && renderBuilder()}
        {!['today','inbox','command','legal','money','business','history','builder'].includes(activeTab) && (
          <Card title="Custom Tab">
            <div className="text-sm text-slate-400">This custom tab exists in navigation. Add modules via Builder or repurpose it later.</div>
          </Card>
        )}
      </div>

      <div className="fixed bottom-0 left-0 right-0 z-40 pointer-events-none">
        <div className="mx-auto max-w-md px-3 pb-[calc(10px+var(--safe-bottom))] pointer-events-auto">
          <div className="glass rounded-t-3xl rounded-b-none px-2 py-2 shadow-card">
            <div className="flex gap-1 overflow-x-auto hide-scroll">
              {visibleTabs.map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`min-w-[74px] rounded-2xl px-2 py-3 text-xs font-medium tap ${activeTab === tab.id ? 'bg-accent-500 text-navy-950' : 'text-slate-400'}`}>
                  {tab.name}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {showQuick && (
        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/55 p-3">
          <div className="glass max-h-[92vh] w-full max-w-md overflow-y-auto rounded-3xl p-4">
            <div className="flex items-center justify-between">
              <div className="text-lg font-semibold">Quick Capture</div>
              <button onClick={() => setShowQuick(false)} className="rounded-full bg-white/5 px-3 py-2 tap">×</button>
            </div>
            <div className="mt-3">
              <Select label="Capture type" value={quickType} onChange={v => { setQuickType(v); setQuickValue({ date:todayKey }); }} options={config.quickCapture.types.map(t => t.id)} />
              <div className="mt-2 text-xs text-slate-500">{quickDef?.name}</div>
            </div>
            <div className="mt-4">
              <QuickForm config={config} typeDef={quickDef} value={quickValue} onChange={setQuickValue} />
            </div>
            <div className="mt-4 flex gap-2">
              <button onClick={saveQuickCapture} className="flex-1 rounded-2xl bg-accent-500 px-4 py-3 font-semibold text-navy-950 tap">Save</button>
              <button onClick={() => setShowQuick(false)} className="rounded-2xl bg-white/10 px-4 py-3 tap">Cancel</button>
            </div>
          </div>
        </div>
      )}

      {showSearch && (
        <div className="fixed inset-0 z-50 flex items-start justify-center bg-black/55 p-3 pt-10">
          <div className="glass max-h-[92vh] w-full max-w-md overflow-y-auto rounded-3xl p-4">
            <div className="flex items-center justify-between">
              <div className="text-lg font-semibold">Global Search</div>
              <button onClick={() => setShowSearch(false)} className="rounded-full bg-white/5 px-3 py-2 tap">×</button>
            </div>
            <div className="mt-3">
              <Input value={searchQuery} onChange={setSearchQuery} placeholder="Search tasks, legal items, expenses, leads, notes…" />
            </div>
            <div className="mt-4 space-y-2">
              {results.map(res => (
                <button key={res.id} onClick={() => { setActiveTab(res.tab); setShowSearch(false); }} className="w-full rounded-2xl bg-white/5 px-3 py-3 text-left tap">
                  <div className="flex justify-between gap-2">
                    <div className="text-sm font-medium">{res.title}</div>
                    <Badge>{res.type}</Badge>
                  </div>
                  <div className="mt-1 text-xs text-slate-400">{prettifyDate(res.date)} · open in {res.tab}</div>
                </button>
              ))}
              {!results.length && searchQuery && <div className="text-sm text-slate-500">No results.</div>}
            </div>
          </div>
        </div>
      )}

      {selectedHistoryItem && (
        <div className="fixed inset-0 z-[72] flex items-end justify-center bg-black/70 p-3">
          <div className="glass max-h-[90vh] w-full max-w-md overflow-y-auto rounded-3xl p-4">
            <div className="flex items-center justify-between">
              <div className="text-lg font-semibold">Day {selectedHistoryItem.challengeDay} Detail</div>
              <button onClick={() => setSelectedHistoryItem(null)} className="rounded-full bg-white/10 px-3 py-2">×</button>
            </div>
            <div className="mt-3 space-y-3 text-sm">
              <div className="rounded-2xl bg-white/5 p-3">
                <div className="flex justify-between"><span>Score summary</span><Badge tone={selectedHistoryItem.score >= 70 ? 'good' : selectedHistoryItem.score >= 50 ? 'warn' : 'bad'}>{selectedHistoryItem.score || 0}%</Badge></div>
                <div className="mt-1 text-xs text-slate-400">{selectedHistoryItem.imported ? 'Imported historical reconstruction' : 'Captured day snapshot'} · {prettifyDate(selectedHistoryItem.date)}</div>
                <div className="mt-1 text-xs text-slate-400">Data source: {selectedHistoryItem.parseSourceType || (selectedHistoryItem.imported ? 'imported_reconstruction' : 'manual_entry')}</div>
                {selectedHistoryItem.legacyStrictScore ? <div className="mt-1 text-xs text-slate-400">Legacy strict: {selectedHistoryItem.legacyStrictScore.value}/{selectedHistoryItem.legacyStrictScore.outOf}</div> : null}
                {typeof selectedHistoryItem.mandatoryEarned !== 'undefined' && <div className="mt-1 text-xs text-slate-400">Mandatory {selectedHistoryItem.mandatoryEarned || 0}/100 · Penalty {selectedHistoryItem.penaltyLost || 0}</div>}
              </div>

              <div className="rounded-2xl bg-white/5 p-3">
                <div className="font-semibold text-slate-200">Execution summary</div>
                <div className="mt-1 text-xs text-slate-300">Primary MIT: {selectedHistoryItem.primaryMit || '—'}</div>
                <div className="text-xs text-slate-300">Secondary MIT: {selectedHistoryItem.secondaryMit || '—'}</div>
                <div className="text-xs text-slate-300">Study minutes: {selectedHistoryItem.studyMinutes || selectedHistoryItem.learningMinutesTotal || '—'}</div>
                <div className="text-xs text-slate-300">Checklist snapshot: {(selectedHistoryItem.tomorrowChecklist || []).map(t => t.title).join('; ') || '—'}</div>
                <div className="text-xs text-slate-300">Next-day plan summary: {selectedHistoryItem.nextDayPlan || '—'}</div>
                <div className="text-xs text-slate-300">Proof created: {selectedHistoryItem.proofCreated || '—'}</div>
              </div>

              <div className="rounded-2xl bg-white/5 p-3">
                <div className="font-semibold text-slate-200">Wins</div>
                <div className="mt-1 text-xs text-slate-300 whitespace-pre-wrap">{Array.isArray(selectedHistoryItem.wins) ? selectedHistoryItem.wins.join('\n• ').replace(/^/,'• ') : (selectedHistoryItem.summary || '—')}</div>
              </div>
              <div className="rounded-2xl bg-white/5 p-3">
                <div className="font-semibold text-slate-200">Weaknesses / Leakage</div>
                <div className="mt-1 text-xs text-slate-300 whitespace-pre-wrap">{Array.isArray(selectedHistoryItem.weaknesses) ? selectedHistoryItem.weaknesses.join('\n• ').replace(/^/,'• ') : '—'}</div>
              </div>
              <div className="rounded-2xl bg-white/5 p-3">
                <div className="font-semibold text-slate-200">Review / Lesson</div>
                <div className="mt-1 text-xs text-slate-300 whitespace-pre-wrap">{selectedHistoryItem.review || selectedHistoryItem.summary || '—'}</div>
                {selectedHistoryItem.tags?.length ? <div className="mt-2 text-xs text-slate-400">Tags: {selectedHistoryItem.tags.join(', ')}</div> : null}
                {selectedHistoryItem.notes ? <div className="mt-1 text-xs text-slate-400">Notes: {selectedHistoryItem.notes}</div> : null}
                {selectedHistoryItem.imported ? <div className="mt-1 text-xs text-amber-300">Key lesson: {selectedHistoryItem.legacyStrictScore?.interpretation || selectedHistoryItem.review || 'Imported reconstruction insight.'}</div> : null}
              </div>
              <div className="rounded-2xl bg-white/5 p-3">
                <div className="font-semibold text-slate-200">Tasks / Work Blocks Snapshot</div>
                <div className="mt-2 space-y-2">
                  {(selectedHistoryItem.detectedWorkBlocks || []).map((b, idx) => (
                    <div key={b.id || idx} className="rounded-xl bg-white/5 px-2 py-2 text-xs">
                      <div>{b.time || 'time?'} · {b.durationMin || 0}m · {b.topic || b.activityType || 'Work block'}</div>
                      {b.notes ? <div className="text-slate-400">{b.notes}</div> : null}
                    </div>
                  ))}
                  {!(selectedHistoryItem.detectedWorkBlocks || []).length && <div className="text-xs text-slate-500">No detected blocks saved.</div>}
                </div>
              </div>
              <div className="rounded-2xl bg-white/5 p-3">
                <div className="mb-2 font-semibold text-slate-200">AI Summary</div>
                <div className="text-xs text-slate-300 whitespace-pre-wrap">{selectedHistoryItem.aiSummary || selectedHistoryItem.summary || selectedHistoryItem.review || 'No summary yet.'}</div>
                <button onClick={() => generateHistoryDaySummary(selectedHistoryItem)} className="mt-2 rounded-xl bg-accent-500 px-3 py-2 text-xs font-semibold text-navy-950">{daySummaryBusyId === selectedHistoryItem.id ? 'Generating…' : 'Generate Day Summary'}</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {showSplash && sceneConfig.screens?.splash && (
        <div className="fixed inset-0 z-[95] flex items-center justify-center bg-black/65 p-6">
          <div className="w-full max-w-sm rounded-3xl border border-white/15 bg-navy-900/85 p-5 text-center">
            <img src="./icons/icon-192.svg" alt="Stability OS icon" className="mx-auto h-16 w-16" />
            <div className="mt-3 text-lg font-semibold">Stability OS</div>
            <div className="mt-2 text-xs text-slate-300">{sceneQuote || 'Lock in. Operate with clarity.'}</div>
            <div className="mt-3 flex items-center justify-center gap-1 text-accent-400">
              <span className="h-2 w-2 animate-pulse rounded-full bg-accent-400"></span>
              <span className="h-2 w-2 animate-pulse rounded-full bg-accent-400 [animation-delay:180ms]"></span>
              <span className="h-2 w-2 animate-pulse rounded-full bg-accent-400 [animation-delay:360ms]"></span>
            </div>
          </div>
        </div>
      )}

      {onboardingNeeded && (
        <div className="fixed inset-0 z-[70] flex items-start justify-center overflow-y-auto bg-black/70 p-3 pt-8">
          <div className="glass w-full max-w-md rounded-3xl p-4">
            <div className="text-lg font-semibold">First-Time Setup</div>
            <div className="mt-1 text-sm text-slate-400">Set the defaults. Everything remains editable in Builder.</div>
            <div className="mt-4 grid gap-3">
              <Input label="Your name" value={config.userSettings.name} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, name:v } }))} />
              <Input label="App title" value={config.app.title} onChange={v => setConfig(prev => ({ ...prev, app:{ ...prev.app, title:v } }))} />
              <Input label="Wake time" type="time" value={config.userSettings.wakeTime} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, wakeTime:v } }))} />
              <Input label="Sleep target" type="number" step="0.5" value={config.userSettings.sleepTarget} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, sleepTarget:Number(v) } }))} />
              <Input label="Weekly review day" value={config.userSettings.weeklyReviewDay} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, weeklyReviewDay:v } }))} />
              <Input label="Weekly review time" type="time" value={config.userSettings.weeklyReviewTime} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, weeklyReviewTime:v } }))} />
              <Input label="Emergency fund target" type="number" value={config.userSettings.emergencyFundTarget} onChange={v => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, emergencyFundTarget:Number(v) } }))} />
              <Input label="Goal name" value={config.challenge.goalName} onChange={v => setConfig(prev => ({ ...prev, challenge:{ ...prev.challenge, goalName:v } }))} />
              <Input label="Goal days" type="number" value={config.challenge.goalDays} onChange={v => setConfig(prev => ({ ...prev, challenge:{ ...prev.challenge, goalDays:Number(v) } }))} />
              <Toggle label="Enable AI coach" checked={!!config.userSettings.modules.aiCoach} onChange={() => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, modules:{ ...prev.userSettings.modules, aiCoach:!prev.userSettings.modules.aiCoach } } }))} />
              <Toggle label="Enable health widgets" checked={!!config.userSettings.modules.healthWidgets} onChange={() => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, modules:{ ...prev.userSettings.modules, healthWidgets:!prev.userSettings.modules.healthWidgets } } }))} />
              <Toggle label="Enable business CRM" checked={!!config.userSettings.modules.businessCRM} onChange={() => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, modules:{ ...prev.userSettings.modules, businessCRM:!prev.userSettings.modules.businessCRM } } }))} />
              <button onClick={() => setConfig(prev => ({ ...prev, userSettings:{ ...prev.userSettings, setupComplete:true } }))} className="mt-2 rounded-2xl bg-accent-500 px-4 py-3 font-semibold text-navy-950 tap">Start OS</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
